var app = document.getElementById('app');
var btt = document.getElementById('btt');
var QUIZ_SIZE = 10;
var currentQuiz = [];
var userAnswers = {};
var submitted = false;
var startTime;

window.addEventListener('scroll', function() {
  btt.classList.toggle('show', window.scrollY > 400);
});

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function escHtml(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function showMenu() {
  app.innerHTML = '<div class="mode-select">' +
    '<button class="mode-btn" onclick="setMode(10)">10 Domande</button>' +
    '<button class="mode-btn" onclick="setMode(20)">20 Domande</button>' +
    '<button class="mode-btn" onclick="setMode(50)">50 Domande</button>' +
    '</div>';
}

function setMode(n) {
  QUIZ_SIZE = n;
  startQuiz();
}

function startQuiz() {
  currentQuiz = shuffle(ALL_QUESTIONS).slice(0, QUIZ_SIZE);
  userAnswers = {};
  submitted = false;
  startTime = Date.now();
  renderQuiz();
  window.scrollTo(0, 0);
}

function renderQuiz() {
  var answered = Object.keys(userAnswers).length;
  var pct = (answered / QUIZ_SIZE * 100).toFixed(0);
  var letters = ['A','B','C','D'];
  var h = '';

  h += '<div class="stats-bar">';
  h += '<div class="stat"><div class="num" id="sa">' + answered + '</div><div class="label">Risposte</div></div>';
  h += '<div class="stat"><div class="num">' + QUIZ_SIZE + '</div><div class="label">Domande</div></div>';
  h += '<div class="stat"><div class="num" id="sr">' + (QUIZ_SIZE - answered) + '</div><div class="label">Rimanenti</div></div>';
  h += '</div>';
  h += '<div class="progress-bar"><div class="progress-fill" id="pf" style="width:' + pct + '%"></div></div>';

  for (var i = 0; i < currentQuiz.length; i++) {
    var q = currentQuiz[i];
    h += '<div class="question-card" id="q' + q.id + '">';
    h += '<div class="q-header"><div class="q-number">' + q.id + '</div>';
    h += '<div class="q-text">' + escHtml(q.question) + '</div></div>';
    h += '<div class="options">';
    for (var j = 0; j < 4; j++) {
      var l = letters[j];
      var optText = q.options[l] || '';
      h += '<div class="option" data-qid="' + q.id + '" data-letter="' + l + '">';
      h += '<span class="letter">' + l + '</span>';
      h += '<span>' + escHtml(optText) + '</span></div>';
    }
    h += '</div></div>';
  }

  h += '<div class="btn-area" id="qb">';
  h += '<button class="btn btn-primary" id="btn-submit">Correggi Test</button>';
  h += '<button class="btn btn-outline" id="btn-menu">Cambia Modalità</button>';
  h += '</div>';

  app.innerHTML = h;
}

document.addEventListener('click', function(e) {
  var opt = e.target.closest('.option');
  if (opt && !submitted) {
    var qid = parseInt(opt.getAttribute('data-qid'));
    var letter = opt.getAttribute('data-letter');
    userAnswers[qid] = letter;
    var card = document.getElementById('q' + qid);
    var opts = card.querySelectorAll('.option');
    for (var k = 0; k < opts.length; k++) opts[k].className = 'option';
    opt.className = 'option selected';
    var answered = Object.keys(userAnswers).length;
    document.getElementById('sa').textContent = answered;
    document.getElementById('sr').textContent = QUIZ_SIZE - answered;
    document.getElementById('pf').style.width = (answered / QUIZ_SIZE * 100) + '%';
    return;
  }

  if (e.target.closest('#btn-submit')) { submitQuiz(); return; }
  if (e.target.closest('#btn-menu')) { showMenu(); return; }
  if (e.target.closest('#btn-new2')) { startQuiz(); return; }
  if (e.target.closest('#btn-review')) {
    var el = document.querySelector('.answered-wrong');
    if (el) el.scrollIntoView({behavior:'smooth',block:'center'});
    return;
  }
  if (e.target.closest('#btn-menu2')) { showMenu(); return; }
});

function submitQuiz() {
  if (Object.keys(userAnswers).length === 0) {
    alert('Rispondi ad almeno una domanda prima di correggere!');
    return;
  }
  submitted = true;
  var elapsed = Math.floor((Date.now() - startTime) / 1000);
  var mins = Math.floor(elapsed / 60);
  var secs = elapsed % 60;
  var correct = 0, wrong = 0, skipped = 0;

  for (var i = 0; i < currentQuiz.length; i++) {
    var q = currentQuiz[i];
    var card = document.getElementById('q' + q.id);
    var ua = userAnswers[q.id];
    var opts = card.querySelectorAll('.option');

    for (var k = 0; k < opts.length; k++) opts[k].classList.add('disabled');

    if (!ua) {
      skipped++;
      for (var k = 0; k < opts.length; k++) {
        if (opts[k].querySelector('.letter').textContent === q.answer) opts[k].classList.add('correct');
      }
      card.classList.add('answered-wrong');
      addFb(card, 'wrong', 'Non risposta — Risposta corretta: <strong>' + q.answer + '</strong>');
    } else if (ua === q.answer) {
      correct++;
      card.classList.add('answered-correct');
      for (var k = 0; k < opts.length; k++) {
        if (opts[k].querySelector('.letter').textContent === q.answer) opts[k].classList.add('correct');
      }
      addFb(card, 'correct', 'Corretta!');
    } else {
      wrong++;
      card.classList.add('answered-wrong');
      for (var k = 0; k < opts.length; k++) {
        var lt = opts[k].querySelector('.letter').textContent;
        if (lt === q.answer) opts[k].classList.add('correct');
        if (lt === ua) opts[k].classList.add('wrong');
      }
      addFb(card, 'wrong', 'Sbagliata — Risposta corretta: <strong>' + q.answer + '</strong>');
    }
  }

  var score = (correct / QUIZ_SIZE * 100).toFixed(1);
  var sc = score >= 70 ? 'score-pass' : score >= 50 ? 'score-mid' : 'score-fail';

  var rh = '<div class="results-panel"><h2>Risultato del Test</h2>';
  rh += '<div class="score-circle ' + sc + '">' + correct + '/' + QUIZ_SIZE;
  rh += '<div class="pct">' + score + '%</div></div>';
  rh += '<div class="stats-bar" style="justify-content:center;margin-top:16px">';
  rh += '<div class="stat"><div class="num" style="color:var(--success)">' + correct + '</div><div class="label">Corrette</div></div>';
  rh += '<div class="stat"><div class="num" style="color:var(--danger)">' + wrong + '</div><div class="label">Sbagliate</div></div>';
  rh += '<div class="stat"><div class="num" style="color:#64748b">' + skipped + '</div><div class="label">Non risposte</div></div>';
  rh += '<div class="stat"><div class="num">' + mins + ':' + (secs < 10 ? '0' : '') + secs + '</div><div class="label">Tempo</div></div>';
  rh += '</div><div class="btn-area">';
  rh += '<button class="btn btn-success" id="btn-new2">Nuovo Test (' + QUIZ_SIZE + ')</button>';
  rh += '<button class="btn btn-outline" id="btn-review">Rivedi Errori</button>';
  rh += '<button class="btn btn-outline" id="btn-menu2">Cambia Modalità</button>';
  rh += '</div></div>';

  var sb = document.querySelector('.stats-bar');
  sb.insertAdjacentHTML('beforebegin', rh);
  var qb = document.getElementById('qb');
  if (qb) qb.remove();
  window.scrollTo(0, 0);
}

function addFb(card, type, msg) {
  var fb = document.createElement('div');
  fb.className = 'feedback ' + type + ' show';
  fb.innerHTML = msg;
  card.appendChild(fb);
}

showMenu();
</script>
</body>
</html>
