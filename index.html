<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#2563eb">
<title>Quiz Attività Acquatiche</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏊</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--primary:#2563eb;--primary-dark:#1d4ed8;--success:#16a34a;--danger:#dc2626;--bg:#f1f5f9;--card:#fff;--text:#1e293b;--border:#e2e8f0;--radius:12px}
body{font-family:-apple-system,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;padding-bottom:env(safe-area-inset-bottom)}
.container{max-width:900px;margin:0 auto;padding:16px}
header{text-align:center;padding:24px 0 16px}
header h1{font-size:1.6rem;color:var(--primary-dark);margin-bottom:4px}
header p{color:#64748b;font-size:.9rem}
.mode-select{display:flex;justify-content:center;gap:12px;margin:20px 0;flex-wrap:wrap}
.mode-btn{padding:12px 28px;font-size:.95rem;font-weight:600;border:2px solid var(--primary);border-radius:10px;cursor:pointer;transition:all .2s;background:transparent;color:var(--primary)}
.mode-btn:hover,.mode-btn.active{background:var(--primary);color:#fff}
.stats-bar{display:flex;justify-content:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.stat{background:var(--card);padding:10px 18px;border-radius:var(--radius);box-shadow:0 1px 3px rgba(0,0,0,.08);text-align:center;min-width:90px}
.stat .num{font-size:1.4rem;font-weight:700;color:var(--primary)}
.stat .label{font-size:.75rem;color:#64748b;margin-top:2px}
.progress-bar{width:100%;height:6px;background:var(--border);border-radius:3px;margin-bottom:20px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),#7c3aed);border-radius:3px;transition:width .3s ease}
.question-card{background:var(--card);border-radius:var(--radius);padding:20px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.08);transition:all .3s}
.question-card.answered-correct{border-left:4px solid var(--success)}
.question-card.answered-wrong{border-left:4px solid var(--danger)}
.q-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:14px}
.q-number{background:var(--primary);color:#fff;min-width:40px;height:32px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem;flex-shrink:0;padding:0 10px}
.q-text{font-size:.95rem;font-weight:500;line-height:1.5}
.options{display:flex;flex-direction:column;gap:8px}
.option{display:flex;align-items:center;gap:10px;padding:12px 14px;border:2px solid var(--border);border-radius:10px;cursor:pointer;transition:all .15s;font-size:.9rem;line-height:1.4;-webkit-user-select:none;user-select:none}
.option:hover:not(.disabled){border-color:var(--primary);background:#eff6ff}
.option:active:not(.disabled){transform:scale(.98)}
.option.selected{border-color:var(--primary);background:#dbeafe}
.option.correct{border-color:var(--success);background:#dcfce7}
.option.wrong{border-color:var(--danger);background:#fee2e2}
.option.disabled{cursor:default;opacity:.85}
.option .letter{background:var(--border);color:var(--text);width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem;flex-shrink:0;transition:all .15s}
.option.selected .letter{background:var(--primary);color:#fff}
.option.correct .letter{background:var(--success);color:#fff}
.option.wrong .letter{background:var(--danger);color:#fff}
.feedback{margin-top:8px;padding:8px 14px;border-radius:8px;font-size:.85rem;font-weight:500;display:none}
.feedback.show{display:block}
.feedback.correct{background:#dcfce7;color:#15803d}
.feedback.wrong{background:#fee2e2;color:#b91c1c}
.btn-area{display:flex;justify-content:center;gap:12px;margin:24px 0;flex-wrap:wrap}
.btn{padding:14px 32px;font-size:1rem;font-weight:600;border:none;border-radius:10px;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:8px;-webkit-user-select:none;user-select:none}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark)}
.btn-success{background:var(--success);color:#fff}
.btn-success:hover{background:#15803d}
.btn-outline{background:transparent;border:2px solid var(--primary);color:var(--primary)}
.btn-outline:hover{background:#eff6ff}
.results-panel{background:var(--card);border-radius:var(--radius);padding:28px;text-align:center;margin:16px 0;box-shadow:0 4px 12px rgba(0,0,0,.1)}
.results-panel h2{font-size:1.5rem;margin-bottom:8px}
.score-circle{width:140px;height:140px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:20px auto;font-size:2.4rem;font-weight:700;color:#fff}
.score-circle .pct{font-size:.9rem;font-weight:400;margin-top:-4px}
.score-pass{background:linear-gradient(135deg,var(--success),#22d3ee)}
.score-fail{background:linear-gradient(135deg,var(--danger),#f97316)}
.score-mid{background:linear-gradient(135deg,#f59e0b,#f97316)}
.back-top{position:fixed;bottom:20px;right:20px;width:44px;height:44px;border-radius:50%;background:var(--primary);color:#fff;border:none;font-size:1.2rem;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.2);display:none;align-items:center;justify-content:center;z-index:100}
.back-top.show{display:flex}
@media(max-width:600px){.container{padding:12px}.question-card{padding:16px}.btn{padding:12px 24px;font-size:.9rem}header h1{font-size:1.3rem}.stat{padding:8px 14px;min-width:75px}.stat .num{font-size:1.2rem}}
</style>
</head>
<body>
<div class="container">

    <h1>Quiz Attività Acquatiche</h1>
    <p>1000 domande a risposta multipla</p>
  </header>
  <div id="app"></div>

<script>
var ALL_QUESTIONS = [{"id":1,"question":"Attività prescolare: primi obiettivi da raggiungere","options":{"A":"Ambientamento e scivolamento con attività ludiche finalizzate","B":"Imparare la disciplina e l’ordine con rigido controllo tecnico sulle esercitazioni","C":"Stile libero con respirazione, dorso ed alcune bracciate a farfalla","D":"Nessun obiettivo particolare"},"answer":"A"},{"id":2,"question":"Che cos’è il diving reflex?","options":{"A":"È un riflesso arcaico che non perdiamo mai e che prevede la chiusura involontaria dell’epiglottide","B":"È un riflesso arcaico che viene perso verso i 7-9 mesi dopo la nascita per trasformarsi in acqua in apnea volontaria","C":"È un riflesso arcaico che viene perso dopo i tre anni per trasformarsi in apnea volontaria","D":"È un riflesso condizionato"},"answer":"B"},{"id":3,"question":"Con i bambini in età prescolare il canale privilegiato per insegnare è costituito da:","options":{"A":"Il gioco e la comunicazione verbale","B":"Il gioco e l’imitazione","C":"La sola comunicazione verbale","D":"La motivazione endogena"},"answer":"B"},{"id":4,"question":"Cos’è un corso in acqua per bambini al di sotto dei 3 anni?","options":{"A":"Un corso di nuoto","B":"Un’attività motoria che favorisce uno sviluppo armonico dei bambini","C":"Un’attività motoria che favorisce lo sviluppo delle abilità motorie","D":"Una forma di avviamento allo sport"},"answer":"B"},{"id":5,"question":"Differenze tra esercizio fisico e terapia acquatica per i disabili:","options":{"A":"L’esercizio fisico e la terapia acquatica svolgono la stessa funzione","B":"L’esercizio fisico lavora sulle caratteristiche residue del disabile, non sul danno fisico","C":"Entrambe le attività devono essere svolte da personale specializzato","D":"Entrambe sono attività di condizionamento acquatico generale per persone con mobilità limitata"},"answer":"B"},{"id":6,"question":"Dove deve posizionarsi l’istruttore dei gruppi prescolari?","options":{"A":"Sul bordo vasca, in piedi","B":"Sul bordo vasca, seduto","C":"In acqua","D":"È indifferente"},"answer":"C"},{"id":7,"question":"È uno degli obiettivi di un corso neonatale:","options":{"A":"Porre le basi per la costruzione di un futuro atleta di livello","B":"Il potenziamento del sistema cardio- circolatorio e muscolo-scheletrico","C":"Il galleggiamento","D":"Il raggiungimento dell’autonomia rispetto al genitore"},"answer":"D"},{"id":8,"question":"I bambini nella fascia di età 18-24 mesi normalmente:","options":{"A":"Galleggiano autonomamente","B":"Razionalizzano le proprie paure","C":"Affrontano spontaneamente l’argomento piscina","D":"Tutte le risposte precedenti"},"answer":"D"},{"id":9,"question":"Il bimbo di 4-10 mesi in acqua può:","options":{"A":"Eseguire apnee guidate","B":"Eseguire movimenti mirati degli arti","C":"Galleggiare autonomamente","D":"Allontanarsi dai genitori seguendo le indicazioni dell’istruttore"},"answer":"A"},{"id":10,"question":"In età prescolare quale deve essere il fine dell’attività in acqua?","options":{"A":"L’apprendimento del nuoto","B":"L’acquisizione di abilità motorie specifiche","C":"L’adattamento all’acqua","D":"Lo sviluppo delle capacità condizionali"},"answer":"C"},{"id":11,"question":"In età prescolare quali sono gli obiettivi per un buon lavoro sullo schema corporeo?","options":{"A":"Percezione dello spazio","B":"Lateralità","C":"Riconoscimento dei segmenti corporei","D":"Tutte le risposte precedenti"},"answer":"D"},{"id":12,"question":"In gravidanza, l’attività motoria in acqua:","options":{"A":"Aumenta la possibilità di eventi traumatici","B":"Allunga la durata del travaglio","C":"Riduce le possibilità di eventi traumatici","D":"Diminuisce il tono muscolare"},"answer":"C"},{"id":13,"question":"In quante fasce d’età è consigliabile suddividere i corsi di prima infanzia?","options":{"A":"Non è consigliabile","B":"In due fasce d’età (dai 4 ai 18 mesi e dai 18 ai 3 6mesi)","C":"In tre fasce d’età (dai 4 ai 10 mesi, dai 10 ai 24 mesi e dai 24 ai 36 mesi)","D":"In quattro fasce d’età (dai 4 ai 10 mesi, dai 10 ai 18 mesi, dai 18 ai 24 mesi e dai 24 ai 36 mesi)"},"answer":"D"},{"id":14,"question":"In un corso di prima infanzia la figura dell’istruttore è quella di:","options":{"A":"Suggeritore, guida, supporto ed animatore","B":"Insegnante delle tecniche delle nuotate","C":"Osservatore","D":"Correttore"},"answer":"A"},{"id":15,"question":"In un corso di prima infanzia la presenza del genitore e assolutamente necessaria ed indispensabile:","options":{"A":"Mai","B":"In tutte e quattro le fasce d’età (dai 4 ai 36 mesi)","C":"Soprattutto nelle prime tre fasce d’eta (dai 4 ai 24 mesi)","D":"Soprattutto nelle prime due fasce d’eta (dai 4 ai 18 mesi)"},"answer":"C"},{"id":16,"question":"In un corso di prima infanzia per un’organizzazione efficiente è consigliabile:","options":{"A":"Dividere i bambini in fasce d’età","B":"Dividere i bambini in base al loro livello di motricità","C":"Unire tutti i bambini da 0 a 3 anni","D":"Non creare alcun tipo di divisione o gerarchia"},"answer":"A"},{"id":17,"question":"Indica i principali obiettivi dell’attività in acqua per bambini di tre anni:","options":{"A":"Favorire lo sviluppo psicomotorio, cognitivo e socio – affettivo del bambino","B":"Apprendere le tecniche delle nuotate","C":"Favorire lo sviluppo delle capacità coordinative","D":"Far acquisire al bambino un rapporto naturale e positivo con l’acqua"},"answer":"A"},{"id":18,"question":"Iniziare l’insegnamento del nuoto in età prescolare:","options":{"A":"È utile perché consente di specializzare prima gli allievi e di raggiungere prima risultati agonistici","B":"Non è di nessuna utilità","C":"Favorisce un più intenso sviluppo della forza","D":"Favorisce il formarsi di una migliore coordinazione acquatica dovuta alla plasticità del sistema nervoso"},"answer":"D"},{"id":19,"question":"L’attività fisica in acqua per la donna in gravidanza prevede:","options":{"A":"Esercizi di tonificazione solo in acqua alta con ritmi elevati e pochi minuti di rilassamento finale","B":"Esercizi di tonificazione per tutto il corpo con ritmi blandi, con prevalenza di esercizi che ricercano l’extra-rotazione delle anche. Esercizi di rilassamento e di respirazione","C":"Esercizi di tonificazione per tutto il corpo con ritmi blandi, con prevalenza di esercizi che ricercano l’intra-rotazione delle anche","D":"Esercizi di resistenza alla forza"},"answer":"B"},{"id":20,"question":"L’attività motoria adattata è:","options":{"A":"L’attività sportiva praticata dai soggetti diversamente abili","B":"L’insieme degli esercizi proponibili in una piscina che dipende dal tipo di vasca e dai sussidi didattici a disposizione.","C":"L’attività proposta che più si adatta alle preferenze degli allievi","D":"L’attività preferita dall’istruttore"},"answer":"A"},{"id":21,"question":"L’attività motoria in acqua per gli anziani riduce:","options":{"A":"La pressione venosa agli arti inferiori, con miglioramento del ritorno venoso al cuore","B":"La densità ossea agli arti inferiori, con miglioramento del ritorno venoso al cuore","C":"La pressione venosa agli arti inferiori, con miglioramento del ritorno venoso al cervello","D":"L’aspettativa di vita"},"answer":"A"},{"id":22,"question":"L’epilessia è una disabilità di natura:","options":{"A":"Fisico-motoria","B":"Psico-fisica","C":"Da deformazione cranio-spinale","D":"Sensoriale"},"answer":"B"},{"id":23,"question":"L’immaturità nella funzionalità motoria incide sullo sviluppo cognitivo e socio - affettivo del bambino di tre anni?","options":{"A":"Dipende dalla personalità del bambino e dal contesto educativo in cui è inserito","B":"Non incide","C":"Incide sicuramente","D":"Incide esclusivamente sullo sviluppo cognitivo e motorio"},"answer":"A"},{"id":24,"question":"La classificazione funzionale del nuoto agonistico per disabili:","options":{"A":"È composta da 12 classi","B":"Valuta l’handicap fisico","C":"Non valuta il gesto sportivo","D":"Permette handicap diversi nella stessa classe, ma con funzionalità simile"},"answer":"D"},{"id":25,"question":"La paresi cerebrale si manifesta:","options":{"A":"Prima della nascita","B":"Durante il parto","C":"Nel primo anno di vita","D":"Tutte le risposte precedenti"},"answer":"D"},{"id":26,"question":"La tetraplegia è causata da una:","options":{"A":"Lesione toracica","B":"Lesione cervicale","C":"Lesione sacro-coccigea","D":"Lesione lombare"},"answer":"B"},{"id":27,"question":"Nel lavoro in acqua con persone diversamente abili è necessario:","options":{"A":"Avere dei rudimenti di medicina generale","B":"Possedere una laurea in scienze motorie","C":"Essere dei buoni nuotatori","D":"Mettersi in ascolto dell’allievo"},"answer":"D"},{"id":28,"question":"Nel nuoto in gravidanza la temperatura dell’acqua consigliata è:","options":{"A":"Tra 23 e 25°C","B":"Tra 27 e 30°C","C":"Tra 35 e 37°C","D":"Oltre 37°C"},"answer":"B"},{"id":29,"question":"Nel nuoto per la terza e quarta età, il primo obiettivo da perseguire è quello di","options":{"A":"Rendere l’anziano il più autosufficiente possibile","B":"Programmare un allenamento a fini agonistici","C":"Potenziare le capacità condizionali e coordinative","D":"Fare attività acquatica basata sulla patologia dell’anziano"},"answer":"A"},{"id":30,"question":"Nell’attività natatoria per la terza età:","options":{"A":"Ci sono dei cambiamenti evidenti nell’individuo che comunque non rappresentano un limite all’attività sportiva","B":"Uno degli obiettivi è il rallentamento del decadimento organico dovuto all’invecchiamento","C":"Non ci sono particolari rischi legati all’età","D":"Gli obiettivi da raggiungere devono essere in linea con quelli richiesti alle altre fasce di età perché tutti sono potenzialmente in grado di poter nuotare"},"answer":"B"},{"id":31,"question":"Nella fascia di età prescolare l’apprendimento avviene principalmente grazie a:","options":{"A":"Spiegazioni verbali","B":"Gioco ed imitazione","C":"Cooperazione","D":"Competizione"},"answer":"B"},{"id":32,"question":"Obiettivi da perseguire nell’insegnamento alla terza e quarta età:","options":{"A":"Socializzazione","B":"Alleggerire il lavoro articolare","C":"Ricondizionamento fisico","D":"Tutte le risposte precedenti"},"answer":"D"},{"id":33,"question":"Obiettivo dell’attività prescolare è:","options":{"A":"Adattamento degli schemi motori terrestri all’ambiente acquatico","B":"Coordinazione fine","C":"Tecnica dei quattro stili","D":"Sviluppo condizionale"},"answer":"A"},{"id":34,"question":"Per un bambino di tre anni il canale privilegiato di insegnamento è:","options":{"A":"Il gioco strutturato","B":"La spiegazione verbale","C":"Gli esercizi tecnico – didattici finalizzati all’ apprendimento di abilità motorie specifiche","D":"Il gioco libero"},"answer":"A"},{"id":35,"question":"Punti essenziali della pedagogia inclusiva:","options":{"A":"Tutti possono imparare","B":"La diversità è un punto di forza","C":"Cooperazione sinergica delle agenzie educative","D":"Tutte le risposte precedenti"},"answer":"D"},{"id":36,"question":"Qual è il tratto caratterizzante del bambino di 3-4 anni?","options":{"A":"Pensiero intuitivo","B":"Altruismo","C":"Piena consapevolezza del corpo","D":"Egocentrismo"},"answer":"D"},{"id":37,"question":"Qual è l’obiettivo principale nell’attività neonatale in acqua?","options":{"A":"Che il bambino impari a nuotare precocemente","B":"Si tratta di un’attività priva di obiettivi specifici","C":"Dare al bambino anche piccolissimi strumenti per mettersi in situazione di sicurezza in acqua in caso di caduta accidentale","D":"Favorire la relazione della coppia genitore-bambino attraverso l’elemento acqua"},"answer":"D"},{"id":38,"question":"Quale dei seguenti è un beneficio dell’attività in acqua per una donna in gravidanza?","options":{"A":"Aumento della mobilità articolare.","B":"Aumento della capacità coordinativa.","C":"Diminuzione del ritmo cardiaco","D":"Irrobustimento del feto"},"answer":"A"},{"id":39,"question":"Quale delle seguenti affermazioni è sempre veritiera?","options":{"A":"A tutela della propria salute e di quella del bambino è opportuno che la donna in gravidanza sospenda la pratica sportiva","B":"L’attività fisica non ha conseguenze benefiche sul normale sviluppo del feto","C":"La donna in gravidanza può praticare solo sport di endurance","D":"La donna in gravidanza può condurre una vita pressoché normale, tranne in quei casi ove subentrano problematiche particolari o vere e proprie patologie"},"answer":"D"},{"id":40,"question":"Quale delle seguenti è una finalità specifica dell’attività acquatica in gravidanza?","options":{"A":"Allenamento aerobico","B":"Decontrazione del bacino","C":"Profilassi delle trombosi venose e del gonfiore da liquidi","D":"Tutte le risposte precedenti"},"answer":"D"},{"id":41,"question":"Quale di questi non è un vantaggio dell’attività motoria acquatica nella terza età?","options":{"A":"Riduzione del rischio traumatologico","B":"Riduzione del sovraccarico sull’apparato locomotore","C":"Marcato sviluppo coordinativo","D":"Miglioramento del ritorno venoso"},"answer":"C"},{"id":42,"question":"Quale fra i seguenti non è un obiettivo specifico dell’attività in acqua per bambini di età compresa fra 4 e 36 mesi ?","options":{"A":"Rafforzamento del legame genitore- figlio","B":"Miglioramento delle condizioni fisiche del bambino","C":"Presa di confidenza con l’acqua","D":"Sviluppo delle capacità coordinative"},"answer":"D"},{"id":43,"question":"Quale tra questi è uno dei cambiamenti più rilevanti legati all’invecchiamento?","options":{"A":"Aumento della funzionalità cardio- respiratoria e muscolare","B":"Aumento delle capacità di autoregolazione metabolica","C":"Riduzione dell’attività neuro- muscolare","D":"Riduzione della perdita di massa ossea"},"answer":"C"},{"id":44,"question":"Quali aspetti possono creare un disincentivo all’attività in un soggetto anziano?","options":{"A":"La ricerca di un punto di incontro fra esigenze didattiche ed esigenze dell’utente","B":"L’inadeguatezza della proposta, della struttura e la rigidità","C":"L’attenzione massima posta all’inadeguatezza fisica dell’utente","D":"La composizione di gruppi per motivazione e condizioni di funzionalità"},"answer":"B"},{"id":45,"question":"Quali sono considerate popolazioni speciali?","options":{"A":"Gestanti, neonatale, prescolare, terza età, disabili","B":"Atleti e disabili","C":"Terza età e bambini","D":"Pallanuotisti e sincronette"},"answer":"A"},{"id":46,"question":"Quali sono i principali obiettivi da raggiungere nei gruppi di attività prescolare?","options":{"A":"Nessun obiettivo, solo gioco e divertimento","B":"Ambientamento e scivolamento con attività ludiche finalizzate","C":"Stile libero con respirazione, dorso ed alcune bracciate a farfalla","D":"Imparare la disciplina e l’ordine"},"answer":"B"},{"id":47,"question":"Quali sono le problematiche dell’attività fisica determinate all’invecchiamento?","options":{"A":"Aumento della capacità aerobica","B":"Possibilità solo di sforzi di breve durata","C":"Riduzione della funzionalità cardio- respiratoria e muscolare","D":"Possibilità di effettuare solo lavoro anaerobici alattacidi"},"answer":"C"},{"id":48,"question":"Quanti tipi di menomazione fisica sono classificati dal movimento paralimpico?","options":{"A":"4","B":"8","C":"12","D":"16"},"answer":"B"},{"id":49,"question":"Un bambino di 4 anni apprende soprattutto attraverso:","options":{"A":"Ripetizioni automatiche e inconsapevoli","B":"Gioco strutturato, gioco simbolico e di movimento","C":"Spiegazioni e dimostrazioni dell’istruttore","D":"Esercizi tecnico-coordinativi specifici"},"answer":"B"},{"id":50,"question":"Un’adeguata attività motoria oltre i 60 anni","options":{"A":"Migliora il livello delle capacità motorie e la forza","B":"Migliora il livello delle capacità motorie e la componente psicologica","C":"Migliora solo la componente psicologica","D":"Non apporta alcun miglioramento"},"answer":"B"},{"id":51,"question":"Uno dei cambiamenti più evidenti legati all’invecchiamento ale","D":"Al momento della richiesta"},"answer":"A"},{"id":196,"question":"Con la nuova cultura dell’acqua, si è passati da una fase di addestramento ad una di educazione acquatica. Quali termini si possono utilizzare per descrivere questo concetto?","options":{"A":"Automatizzazione del gesto- coordinazione-sensopercezione","B":"Rispetto delle fasi sensibili- ampliamento mappa motoria- multilateralità","C":"Avviamento-ambientamento- progressioni didattiche","D":"Addestramento al nuoto"},"answer":"B"},{"id":197,"question":"Cosa s’intende per sensopercezione?","options":{"A":"Presupposto della prestazione sportiva","B":"Processo di scoperta, analisi ed elaborazione di informazioni e sensazioni attraverso l’integrazione di afferenze provenienti dagli analizzatori","C":"Varietà di stimoli proposti; deve essere massima dal punto di vista spaziale, temporale, della varietà","D":"Capacità coordinativa speciale"},"answer":"B"},{"id":198,"question":"Cosa sono gli schemi motori acquatici?","options":{"A":"Dei movimenti naturali ( come gli schemi motori di base )","B":"Delle abilità motorie apprese in forma cosciente","C":"Schemi di gioco, con movimenti preordinati, utilizzati nella pallanuoto","D":"Acquisizioni acquatiche elementari apprese in forma autonoma ( senza l’intervento dell’istruttore )"},"answer":"B"},{"id":199,"question":"Cosa sono le capacità motorie?","options":{"A":"Presupposti, potenzialità funzionali e motorie per l’apprendimento di abilità motorie","B":"Modelli di movimento basati sugli schemi motori","C":"Azioni motorie che realizzano una data tecnica sportiva","D":"Elementi essenziali del movimento facenti capo le abilità motorie"},"answer":"A"},{"id":200,"question":"Cosa sono le diversificazioni didattiche?","options":{"A":"Continua diversificazione degli stimolii","B":"Utilizzo di supporti (tavoletta, pull- buoy)","C":"Avvicendamento degli istruttori","D":"Variazione di registri comunicativi"},"answer":"A"},{"id":201,"question":"Cosa sono le fasi sensibili?","options":{"A":"Capacità di differenziazione cinestetica","B":"Periodi della vita particolarmente favorevoli allo sviluppo degli esercizi sensopercettivi","C":"Periodi nella crescita particolarmente favorevoli allo sviluppo della forza","D":"Fasi dello sviluppo psicofisico durante le quali si può lavorare con più efficacia sulle funzioni psicomotorie, sulle capacità fisiche, coordinative e cognitivo-affettive"},"answer":"D"},{"id":202,"question":"Da cosa dipendono le criticità del percorso motorio acquatico?","options":{"A":"Dalle peculiarità del mezzo e dal fatto che l’uomo non è un animale acquatico","B":"Dalle condizioni ambientali e da eventuali barriere alla comunicazione","C":"Dalle progressioni didattiche adottate dalla scuola nuoto federale","D":"È un percorso che non presenta alcuna criticità"},"answer":"A"},{"id":203,"question":"I fattori che condizionano l’accrescimento sono:","options":{"A":"Fattori endogeni ed esogeni","B":"Fattori muscolari ed energetici","C":"Fattori genetici e psicologici","D":"Fattori alimentarie psicologici"},"answer":"A"},{"id":204,"question":"Il bagaglio motorio è:","options":{"A":"Capacità di organizzare una azione motoria","B":"L’equipaggiamento dell’atleta agonista","C":"Il vissuto emotivo legato alla pratica sportiva","D":"Raccolta di tutte le esperienze motorie vissute che hanno lasciato una traccia nel sistema nervoso centrale"},"answer":"D"},{"id":205,"question":"Il procedimento euristico è:","options":{"A":"Processo di scoperta, analisi ed elaborazione di informazioni e sensazioni","B":"Una strategia applicabile agli sport di situazione","C":"Rappresenta il presupposto fondamentale per il progressivo affinamento del gesto","D":"Qualsiasi procedimento non rigoroso (a carattere approssimativo, intuitivo, analogico, ecc) che consente di prevedere e rendere plausibile un risultato"},"answer":"D"},{"id":206,"question":"Il ruolo dell’istruttore è:","options":{"A":"Insegnare solo il gesto tecnico","B":"Essere una figura di riferimento in piano vasca","C":"Assistere alla sicurezza dei natanti","D":"Pleonastico"},"answer":"B"},{"id":207,"question":"In cosa consiste un apprendimento?","options":{"A":"Nella modifica del comportamento di fronte ad un problema","B":"Esecuzione corretta di un esercizio","C":"Nella correzione di uno stile","D":"Nel conseguimento di un brevetto tecnico"},"answer":"A"},{"id":208,"question":"Indica l’ordine corretto delle fasi di una lezione di nuoto:","options":{"A":"Riscaldamento – nucleo didattico – rinforzo nucleo didattico – rinforzo lezione precedente","B":"Riscaldamento – rinforzo lezione precedente – nucleo didattico – rinforzo nucleo didattico","C":"Rinforzo lezione precedente – riscaldamento – rinforzo nucleo didattico – nucleo didattico","D":"Presa – trazione – spinta - recupero"},"answer":"B"},{"id":209,"question":"Insegnare a nuotare significa prima di tutto:","options":{"A":"Trasmettere delle tecniche","B":"Educare indipendentemente dall’acqua","C":"Educare all’acqua","D":"Educare attraverso l’acqua"},"answer":"D"},{"id":210,"question":"L’adattamento è:","options":{"A":"Capacità di esercitare un controllo dinamico dell’azione motoria all’interno di una situazione, che può presentare continue variazioni","B":"Capacità di esercitare un controllo emotivo durante una prestazione sportiva","C":"Capacità di conformarsi alle aspettative dell’insegnante","D":"Capacità di adattarsi alle diverse temperature dell’acqua"},"answer":"A"},{"id":211,"question":"L’apprendimento deve avvenire con:","options":{"A":"Elasticità e trasferibilità","B":"Rigidità e intrasferibilità","C":"Chiusura e incomunicabilità","D":"Rapidità ed efficienza"},"answer":"A"},{"id":212,"question":"L’apprendimento:","options":{"A":"È un’esercitazione","B":"È un processo psichico","C":"È un’abilità motoria","D":"Nessuna delle risposte precedenti"},"answer":"B"},{"id":213,"question":"L’attività motoria svolta in situazione di apprendimento deve costituire un carico motorio conforme ai principi di:","options":{"A":"Intuizione","B":"Imitazione","C":"Esaltazione","D":"Multilateralità e polivalenza"},"answer":"D"},{"id":214,"question":"L’azione educativa al nuoto si concretizza attraverso due strade, quali?","options":{"A":"Educazione al nuoto - educazione attraverso il nuoto","B":"Educazione al nuoto - educazione sul nuoto","C":"Educazione al nuoto - educazione per il nuoto","D":"Educazione sul nuoto - educazione nel nuoto"},"answer":"A"},{"id":215,"question":"L’esercizio fisico contribuisce a sviluppare:","options":{"A":"Il corpo e la psiche del bambino","B":"La resistenza ai carichi di lavoro","C":"Il sistema endocrino","D":"Il controllo dell’ansia"},"answer":"A"},{"id":216,"question":"L’età biologica:","options":{"A":"Corrisponde all’età cronologica","B":"Valuta il tempo trascorso dalla nascita","C":"Non è conoscibile","D":"È la vera età psicofisica e rispecchia il livello di maturazione"},"answer":"D"},{"id":217,"question":"La cultura dell’acqua comprende:","options":{"A":"Esplorazione, galleggiamento, propulsione grezza","B":"Tecnica degli stili e dei tuffi","C":"","D":""},"answer":"A"},{"id":218,"question":"La multilateralità:","options":{"A":"È l’utilizzo di una vasta gamma di esercizi per le capacità condizionali","B":"Consente nella pratica di più discipline sportive","C":"Può essere generale e mirata","D":"C - Può essere generale, specifica e mirata"},"answer":"D"},{"id":219,"question":"La parola abilità è il fulcro:","options":{"A":"Della scuola di nuoto","B":"Della scuola di nuoto sincronizzato","C":"Della scuola di nuoto per salvamento","D":"Della scuola delle abilità acquatiche"},"answer":"D"},{"id":220,"question":"La prestazione è:","options":{"A":"Esito misurabile della contrazione muscolare","B":"Esito misurabile di un’azione sportiva completa","C":"Esito misurabile della velocità di gara","D":"Esito misurabile di un test lattacidemico"},"answer":"B"},{"id":221,"question":"La rappresentazione cognitiva di posizione ed estensione del corpo nello spazio si dice:","options":{"A":"Schema motorio","B":"Schema corporeo","C":"Schema semplice","D":"Schema olistico"},"answer":"B"},{"id":222,"question":"La sensibilità con cui si tratta l’acqua o si è in rapporto (simbiosi) con essa, determina l’efficienza e l’efficacia delle azioni(e in futuro delle prestazioni). Tutto questo è determinato da:","options":{"A":"La coordinazione","B":"La sensopercezione","C":"Le abilità acquatiche","D":"La poliedricità"},"answer":"B"},{"id":223,"question":"La sensopercezione è:","options":{"A":"Attività conoscitiva che permette di percepire gli stimoli provenienti dagli analizzatori","B":"Un esercizio per migliorare la sensibilità degli allievi","C":"Un insieme di stimoli atti a migliorare la prestazione","D":"Una capacità condizionale"},"answer":"A"},{"id":224,"question":"La varietà di stimoli proposti, che deve essere massima dal punto di vista spaziale, temporale, della varietà, viene definita:","options":{"A":"Polisportività","B":"Multidisciplinarità","C":"Multipolarità","D":"Multilateralità"},"answer":"D"},{"id":225,"question":"Le abilità motorie:","options":{"A":"Sono identificabili come tecniche sportive","B":"Non sono relazionabili alle capacità coordinative","C":"Sono delle abilità innate presenti in ogni individuo","D":"Sono legate esclusivamente ad aspetti condizionali"},"answer":"A"},{"id":226,"question":"Le abilità motorie:","options":{"A":"Sono dei presupposti di prestazione che con il tempo si automatizzano","B":"Non sono relazionabili alle capacità coordinative","C":"Sono delle abilità innate presenti in ogni individuo","D":"Non fanno riferimento alle tecniche"},"answer":"A"},{"id":227,"question":"Le capacità coordinative sono legate allo sviluppo del:","options":{"A":"Sistema nervoso","B":"Apparato respiratorio","C":"Core business","D":"Apparato muscolare"},"answer":"A"},{"id":228,"question":"Le capacità motorie educate ed orientate sono:","options":{"A":"La mobilità articolare","B":"Le capacità coordinative","C":"Le capacità condizionali","D":"Abilità"},"answer":"D"},{"id":229,"question":"Le difficoltà che si possono incontrare nell’insegnamento delle virate generalmente sono dovute:","options":{"A":"Alla correzione delle cause degli errori anziché concentrarsi sugli effetti che generano le difficoltà","B":"Al fatto che si tratta di movenze impossibili da acquisire in fase di ambientamento","C":"Al fatto che le virate devono essere apprese come abilità motorie distinte e meccanizzate adeguatamente","D":"Al fatto che le virate devono essere apprese come insieme di abilità motorie semplici integrate fra loro attraverso lo stimolo e l’adattamento consapevole"},"answer":"D"},{"id":230,"question":"Le fasi sensibili sono:","options":{"A":"Periodi dello sviluppo caratterizzati da significativi miglioramenti per determinate capacità","B":"Periodi dello sviluppo caratterizzati da significativi miglioramenti di tutte le capacità motorie","C":"Periodi di particolare fragilità emotiva","D":"Periodi dello sviluppo svantaggiosi per gli apprendimenti"},"answer":"A"},{"id":231,"question":"Le società che intendono praticare gli sport acquatici nell’ambito della FIN:","options":{"A":"Devono associarsi","B":"Devono presentare la piscina","C":"Devono richiedere la qualifica di Scuola nuoto federale","D":"Devono affiliarsi"},"answer":"D"},{"id":232,"question":"Le tecniche sportive (quattro stili, virate, partenze, ecc.) sono:","options":{"A":"Fasi di coordinazione fine","B":"Capacità coordinative","C":"Abilità motorie","D":"Schemi motori acquatici"},"answer":"C"},{"id":233,"question":"Lo schema corporeo è:","options":{"A":"La rappresentazione mentale nell’ambiente acqua","B":"La consapevolezza della posizione del proprio corpo nella rana e nella farfalla","C":"L’insieme delle capacità motorie","D":"Rappresentazione e consapevolezza della posizione e dell’estensione del corpo nello spazio"},"answer":"D"},{"id":234,"question":"Lo sviluppo della competenza motoria:","options":{"A":"Non è in relazione con il talento sportivo","B":"Precede il talento sportivo","C":"Coincide con il talento sportivo","D":"Segue il talento sportivo"},"answer":"B"},{"id":235,"question":"Nella scuola nuoto vengono sviluppate maggiormente le capacità condizionali o quelle coordinative?","options":{"A":"Entrambe alla pari","B":"Capacità coordinative","C":"Capacità condizionali","D":"Nessuna delle due"},"answer":"B"},{"id":236,"question":"Per cultura dell’acqua si intende:","options":{"A":"L’insieme delle conoscenze sull’elemento acqua","B":"La conoscenza dei prodotti usati per igienizzare l’acqua della piscina","C":"Il livello scolastico medio degli allievi","D":"Un percorso acquatico dove multilateralità, senso percezione e abilità sono i punti fondamentali"},"answer":"D"},{"id":237,"question":"Per imparare le tecniche degli stili, è più importante avere:","options":{"A":"Buone capacità coordinative","B":"Buone capacità condizionali","C":"Buon ambientamento acquatico","D":"Struttura fisica imponente"},"answer":"C"},{"id":238,"question":"Per multilateralità s’intende:","options":{"A":"L’apprendimento del maggior numero di processi motori differenziando le esercitazioni","B":"La proposta di molteplici esercizi","C":"La proposta di esercizi volti allo sviluppo della lateralità","D":"La variazione quantitativa della proposta in ricerca della specializzazione"},"answer":"A"},{"id":239,"question":"Per quanti anni un allievo istruttore può mantenere la qualifica senza aggiornamento?","options":{"A":"2 anni","B":"3 anni","C":"4 anni","D":"5 anni"},"answer":"B"},{"id":240,"question":"Per superare la concezione meccanicistica che costringe l’allievo in un percorso obbligato di avviamento – propulsione grezza – correzioni –progressione didattica dei 4 stili, bisogna perseguire gli obiettivi di fondo:","options":{"A":"Flessibilità e trasferibilità delle abilità apprese – Strutturazione di una mappa motoria ricca ed elastica – Sviluppo di una competenza motoria","B":"Durezza ed intrasferibilità delle abilità apprese – Strutturazione di una mappa motoria rigida ed analitica – Sviluppo condizionale","C":"Progressione didattica del dorso e delfino","D":"Capacità condizionali e coordinative"},"answer":"A"},{"id":241,"question":"Qual è il percorso formativo di un tecnico nella FIN?","options":{"A":"Corsi istituzionali, inquadramento nelle società sportive, aggiornamenti obbligatori, specializzazioni","B":"Corsi facoltativi, aggiornamenti periodici, valutazioni intermedie","C":"Non esiste un percorso specifico","D":"Inquadramento come atleti, tecnici, dirigenti sportivi"},"answer":"A"},{"id":242,"question":"Qual è la conseguenza di un approccio meccanicistico alla scuola d’acqua?","options":{"A":"Nessuna","B":"Completo fallimento didattico","C":"Specializzazione precoce","D":"Irrigidimento della mappa motoria"},"answer":"D"},{"id":243,"question":"Qual è la premessa indispensabile per insegnare a nuotare?","options":{"A":"Conoscere bene i propri allievi","B":"Conoscere le caratteristiche psicofisiche di chi deve apprendere","C":"Conoscere bene la tecnica natatoria","D":"Conoscere sé stessi"},"answer":"B"},{"id":244,"question":"Quale delle seguenti affermazioni è errata?","options":{"A":"Il settore salvamento è un organo del SIT","B":"Il SIT si sviluppa in un’organizzazione centrale e una periferica","C":"Il SIT è un organo tecnico della FIN","D":"Gli allenatori di nuoto appartengono al SIT nazionale"},"answer":"A"},{"id":245,"question":"Quale fase è assente nello sviluppo delle abilità motorie acquatiche?","options":{"A":"Maturazione","B":"Apprendimento","C":"Sviluppo","D":"Perfezionamento"},"answer":"A"},{"id":246,"question":"Quale termine rappresenta il fulcro della scuola di abilità acquatiche?","options":{"A":"Tecnica","B":"Azione","C":"Prestazione","D":"Abilità"},"answer":"D"},{"id":247,"question":"Quale tra i seguenti è un obiettivo specifico di un corso di nuoto?","options":{"A":"Lo sviluppo di capacità sensopercettive e coordinative speciali","B":"Lo sviluppo della forza muscolare","C":"L’assumere una corretta postura","D":"La crescita staturo-ponderale"},"answer":"A"},{"id":248,"question":"Quale tra le seguenti categorie non fa parte della FIN?","options":{"A":"Atleti","B":"Istruttori di nuoto","C":"Cronometristi","D":"Dirigenti sociali"},"answer":"C"},{"id":249,"question":"Quali aree compongono la personalità del soggetto?","options":{"A":"morfologico-funzionale, intellettivo- cognitiva affettivo-emotiva, sociale","B":"morfologico-funzionale, emotivo- empatica, intellettivo-cognitiva, socio-economica","C":"emotivo-empatica, intellettivo- cognitiva, comunicativa, sociale","D":"psicologica, sociale, emotiva, comunicativa"},"answer":"A"},{"id":250,"question":"Quali delle seguenti non è una competenza della FIN?","options":{"A":"Procurare i mezzi per partecipare alle competizioni natatorie e alle Olimpiadi","B":"Organizzare i campionati del mondo di nuoto","C":"Prevenzione e repressione del doping","D":"Organizzazione dei campionati italiani di nuoto"},"answer":"B"},{"id":251,"question":"Quali di questi soggetti non fanno parte della FIN?","options":{"A":"Medici sociali","B":"Giudici","C":"Atleti","D":"Cronometristi"},"answer":"A"},{"id":252,"question":"Quali parametri vanno considerati per determinare le potenzialità di un allievo?","options":{"A":"Assetti e posture, livello del tono muscolare, coordinazione volontaria, organizzazione motoria","B":"Motivazione, costituzione, coordinazione","C":"Aspetti staturo-ponderali e neuro- fisiologici","D":"Età anagrafica in relazione all’età biologica"},"answer":"A"},{"id":253,"question":"Quali sono gli obiettivi del nucleo didattico di una lezione di scuola nuoto?","options":{"A":"Allenare in maniera efficace tutte le capacità condizionali","B":"Verificare in maniera oggettiva gli obbiettivi raggiunti e consolidare le nuove abilità motorie acquisite","C":"Migliorare la comunicazione tra istruttore e allievo","D":"Stimolare le capacità coordinative con nuove esperienze motorie da trasformare in abilità motorie"},"answer":"D"},{"id":254,"question":"Quali sono gli organi centrali della FIN?","options":{"A":"L’assemblea nazionale, il presidente, il consiglio federale, il consiglio di presidenza, il collegio dei revisori dei conti","B":"Le assemblee regionali, i presidenti regionali, i comitati regionali, i collegi regionali dei revisori dei conti, le assemblee provinciali, i presidenti provinciali, i comitati provinciali, i delegati provinciali, i fiduciari locali","C":"Parlamento, senato, corte costituzionale","D":"Il settore istruzione tecnica, il settore sanitario, il gruppo ufficiali gara, il settore squadre nazionali, il settore nuoto per tutti"},"answer":"A"},{"id":255,"question":"Quali sono gli organi tecnici della FIN?","options":{"A":"L’assemblea nazionale, il presidente, il consiglio federale, il consiglio di presidenza, il collegio dei revisori dei conti","B":"Le assemblee regionali, i presidenti regionali, i comitati regionali, i collegi regionali dei revisori dei conti, le assemblee provinciali, i presidenti provinciali, i comitati provinciali, i delegati provinciali, i fiduciari locali","C":"Parlamento, senato, corte costituzionale","D":"Il settore istruzione tecnica, il settore sanitario, il gruppo ufficiali gara, il settore squadre nazionali, il settore nuoto per tutti"},"answer":"A"},{"id":256,"question":"Quali sono gli scopi che si propone la FIN?","options":{"A":"Formare gli istruttori","B":"Organizzare eventi","C":"Conquistare titoli olimpici","D":"Promuovere, organizzare, disciplinare e diffondere le discipline natatorie"},"answer":"D"},{"id":257,"question":"Quali sono i doveri dei tecnici?","options":{"A":"Di esercitare con lealtà sportiva le loro attività, osservando i principi, le norme e le consuetudini sportive nonché il Codice di comportamento sportivo","B":"Di competere contro le altre attività sportive per finalizzare le utenze agli sport acquatici","C":"Di perseguire la performance dei propri atleti","D":"Di  capacità coordinativa speciale"},"answer":"C"},{"id":264,"question":"Un’abilità motoria è:","options":{"A":"Una predisposizione al movimento","B":"Un’abilità innata","C":"Un’abilità appresa","D":"Nessuna delle tre opzioni"},"answer":"C"},{"id":265,"question":"I periodi della vita nei quali si apprende più facilmente una particolare capacità si chiamano:","options":{"A":"Fasi particolari","B":"Fasi sensibili","C":"Periodi costanti","D":"Fasi olistiche"},"answer":"B"},{"id":266,"question":"A dorso le braccia si muovono:","options":{"A":"In sequenza, prima uno e poi l’altro","B":"Liberamente","C":"Quando un braccio entra l’altro è a metà recupero","D":"In opposizione, un braccio entra in acqua e l’altro esce"},"answer":"D"},{"id":267,"question":"A stile libero, dopo la partenza e dopo ogni virata, per quanto è consentito rimanere in completa immersione?","options":{"A":"Non c’è nessun limite","B":"10 metri","C":"15 metri","D":"25 metri"},"answer":"C"},{"id":268,"question":"Affinché un bambino acquisisca un buon galleggiamento bisogna:","options":{"A":"Che sappia nuotare almeno il crawl e il dorso","B":"Che abbia acquisito una buona educazione respiratoria","C":"Che trascorrano almeno sei mesi di ambientamento","D":"Che sia ben rilassato"},"answer":"D"},{"id":269,"question":"Ambientamento e acquaticità:","options":{"A":"Sono la stessa cosa","B":"L’ambientamento è legato a caratteristiche psicologiche, l’acquaticità a caratteristiche tecniche","C":"Sono caratteristiche indipendenti tra di loro, da sviluppare con esercizi differenti","D":"Una buona acquaticità è un presupposto per ottenere un buon ambientamento"},"answer":"B"},{"id":270,"question":"Ambientamento significa:","options":{"A":"Rimanere molto tempo in acqua","B":"Acquisire un rapporto naturale con l’acqua e stare bene in acqua","C":"Nuotare veloci","D":"Entusiasmo e amicizia"},"answer":"B"},{"id":271,"question":"Anelli della catena della sopravvivenza nel giusto ordine:","options":{"A":"RCP – attivazione del :"Ciò che l’allievo deve sapere","B":"Ciò che l’allievo deve saper fare","C":"Ciò che l’allievo deve provare davanti ad una situazione","D":"I brevetti tecnici"},"answer":"A"},{"id":319,"question":"Gli obiettivi dell’educazione respiratoria sono:","options":{"A":"Ossigenare il sangue","B":"Controllo delle apnee, delle inspirazioni/espirazioni in acqua","C":"Immergersi e rimanere sott’acqua per molto tempo","D":"Costituzione, coordinazione, controllo"},"answer":"B"},{"id":320,"question":"Gli obiettivi finali sono:","options":{"A":"Obiettivi esposti in termini generali che si possono raggiungere in tempi lunghi","B":"Obiettivi espressi con una certa specificità che si possono ottenere in periodi valutabili in mesi","C":"I brevetti tecnici","D":"Obiettivi espressi in operazioni concrete raggiungibili nei tempi di una unità didattica"},"answer":"A"},{"id":321,"question":"Gli obiettivi intermedi sono:","options":{"A":"Obiettivi esposti in termini generali che si possono raggiungere in tempi lunghi","B":"Obiettivi espressi con una certa specificità che si possono ottenere in periodi valutabili in mesi","C":"Obiettivi espressi in operazioni concrete raggiungibili nei tempi di una unità didattica","D":"I brevetti tecnici"},"answer":"B"},{"id":322,"question":"Gli obiettivi motori indicano:","options":{"A":"Ciò che l’allievo deve sapere","B":"Ciò che l’allievo deve saper fare","C":"Come l’allievo si deve comportare","D":"I brevetti tecnici"},"answer":"B"},{"id":323,"question":"Gli obiettivi operativi sono:","options":{"A":"Obiettivi esposti in termini generali che si possono raggiungere in tempi lunghi","B":"Progressioni didattiche","C":"Obiettivi espressi con una certa specificità che si possono ottenere in periodi valutabili in mesi","D":"Obiettivi espressi in operazioni concrete raggiungibili nei tempi di una unità didattica"},"answer":"D"},{"id":324,"question":"Gli organi della FIN sono:","options":{"A":"Gli organi periferici e centrali","B":"Gli organi centrali ed internazionali","C":"Gli organi ministeriali","D":"Gli organi centrali, periferici e di giustizia"},"answer":"D"},{"id":325,"question":"Grazie a quale principio fisico il corpo umano galleggia in acqua?","options":{"A":"Principio di gravità","B":"Principio di azione e reazione","C":"Principio di Archimede","D":"Principio di Bernoulli"},"answer":"C"},{"id":326,"question":"I livelli tecnici minimi previsti dalla scuola nuoto federale sono:","options":{"A":"2","B":"3","C":"4","D":"5"},"answer":"D"},{"id":327,"question":"I prerequisiti per l’insegnamento della virata a crawl sono:","options":{"A":"Saper effettuare la capovolta","B":"Possedere una buona tecnica in almeno tre stili","C":"Inserire il gesto tecnico subito dopo il tuffo di partenza","D":"Buone capacità anaerobiche alattacide"},"answer":"A"},{"id":328,"question":"I principali obiettivi della ginnastica educativa sono:","options":{"A":"Consolidamento delle capacità condizionali e sviluppo della resistenza alla forza","B":"Acquisizione a secco delle tecniche di nuotata","C":"Controllo della respirazione in fase di apnea, sviluppo della forza, controllo visivo","D":"Sviluppo degli schemi motori di base, sviluppo dello schema corporeo, miglioramento delle capacità coordinative"},"answer":"D"},{"id":329,"question":"Il coordinatore della scuola nuoto:","options":{"A":"Rappresenta la società, definisce gli obiettivi sulla base delle risorse disponibili","B":"Pone in essere le indicazioni della direzione","C":"Programma e attua la preparazione delle squadre agonistiche","D":"Sviluppa autonomamente il proprio percorso didattico"},"answer":"B"},{"id":330,"question":"Il crawl prevede movimenti:","options":{"A":"Simmetrici","B":"Simultanei","C":"Isometrici","D":"Alternati"},"answer":"D"},{"id":331,"question":"Il galleggiamento dipende principalmente:","options":{"A":"Dalla viscosità del liquido","B":"Dal risucchio o vortice","C":"Dalla costituzione corporea","D":"Dalla quantità di aria nei polmoni"},"answer":"D"},{"id":332,"qu ici, chi è responsabile?","options":{"A":"Chi assume su di sé l’onere del rischio e delle conseguenze provocate dal proprio comportamento","B":"Chi si fa carico del risarcimento economico conseguente a un dato comportamento","C":"L’oggetto dell’azione della magistratura","D":"Chi accetta di assumere la responsabilità delle proprie azioni"},"answer":"A"},{"id":348,"question":"In un ciclo completo di braccia a farfalla, quante battute di gambe si eseguono normalmente?","options":{"A":"Una","B":"Due","C":"Tre","D":"Nessuna, le gambe vengono trascinate dal movimento del tronco"},"answer":"B"},{"id":349,"question":"In un massaggio cardiaco si comprime ritmicamente il torace ad una frequenza di:","options":{"A":"10 - 15 colpi al minuto","B":"30 - 50 colpi al minuto","C":"80 -100 colpi al minuto","D":"150 - 180 colpi al minuto"},"answer":"C"},{"id":350,"question":"In una gara a stile libero un concorrente può rimanere in completa immersione:","options":{"A":"Per tutta la distanza che deve coprire","B":"Mai","C":"Alla partenza ed alle virate, per un massimo di 10 metri","D":"Alla partenza ed alle virate, per un massimo di 15 metri"},"answer":"D"},{"id":351,"question":"In una gara di misti individuali o di staffetta mista, la frazione a stile libero è intesa come:","options":{"A":"Nuotare tassativamente a crawl","B":"Nuotare uno stile qualsiasi","C":"Nuotare uno stile qualsiasi anche subacqueo","D":"Nuotare uno stile che non sia la farfalla, il dorso, la rana"},"answer":"D"},{"id":352,"question":"In una gara di nuoto quante partenze sono previste?","options":{"A":"Due (la seconda comunque valida)","B":"Una (comunque valida)","C":"Tre (la terza comunque valida)","D":"Quattro (la quarta comunque valida)"},"answer":"B"},{"id":353,"question":"In una gara di stile libero individuale è possibile nuotare:","options":{"A":"In qualsiasi modo","B":"Solo a crawl","C":"Tirandosi alla corda separatrice","D":"Spingendosi dal fondo"},"answer":"A"},{"id":354,"question":"In una gara, in qual awl"},"answer":"B"},{"id":384,"question":"La posizione laterale di sicurezza si adotta quando la persona da soccorrere:","options":{"A":"Non è cosciente, presenta spontanea attività cardiaca ed assenza di quella respiratoria","B":"Non è più in vita","C":"Non è cosciente ma presenta spontaneamente attività respiratorie e cardiache","D":"È cosciente ma denuncia difficoltà respiratorie"},"answer":"C"},{"id":385,"question":"La pratica della pallanuoto favorisce:","options":{"A":"La socializzazione e la cooperazione, lo sviluppo di abilità motorie","B":"Lo sviluppo della fase di egocentrismo","C":"Lo sviluppo di abilità motorie e della muscolatura degli arti superiori","D":"L’utilizzo di ausili didattici, per esempio il pallone"},"answer":"A"},{"id":386,"question":"La procedura o protocollo internazionale BLS consente di:","options":{"A":"Chiamare i soccorsi sanitari di emergenza (118)","B":"Attivare il primo soccorso","C":"Gestire le conseguenze legali di un infortunio","D":"Effettuare le manovre di rianimazione"},"answer":"D"},{"id":387,"question":"La respirazione in acqua è:","options":{"A":"Inconsapevole e automatica","B":"Normale e disinvolta","C":"Problematica e angosciante","D":"Forzata e cosciente"},"answer":"D"},{"id":388,"question":"La respirazione nella nuotata a rana avviene:","options":{"A":"Terminata la fase di presa","B":"All’inizio della trazione","C":"Tra il termine della trazione e l’inizio del recupero","D":"Ogni due cicli di bracciata"},"answer":"C"},{"id":389,"question":"La scelta degli esercizi è la fase della programmazione didattica in cui:","options":{"A":"Si immagina come dovrà essere il nostro allievo dopo un certo periodo di esperienza","B":"Si definiscono le tappe della varie progressioni didattiche","C":"Si scelgono le strategie migliori per arrivare agli obiettivi","D":"Si valutano i risultati ottenuti"},"answer":"C"},{"id":390,"question":"La scelta dei mezzi e dei metodi è la fase della programmazione didattica in cui:","options":{"A":"Si n il capo leggermente sollevato sull’acqua"},"answer":"B"},{"id":411,"question":"Nel dorso la bracciata è:","options":{"A":"Gomito flesso sia nella fase aerea che in quella subacquea","B":"Gomito disteso nella fase aerea e flesso in quella subacquea","C":"Gomito disteso nella fase aerea e in quella subacquea","D":"Braccio teso"},"answer":"B"},{"id":412,"question":"Nel dorso la coordinazione respiratoria:","options":{"A":"Non ha molta importanza in quanto la bocca è sempre fuori dall’acqua e non influisce sul rendimento della nuotata","B":"È corretto ritmarla ed automatizzarla per avere scambio d’aria frequente e assicurare una buona ossigenazione del sangue","C":"Si può respirare ogni 6/8 bracciate, indipendentemente dalla frequenza","D":"È importante unicamente nelle distanze gara dei 100 e 200 metri dorso, nei 50 metri si può anche non respirare"},"answer":"B"},{"id":413,"question":"Nel dorso, al termine della fase di recupero, come entra in acqua la mano?","options":{"A":"Con il dorso","B":"Con il palmo rivolto verso il corpo del nuotatore","C":"Con il palmo della mano rivolto verso l’esterno","D":"Con il palmo rivolto verso il basso"},"answer":"C"},{"id":414,"question":"Nel dorso, le braccia, si trovano sempre in posizione:","options":{"A":"Contrapposta","B":"Parallela","C":"Libera","D":"Perpendicolare"},"answer":"A"},{"id":415,"question":"Nel dorso, nella fase di spinta è importante:","options":{"A":"Esprimere il minimo della forza","B":"Esprimere il massimo della forza","C":"Creare una pausa prima dell’inizio del recupero","D":"Respirare"},"answer":"B"},{"id":416,"question":"Nel galleggiamento statico supino in che posizione sono le braccia rispetto al corpo?","options":{"A":"In alto","B":"In fuori","C":"Lungo i fianchi","D":"In basso"},"answer":"B"},{"id":417,"question":"Nel kick (o pull kick) del nuoto sincronizzato il movimento effettuato dalle gambe è:","options":{"A":"A forbice","B":"Alternato","C":"Bicicletta","D":"A rana"},"answer":"D"},{"id":418,"quest  fase attiva della gambata avviene mentre le braccia si estendono in avanti","B":"La coordinazione ha un’importanza minore rispetto al dorso","C":"È fondamentale che la trazione inizi quando le gambe non sono completamente distese","D":"La trazione è ottimale se la profondità delle mani è di circa 25-30 cm."},"answer":"A"},{"id":477,"question":"Nella remata standard del nuoto sincronizzato (galleggiamento supino e braccia flesse lungo i fianchi) per spostarsi in direzione della testa la mano deve essere:","options":{"A":"In flessione palmare con le dita più basse rispetto al polso","B":"In flessione dorsale con le dita più alte rispetto al polso","C":"Distesa in linea con l’avambraccio","D":"A martello"},"answer":"B"},{"id":478,"question":"Nella virata a dorso, cosa non è consentito fare in posizione prona?","options":{"A":"Muovere le braccia","B":"Espirare","C":"Muovere la testa","D":"Muovere le gambe"},"answer":"D"},{"id":479,"question":"Nella virata a rana il tocco delle mani sulla parete come deve avvenire?","options":{"A":"Simultaneamente","B":"È sufficiente solo il tocco di una mano","C":"Basta toccare la parete con una qualsiasi parte del corpo","D":"Tassativamente sotto il pelo dell’acqua"},"answer":"A"},{"id":480,"question":"Nella virata a rana:","options":{"A":"È consentita l’azione dall’alto verso il basso degli arti inferiori","B":"È consentito toccare il bordo con le mani a differenti altezze","C":"È consigliabile affondare le spalle nella fase di entrata","D":"È consigliabile ridurre l’angolo tra coscia e gamba per avere un colpo di gambe più efficace"},"answer":"B"},{"id":481,"question":"Nelle gare a farfalla la distanza più lunga è:","options":{"A":"400 metri","B":"200 metri","C":"100 metri","D":"50 metri"},"answer":"B"},{"id":482,"question":"Nello stile libero è un errore più grave:","options":{"A":"Respirare ogni 4 bracciate","B":"Effettuare la passata subacquea con le dita leggermente aperte","C":"Nuotare con le gambe che battono poco","D":"Respir ":"Perché è importante far svolgere agli allievi attività di immersione in acqua fonda ?","options":{"A":"Per imparare a raccogliere gli oggetti dal fondo ed essere capaci di immergere le testa","B":"Per conoscere lo spazio sottostante e sentire che l’acqua spinge verso l’alto","C":"Perché è piacevole ed insegna a soffiare","D":"Non è opportuno svolgere questo tipo di esercitazioni"},"answer":"B"},{"id":498,"question":"Perché la rana è lo stile più lento?","options":{"A":"Perché la posizione in acqua è più inclinata rispetto agli altri stili","B":"Perché è uno stile discontinuo","C":"Perché la testa rompe la superficie dell’acqua ad ogni bracciata","D":"Perché non c’è la fase di spinta nella bracciata"},"answer":"B"},{"id":499,"question":"Principale problema che s’incontra nell’insegnamento del dorso:","options":{"A":"Impostazione della posizione dei piedi","B":"Posizione in acqua seduta","C":"Spinta delle braccia sufficiente per la propulsione","D":"Coordinazione tra bracciata e respirazione laterale"},"answer":"B"},{"id":500,"question":"Principale problema che s’incontra nell’insegnamento della farfalla:","options":{"A":"Impostazione della posizione dei piedi","B":"Posizione in acqua seduta","C":"Spinta delle braccia sufficiente per la propulsione","D":"Coordinazione tra bracciata e respirazione laterale"},"answer":"C"},{"id":501,"question":"Principale problema che s’incontra nell’insegnamento della rana:","options":{"A":"Impostazione della posizione dei piedi","B":"Posizione in acqua seduta","C":"Spinta delle braccia sufficiente per la propulsione","D":"Coordinazione tra bracciata e respirazione laterale"},"answer":"A"},{"id":502,"question":"Principale problema che s’incontra nell’insegnamento dello stile libero:","options":{"A":"Impostazione della posizione dei piedi","B":"Posizione in acqua seduta","C":"Spinta delle braccia sufficiente per la propulsione","D":"Coordinazione tra bracciata e respirazione laterale"},"answer":"D"},{"id":503,"question":"Principio in a, toccare il compagno e copiare la posizione","C":"Soffiare con il naso, tenere il fiato per 10 secondi in immersione, prendere aria dalla bocca e soffiarla dal naso, eseguire 20 respirazioni in immersione","D":"Apnee prolungate, lavori di gambe con tavoletta"},"answer":"B"},{"id":572,"question":"Sono obiettivi intermedi dell’ambientamento:","options":{"A":"Avvicinamento all’acqua, scivolamenti e insegnamento del nuoto","B":"Immersione, respirazione, spostamenti in acqua","C":"Pagamento della quota mensile, consegna del certificato medico","D":"Accoglienza, percepire in acqua, controllare la respirazione, controllare il galleggiamento, sapersi immergere,sapersi spostare, saltare in acqua e tuffarsi"},"answer":"D"},{"id":573,"question":"Su quali distanze, in vasca da 50 metri, possono essere ottenuti primati nazionali nella disciplina dei misti individuali?","options":{"A":"50, 100, 200 metri","B":"4x100 metri","C":"100, 200, 400 metri","D":"200, 400 metri"},"answer":"D"},{"id":574,"question":"Tra gli obiettivi formativi del secondo livello troviamo:","options":{"A":"Il rafforzamento delle capacità condizionali","B":"Il controllo respiratorio","C":"Lo sviluppo del senso agonistico","D":"Quelle esercitazioni proposte anche se non compatibili con le capacità dell’allievo"},"answer":"B"},{"id":575,"question":"Tra i vari motivi la ginnastica prenatatoria è importante perché:","options":{"A":"Effettuandosi in altri ambienti della piscina incrementa il processo di ambientamento","B":"Stimola elementi che trovano condizioni di massima efficienza sia fuori che dentro l’acqua","C":"Consente di sovrapporre due turni di scuola nuoto","D":"Consente di elevare il tono muscolare e di preparare le strutture periferiche all’attività natatoria"},"answer":"D"},{"id":576,"question":"Un esercizio è in forma competitiva:","options":{"A":"Quando si propone un problema motorio e l’allievo deve trovare il modo di risolverlo","B":"Quando il fine dell’azione non è l’azione stessa ma uno di c
