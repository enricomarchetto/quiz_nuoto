  const saved = localStorage.getItem('quizSeenQuestions');
  if (saved) seenQuestions = JSON.parse(saved);
} catch(e) {}

let isRegisterMode = false;

function toggleAuthMode() {
  isRegisterMode = !isRegisterMode;
  document.getElementById('authBtn').textContent = isRegisterMode ? 'Registrati' : 'Accedi';
  document.getElementById('authToggle').innerHTML = isRegisterMode
    ? 'Hai già un account? <a href="#" onclick="toggleAuthMode(); return false;">Accedi</a>'
    : 'Non hai un account? <a href="#" onclick="toggleAuthMode(); return false;">Registrati</a>';
  hideAuthMessages();
}

function showAuthError(msg) {
  const el = document.getElementById('authError');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('authSuccess').style.display = 'none';
}

function showAuthSuccess(msg) {
  const el = document.getElementById('authSuccess');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('authError').style.display = 'none';
}

function hideAuthMessages() {
  document.getElementById('authError').style.display = 'none';
  document.getElementById('authSuccess').style.display = 'none';
}

async function handleAuth() {
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  hideAuthMessages();

  if (!email || !password) {
    showAuthError('Inserisci email e password');
    return;
  }
  if (password.length < 6) {
    showAuthError('La password deve avere almeno 6 caratteri');
    return;
  }

  const btn = document.getElementById('authBtn');
  btn.disabled = true;
  btn.textContent = 'Caricamento...';

  try {
    let result;
    if (isRegisterMode) {
      result = await sb.auth.signUp({ email, password });
      console.log('SignUp result:', JSON.stringify(result.error), JSON.stringify(result.data?.user?.id));
      if (result.error) throw result.error;
      // Controlla se serve conferma email
      if (result.data.user && !result.data.session) {
        showAuthSuccess('Registrazione completata! Controlla la tua email per confermare l\'account.');
        btn.disabled = false;
        btn.textContent = 'Registrati';
        return;
      }
    } else {
      result = await sb.auth.signInWithPassword({ email, password });
      console.log('SignIn result:', JSON.stringify(result.error), JSON.stringify(result.data?.user?.id));
      if (result.error) throw result.error;
    }

    // Login riuscito - verrà gestito dall'onAuthStateChange
    console.log('Auth OK, attendo onAuthStateChange...');
    // Safety: se onAuthStateChange non scatta entro 5 secondi, sblocca
    setTimeout(() => {
      if (btn.disabled) {
        console.warn('onAuthStateChange non ha risposto, sblocco manuale');
        btn.disabled = false;
        btn.textContent = isRegisterMode ? 'Registrati' : 'Accedi';
        showAuthError('Login riuscito ma il caricamento è lento. Ricarica la pagina.');
      }
    }, 5000);
  } catch (err) {
    console.error('Auth error:', err);
    let msg = 'Errore durante l\'accesso';
    if (err.message) {
      if (err.message.includes('Invalid login')) msg = 'Email o password errati';
      else if (err.message.includes('already registered')) msg = 'Email già registrata. Prova ad accedere.';
      else if (err.message.includes('Email not confirmed')) msg = 'Conferma la tua email prima di accedere. Oppure disattiva "Confirm email" su Supabase.';
      else msg = err.message;
    }
    showAuthError(msg);
    btn.disabled = false;
    btn.textContent = isRegisterMode ? 'Registrati' : 'Accedi';
  }
}

function handleGuestMode() {
  isGuestMode = true;
  currentUser = null;
  showApp();
}

async function handleLogout() {
  if (!isGuestMode) {
    await sb.auth.signOut();
  }
  isGuestMode = false;
  currentUser = null;
  masteredQuestions = {};
  document.getElementById('authPage').style.display = 'flex';
  document.getElementById('homePage').classList.remove('visible');
  document.getElementById('quizPage').style.display = 'none';
  document.getElementById('userBar').classList.remove('visible');
}

// Listener per cambi di stato auth
sb.auth.onAuthStateChange(async (event, session) => {
  if (session && session.user) {
    currentUser = session.user;
    isGuestMode = false;
    await loadMasteredQuestions();
    showApp();
  }
});

// Controlla sessione esistente all'avvio
async function checkExistingSession() {
  const { data: { session } } = await sb.auth.getSession();
  if (session && session.user) {
    currentUser = session.user;
    isGuestMode = false;
    await loadMasteredQuestions();
    showApp();
  }
}

// SUPABASE DATA LAYER

// Carica le domande che l'utente ha già risposto correttamente
async function loadMasteredQuestions() {
  if (!currentUser) return;

  try {
    // Prendi l'ultima risposta per ogni domanda
    const { data, error } = await sb
      .from('user_answers')
      .select('question_id, category, is_correct')
      .eq('user_id', currentUser.id)
      .eq('is_correct', true);

    if (error) throw error;

    masteredQuestions = {};
    if (data) {
      data.forEach(row => {
        // Aggiungi sia alla categoria specifica che a 'all'
        if (!masteredQuestions[row.category]) masteredQuestions[row.category] = new Set();
        masteredQuestions[row.category].add(row.question_id);
        if (!masteredQuestions['all']) masteredQuestions['all'] = new Set();
        masteredQuestions['all'].add(row.question_id);
      });
    }
  } catch (err) {
    console.error('Errore caricamento progressi:', err);
  }
}

// Salva le risposte di un quiz su Supabase
async function saveAnswersToSupabase(quizQuestions, userAnswers) {
  if (!currentUser) return;

  try {
    const rows = quizQuestions.map(q => ({
      user_id: currentUser.id,
      question_id: q.id,
      category: q.category,
      selected_answer: userAnswers[q.id] || '',
      correct_answer: q.answer,
      is_correct: userAnswers[q.id] === q.answer
    }));

    const { error } = await sb
      .from('user_answers')
      .insert(rows);

    if (error) throw error;

    // Aggiorna cache locale
    rows.forEach(row => {
      if (row.is_correct) {
        if (!masteredQuestions[row.category]) masteredQuestions[row.category] = new Set();
        masteredQuestions[row.category].add(row.question_id);
        if (!masteredQuestions['all']) masteredQuestions['all'] = new Set();
        masteredQuestions['all'].add(row.question_id);
      } else {
        // Rimuovi dalla cache se ha sbagliato (torna in gioco)
        if (masteredQuestions[row.category]) masteredQuestions[row.category].delete(row.question_id);
        if (masteredQuestions['all']) masteredQuestions['all'].delete(row.question_id);
      }
    });
  } catch (err) {
    console.error('Errore salvataggio risposte:', err);
  }
}

// Salva sessione quiz su Supabase
async function saveSessionToSupabase(cat, total, correct, wrong, unanswered, elapsed, pct) {
  if (!currentUser) return;

  try {
    const { error } = await sb
      .from('quiz_sessions')
      .insert({
        user_id: currentUser.id,
        category: cat,
        total_questions: total,
        correct_count: correct,
        wrong_count: wrong,
        unanswered_count: unanswered,
        elapsed_seconds: elapsed,
        score_pct: pct
      });
    if (error) throw error;
  } catch (err) {
    console.error('Errore salvataggio sessione:', err);
  }
}

// ============================================================
// POOL DI DOMANDE (con supporto Supabase + fallback localStorage)
// ============================================================

function getUnseenPool(pool, cat) {
  const key = cat || 'all';

  if (!isGuestMode && currentUser) {
    // MODALITÀ SUPABASE: usa masteredQuestions
    const mastered = masteredQuestions[key] || new Set();
    let unseen = pool.filter(q => !mastered.has(q.id));

    // Se le domande non viste sono meno di quelle richieste, resetta
    if (unseen.length < amount) {
      // Reset: svuota la cache locale per questa categoria
      if (key === 'all') {
        masteredQuestions = {};
      } else {
        delete masteredQuestions[key];
        // Ricostruisci 'all' senza questa categoria
        if (masteredQuestions['all']) {
          pool.forEach(q => masteredQuestions['all'].delete(q.id));
        }
      }
      unseen = pool;
    }
    return unseen;
  } else {
    // MODALITÀ GUEST: usa localStorage (come prima)
    if (!seenQuestions[key]) seenQuestions[key] = [];
    let seen = new Set(seenQuestions[key]);
    let unseen = pool.filter(q => !seen.has(q.id));
    if (unseen.length < amount) {
      seenQuestions[key] = [];
      saveSeenQuestions();
      unseen = pool;
    }
    return unseen;
  }
}

function markAsSeen(questionIds, cat) {
  if (!isGuestMode && currentUser) {
    // Per Supabase, il salvataggio avviene dopo la correzione
    return;
  }
  // Guest mode
  const key = cat || 'all';
  if (!seenQuestions[key]) seenQuestions[key] = [];
  seenQuestions[key] = seenQuestions[key].concat(questionIds);
  saveSeenQuestions();
}

function unmarkWrongQuestions(wrongIds, cat) {
  if (!isGuestMode && currentUser) {
    // Per Supabase, il salvataggio gestisce già questo
    return;
  }
  // Guest mode
  const key = cat || 'all';
  if (!seenQuestions[key]) return;
  seenQuestions[key] = seenQuestions[key].filter(id => !wrongIds.includes(id));
  saveSeenQuestions();
}

function saveSeenQuestions() {
  try { localStorage.setItem('quizSeenQuestions', JSON.stringify(seenQuestions)); } catch(e) {}
}

function showApp() {
  document.getElementById('authPage').style.display = 'none';
  document.getElementById('homePage').classList.add('visible');

  // User bar
  const bar = document.getElementById('userBar');
  if (!isGuestMode && currentUser) {
    document.getElementById('userEmail').textContent = currentUser.email;
    document.getElementById('logoutBtn').textContent = 'Esci';
    updateUserStats();
    bar.classList.add('visible');
  } else {
    document.getElementById('userEmail').textContent = 'Modalità ospite';
    document.getElementById('logoutBtn').textContent = 'Accedi';
    document.getElementById('userStats').textContent = '';
    bar.classList.add('visible');
  }

  initHome();
}

function updateUserStats() {
  const mastered = masteredQuestions['all'] ? masteredQuestions['all'].size : 0;
  document.getElementById('userStats').textContent = mastered + ' / ' + quizData.length + ' completate';
}

function formatTime(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
}

function startTimer() {
  timerStart = Date.now();
  document.getElementById('quizTimer').textContent = '⏱ 00:00';
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - timerStart) / 1000);
    document.getElementById('quizTimer').textContent = '⏱ ' + formatTime(elapsed);
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
  return Math.floor((Date.now() - timerStart) / 1000);
}

let homeInitialized = false;
function initHome() {
  if (homeInitialized) {
    updateStart();
    return;
  }
  homeInitialized = true;
  const cats = [...new Set(quizData.map(q => q.category))].sort();
  const grid = document.getElementById('catGrid');
  const all = document.createElement('div');
  all.className = 'cat-btn selected';
  all.dataset.cat = 'all';
  all.innerHTML = '<span>Tutte</span><span class="cat-count">' + quizData.length + '</span>';
  all.onclick = () => pickCat('all');
  grid.appendChild(all);
  cats.forEach(c => {
    const n = quizData.filter(q => q.category === c).length;
    const btn = document.createElement('div');
    btn.className = 'cat-btn';
    btn.dataset.cat = c;
    btn.innerHTML = '<span>' + c + '</span><span class="cat-count">' + n + '</span>';
    btn.onclick = () => pickCat(c);
    grid.appendChild(btn);
  });
  updateStart();
}

function pickAmount(n) {
  amount = n;
  document.querySelectorAll('.amount-btn').forEach(b => b.classList.toggle('selected', parseInt(b.querySelector('.num').textContent) === n));
  updateStart();
}

function pickCat(c) {
  category = c;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('selected', b.dataset.cat === c));
  updateStart();
}

function updateStart() {
  const btn = document.getElementById('startBtn');
  if (!amount) { btn.disabled = true; btn.textContent = 'Scegli il numero di domande'; return; }
  const fullPool = category === 'all' ? quizData : quizData.filter(q => q.category === category);
  const unseen = getUnseenPool(fullPool, category);
  const n = Math.min(amount, unseen.length);
  btn.disabled = false;
  const remaining = unseen.length;
  btn.textContent = 'Inizia — ' + n + ' domande (' + remaining + ' ancora da fare su ' + fullPool.length + ')';
}

function shuffle(a) { const b = [...a]; for (let i = b.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [b[i], b[j]] = [b[j], b[i]]; } return b; }

function startQuiz() {
  const fullPool = category === 'all' ? quizData : quizData.filter(q => q.category === category);
  const pool = getUnseenPool(fullPool, category);
  questions = shuffle(pool).slice(0, amount);
  // Per guest mode, segna come viste subito
  if (isGuestMode || !currentUser) {
    markAsSeen(questions.map(q => q.id), category);
  }
  answers = {};
  corrected = false;
  document.getElementById('homePage').classList.remove('visible');
  document.getElementById('quizPage').style.display = 'block';
  document.getElementById('quizTitle').textContent = category === 'all' ? 'Tutte le categorie' : category;
  document.getElementById('resultsCard').classList.remove('visible');
  document.getElementById('btnCorreggi').classList.remove('hidden');
  document.getElementById('btnErrori').classList.add('hidden');
  document.getElementById('btnHome').classList.add('hidden');
  render();
  window.scrollTo({ top: 0 });
  startTimer();
}

function goHome() {
  clearInterval(timerInterval);
  document.getElementById('quizPage').style.display = 'none';
  document.getElementById('homePage').classList.add('visible');
  updateStart();
  updateUserStats();
  window.scrollTo({ top: 0 });
}

function pick(qid, letter) {
  if (corrected) return;
  answers[qid] = letter;
  render();
}

function render() {
  const c = document.getElementById('quizContainer');
  let h = '';
  questions.forEach((q, i) => {
    const a = answers[q.id];
    let cardCls = 'question-card';
    if (corrected) {
      if (!a) cardCls += ' card-empty';
      else if (a === q.answer) cardCls += ' card-correct';
      else cardCls += ' card-wrong';
    }
    h += '<div class="' + cardCls + '" id="q-' + q.id + '">';
    h += '<div class="question-header">';
    h += '<span class="question-number">Domanda ' + (i + 1) + ' <span class="orig">(n.' + q.id + ')</span></span>';
    h += '<span class="category-badge" data-cat="' + esc(q.category) + '">' + esc(q.category) + '</span>';
    h += '</div>';
    h += '<div class="question-text">' + esc(q.question) + '</div>';
    h += '<div class="options">';
    ['A','B','C','D'].forEach(l => {
      if (!q.options[l]) return;
      let cls = 'option';
      if (corrected) {
        cls += ' locked';
        if (l === q.answer) cls += ' opt-correct';
        if (a && l === a && a !== q.answer) cls += ' opt-wrong';
      } else {
        if (a === l) cls += ' picked';
      }
      h += '<div class="' + cls + '" onclick="pick(' + q.id + ',\'' + l + '\')">';
      h += '<span class="letter">' + l + '</span>';
      h += '<span class="option-text">' + esc(q.options[l]) + '</span>';
      h += '</div>';
    });
    h += '</div>';
    if (corrected && (!a || a !== q.answer)) {
      var correctText = q.options[q.answer] || '';
      h += '<div class="explanation-box">';
      if (a) {
        var wrongText = q.options[a] || '';
        h += '<span class="exp-wrong">✗ Hai risposto <strong>' + a + '</strong>: ' + esc(wrongText) + '</span><br>';
      } else {
        h += '<span class="exp-wrong">✗ Non hai risposto</span><br>';
      }
      h += '<span class="exp-correct">✓ Risposta corretta: <strong>' + q.answer + '</strong> — ' + esc(correctText) + '</span>';
      h += '</div>';
    }
    h += '</div>';
  });
  c.innerHTML = h;
  const done = questions.filter(q => answers[q.id]).length;
  document.getElementById('progressFill').style.width = Math.round(done / questions.length * 100) + '%';
  document.getElementById('quizInfo').textContent = done + ' / ' + questions.length + ' risposte';
}

async function correggi() {
  corrected = true;
  const elapsed = stopTimer();
  const tot = questions.length;
  const done = questions.filter(q => answers[q.id]).length;
  const ok = questions.filter(q => answers[q.id] === q.answer).length;
  const ko = done - ok;
  const empty = tot - done;

  // Salva su Supabase (asincrono, non blocca l'UI)
  if (!isGuestMode && currentUser) {
    saveAnswersToSupabase(questions, answers);
    saveSessionToSupabase(
      category === 'all' ? 'all' : category,
      tot, ok, ko, empty, elapsed,
      Math.round(ok / tot * 100)
    );
  } else {
    // Guest mode: rimetti in gioco le sbagliate
    const wrongIds = questions.filter(q => answers[q.id] !== q.answer).map(q => q.id);
    if (wrongIds.length > 0) unmarkWrongQuestions(wrongIds, category);
  }

  const pct = Math.round(ok / tot * 100);
  const icon = pct >= 80 ? '🏆' : pct >= 60 ? '👍' : pct >= 40 ? '📚' : '💪';
  document.getElementById('rIcon').textContent = icon;
  document.getElementById('rScore').textContent = pct + '%';
  let d = '<span class="green">✓ ' + ok + ' corrette</span>';
  if (ko) d += ' · <span class="red">✗ ' + ko + ' errate</span>';
  if (empty) d += ' · <span class="orange">— ' + empty + ' senza risposta</span>';
  document.getElementById('rDetail').innerHTML = d;
  document.getElementById('rTime').textContent = '⏱ Tempo: ' + formatTime(elapsed);
  document.getElementById('resultsCard').classList.add('visible');
  document.getElementById('btnCorreggi').classList.add('hidden');
  if (ko || empty) document.getElementById('btnErrori').classList.remove('hidden');
  document.getElementById('btnHome').classList.remove('hidden');
  render();
  document.getElementById('resultsCard').scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function rivediErrori() {
  for (const q of questions) {
    const a = answers[q.id];
    if (!a || a !== q.answer) {
      document.getElementById('q-' + q.id).scrollIntoView({ behavior: 'smooth', block: 'center' });
      return;
    }
  }
}

function esc(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

// Enter key per login
document.getElementById('authPassword').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') handleAuth();
});

// Avvia: controlla se c'è già una sessione
// ============================================================
// STATISTICHE
// ============================================================

async function showStats() {
  if (isGuestMode || !currentUser) {
    document.getElementById('statsContent').innerHTML = '<div class="stats-empty">Le statistiche sono disponibili solo con un account. Registrati per tracciare i tuoi progressi!</div>';
    document.getElementById('homePage').classList.remove('visible');
    document.getElementById('quizPage').style.display = 'none';
    document.getElementById('statsPage').classList.add('visible');
    return;
  }

  document.getElementById('homePage').classList.remove('visible');
  document.getElementById('quizPage').style.display = 'none';
  document.getElementById('statsPage').classList.add('visible');
  document.getElementById('statsContent').innerHTML = '<div class="stats-empty"><div class="spinner"></div><br>Caricamento statistiche...</div>';

  try {
    // Carica tutte le risposte
    const { data: allAnswers, error: err1 } = await sb
      .from('user_answers')
      .select('question_id, category, is_correct, answered_at')
      .eq('user_id', currentUser.id)
      .order('answered_at', { ascending: false });

    // Carica le sessioni
    const { data: sessions, error: err2 } = await sb
      .from('quiz_sessions')
      .select('*')
      .eq('user_id', currentUser.id)
      .order('created_at', { ascending: false })
      .limit(20);

    if (err1) throw err1;
    if (err2) throw err2;

    renderStats(allAnswers || [], sessions || []);
  } catch (err) {
    console.error('Errore caricamento statistiche:', err);
    document.getElementById('statsContent').innerHTML = '<div class="stats-empty">Errore nel caricamento delle statistiche. Riprova.</div>';
  }
}

function renderStats(allAnswers, sessions) {
  if (allAnswers.length === 0) {
    document.getElementById('statsContent').innerHTML = '<div class="stats-empty">Non hai ancora completato nessun quiz. Inizia a studiare e le statistiche appariranno qui!</div>';
    return;
  }

  // Calcoli generali
  const totalAnswers = allAnswers.length;
  const correctAnswers = allAnswers.filter(a => a.is_correct).length;
  const wrongAnswers = totalAnswers - correctAnswers;
  const globalPct = Math.round(correctAnswers / totalAnswers * 100);

  // Domande uniche risposte correttamente (ultima risposta per ogni domanda)
  const lastAnswerPerQuestion = {};
  allAnswers.forEach(a => {
    if (!lastAnswerPerQuestion[a.question_id]) {
      lastAnswerPerQuestion[a.question_id] = a; // già ordinati per data desc
    }
  });
  const uniqueMastered = Object.values(lastAnswerPerQuestion).filter(a => a.is_correct).length;
  const totalQuestions = quizData.length;

  // Progressione per categoria
  const categories = [...new Set(quizData.map(q => q.category))].sort();
  const catStats = {};
  categories.forEach(cat => {
    const catTotal = quizData.filter(q => q.category === cat).length;
    const catAnswers = Object.values(lastAnswerPerQuestion).filter(a => a.category === cat);
    const catMastered = catAnswers.filter(a => a.is_correct).length;
    catStats[cat] = { total: catTotal, mastered: catMastered, pct: Math.round(catMastered / catTotal * 100) };
  });

  let html = '';

  // Card 1: Panoramica generale
  html += '<div class="stat-card">';
  html += '<h3>Panoramica Generale</h3>';
  html += '<div class="stat-row">';
  html += '<div class="stat-box"><div class="stat-num blue">' + uniqueMastered + '/' + totalQuestions + '</div><div class="stat-lbl">Domande completate</div></div>';
  html += '<div class="stat-box"><div class="stat-num green">' + globalPct + '%</div><div class="stat-lbl">Risposte corrette</div></div>';
  html += '<div class="stat-box"><div class="stat-num blue">' + sessions.length + '</div><div class="stat-lbl">Quiz svolti</div></div>';
  html += '</div>';
  html += '</div>';

  // Card 2: Corrette vs Sbagliate (totali)
  html += '<div class="stat-card">';
  html += '<h3>Risposte Totali</h3>';
  html += '<div class="stat-row">';
  html += '<div class="stat-box"><div class="stat-num blue">' + totalAnswers + '</div><div class="stat-lbl">Totali</div></div>';
  html += '<div class="stat-box"><div class="stat-num green">' + correctAnswers + '</div><div class="stat-lbl">Corrette</div></div>';
  html += '<div class="stat-box"><div class="stat-num red">' + wrongAnswers + '</div><div class="stat-lbl">Sbagliate</div></div>';
  html += '</div>';
  html += '</div>';

  // Card 3: Progressione per categoria
  html += '<div class="stat-card">';
  html += '<h3>Progressione per Categoria</h3>';
  categories.forEach(cat => {
    const s = catStats[cat];
    html += '<div class="progress-cat">';
    html += '<div class="progress-cat-header">';
    html += '<span class="progress-cat-name">' + esc(cat) + '</span>';
    html += '<span class="progress-cat-pct">' + s.mastered + '/' + s.total + ' (' + s.pct + '%)</span>';
    html += '</div>';
    html += '<div class="progress-cat-bar"><div class="progress-cat-fill" style="width:' + s.pct + '%"></div></div>';
    html += '</div>';
  });
  // Barra totale
  const totalPct = Math.round(uniqueMastered / totalQuestions * 100);
  html += '<div class="progress-cat" style="margin-top:8px; padding-top:12px; border-top:2px solid #e2e8f0;">';
  html += '<div class="progress-cat-header">';
  html += '<span class="progress-cat-name" style="font-weight:700;">TOTALE</span>';
  html += '<span class="progress-cat-pct">' + uniqueMastered + '/' + totalQuestions + ' (' + totalPct + '%)</span>';
  html += '</div>';
  html += '<div class="progress-cat-bar"><div class="progress-cat-fill" style="width:' + totalPct + '%"></div></div>';
  html += '</div>';
  html += '</div>';

  // Card 4: Ultimi quiz
  if (sessions.length > 0) {
    html += '<div class="stat-card">';
    html += '<h3>Ultimi Quiz</h3>';
    sessions.forEach(s => {
      const date = new Date(s.created_at);
      const dateStr = date.toLocaleDateString('it-IT', { day: '2-digit', month: 'short', year: 'numeric' });
      const timeStr = date.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
      const catLabel = s.category === 'all' ? 'Tutte' : s.category;
      const scoreCls = s.score_pct >= 80 ? 'green' : s.score_pct >= 60 ? 'orange' : 'red';
      html += '<div class="session-item">';
      html += '<div class="session-info"><div class="session-cat">' + esc(catLabel) + ' — ' + s.total_questions + ' domande</div>';
      html += '<div class="session-date">' + dateStr + ' alle ' + timeStr + ' · ' + formatTime(s.elapsed_seconds) + '</div></div>';
      html += '<div><div class="session-score ' + scoreCls + '">' + s.score_pct + '%</div>';
      html += '<div class="session-detail">' + s.correct_count + '/' + s.total_questions + '</div></div>';
      html += '</div>';
    });
    html += '</div>';
  }

  document.getElementById('statsContent').innerHTML = html;
}

function hideStats() {
  document.getElementById('statsPage').classList.remove('visible');
  document.getElementById('homePage').classList.add('visible');
  window.scrollTo({ top: 0 });
}

checkExistingSession();
</script>
</body>
</html>
