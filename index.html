o corpo nello spazio e nel tempo","B":"Un’immagine di sé, vera rappresentazione topologica del corpo nello spazio","C":"In una rappresentazione anatomicamente dettagliata del corpo dell’allievo","D":"Una rappresentazione cognitiva della posizione e dell’estensione del corpo nello spazio, dell’organizzazione gerarchica dei singoli segmenti corporei, in relazione ai dati provenienti dal mondo interno ed esterno, finalizzata all’organizzazione dell’azione nello spazio"},"answer":"D"},{"id":665,"question":"In quale dei seguenti allenamenti si utilizza il sistema energetico anaerobico alattacido?","options":{"A":"C3","B":"B1","C":"A2","D":"C2"},"answer":"A"},{"id":666,"question":"In quale fascia d’età si sviluppa la forza rapida?","options":{"A":"Tra i 5 e gli 8 anni","B":"Tra gli 8 e i 12 anni","C":"Tra i 12 e i 16 anni","D":"Oltre i 16 anni"},"answer":"B"},{"id":667,"question":"In quale fascia di età è consigliabile sviluppare le capacità coordinative?","options":{"A":"Dai 16 anni in poi","B":"Dai 6 agli 11 anni","C":"Dagli 0 ai 5 anni","D":"Non c’è un periodo particolare"},"answer":"B"},{"id":668,"question":"In regime di C1 si lavora su:","options":{"A":"Intensità intorno alla soglia anaerobica","B":"Picco di lattato","C":"Tolleranza al lattato","D":"Intensità intorno al massimo consumo di ossigeno"},"answer":"C"},{"id":669,"question":"In una gara a farfalla è possibile nuotare sul fianco?","options":{"A":"Sì","B":"No","C":"Solo nella vasca di ritorno","D":"Solo nella fase subacquea"},"answer":"D"},{"id":670,"question":"Individuare a quale concetto corrisponde la seguente definizione: sono le capacità di dosare, ottimizzare ed adattare il comportamento dell’uomo nello svolgere diversi compiti motori, mediante l’opportuna distribuzione temporale e spaziale degli impegni muscolari, in accordo alle sue capacità condizionali","options":{"A":"Le capacità cinestesiche","B":"Gli analizzatori","C":"Le fasi sensibili","D":"Le capacità coordinative"},"answer":"D"},{"id":671,"question":"Inspirazione ed espirazione hanno gli stessi tempi esecutivi in acqua?","options":{"A":"Sì, sempre","B":"Dipende dagli stili","C":"No, l’inspirazione ha un tempo minore","D":"No, l’espirazione ha un tempo minore"},"answer":"C"},{"id":672,"question":"L’allenamento giovanile, in particolare per gli Esordienti B, è finalizzato:","options":{"A":"Al raggiungimento della performance","B":"All’incremento delle capacità coordinative","C":"Al perfezionamento della tecnica","D":"Alla convocazione nelle rappresentative regionali"},"answer":"B"},{"id":673,"question":"L’allenamento specifico della forza può iniziare:","options":{"A":"Mai","B":"A 8 – 10 anni","C":"A 11 – 12 anni","D":"A 13 – 15 anni"},"answer":"D"},{"id":674,"question":"L’apprendimento della tecnica è influenzato da fattori:","options":{"A":"Coordinativi e condizionali","B":"Interni ed esterni","C":"Muscolari ed organici","D":"Alimentari e psicologici"},"answer":"A"},{"id":675,"question":"L’apprendimento motorio passa attraverso tre fasi:","options":{"A":"Fase della coordinazione grezza, coordinazione globale e coordinazione disponibile","B":"Fase della coordinazione grezza, coordinazione fine e disponibilità variabile","C":"Fase della coordinazione grezza, coordinazione globale e coordinazione analitica","D":"Fase della costituzione – condizione – coordinazione - controllo"},"answer":"B"},{"id":676,"question":"L’attivazione di un sistema energetico piuttosto che un altro dipende:","options":{"A":"Dal livello di allenamento","B":"Dalla produzione di adrenalina","C":"Dal momento della giornata","D":"Dalle caratteristiche dell’esercizio fisico e dallo stato nutrizionale"},"answer":"D"},{"id":677,"question":"L’attività sportiva per l’adolescente può:","options":{"A":"Essere considerata uno svago","B":"Avere influenza sul piano fisico ma non su quello cognitivo","C":"Migliorare l’immagine corporea","D":"(Solo negli sport di squadra) Sviluppare l’ambito socio-affettivo e relazionale"},"answer":"C"},{"id":678,"question":"L’equilibrio in acqua si ottiene:","options":{"A":"Mantenendo una posizione consona e reagendo allo squilibrio con una contrazione contro laterale","B":"Con la frequenza di un corso intensivo","C":"In posizione verticale in rilassamento generale in altre posizioni opportune mantenendo una posizione consona","D":"Solo in galleggiamento prono e supino"},"answer":"C"},{"id":679,"question":"L’equilibrio:","options":{"A":"È la capacità di eseguire un compito motorio mantenendo il corpo in equilibrio statico","B":"È la capacità di eseguire un compito motorio mantenendo il corpo in equilibrio dinamico","C":"È regolato prevalentemente dalle informazioni dell’analizzatore cinestesico e tattile","D":"È regolato prevalentemente dalle informazioni dell’analizzatore ottico e vestibolare"},"answer":"C"},{"id":680,"question":"L’errore sportivo è:","options":{"A":"L’esecuzione involontariamente diversa dalla richiesta tecnica avuta","B":"Il risultato di una distrazione","C":"L’allontanamento dal modello prestativo","D":"L’interpretazione non corretta della richiesta tecnica"},"answer":"C"},{"id":681,"question":"L’espressione motoria tipica dei bambini e dei preadolescenti è:","options":{"A":"La rapidità","B":"La forza","C":"La tenacia","D":"La resistenza"},"answer":"A"},{"id":682,"question":"L’insieme delle strutture cerebrali deputate al controllo del movimento si chiama:","options":{"A":"Sistema di raccolta, progettazione e regolazione del movimento","B":"Sistema sensibile","C":"Sistema olistico","D":"Sistema sensomotorio"},"answer":"D"},{"id":683,"question":"L’interruzione della battuta di gambe a crawl è solitamente imputabile a:","options":{"A":"Limitata rotazione spalle durante la respirazione che provoca la rotazione dell’anca con conseguente incrocio delle gambe","B":"Pigrizia mentale del nuotatore","C":"Mancanza di coordinazione braccia/gambe","D":"Minore propulsione della bracciata"},"answer":"C"},{"id":684,"question":"L’ontogenesi della motricità si compone di due fasi, quali?","options":{"A":"Maturazione anatomica – maturazione funzionale","B":"Maturazione organica – maturazione psichica","C":"Maturazione biologica – maturazione chimico-fisica","D":"Maturazione endogena – maturazione esogena"},"answer":"A"},{"id":685,"question":"L’organizzazione delle sensazioni relative al proprio corpo in rapporto con i dati del mondo esterno definisce:","options":{"A":"Lo schema corporeo","B":"Le capacità coordinative","C":"Lo schema motorio","D":"L’età biologica"},"answer":"A"},{"id":686,"question":"La coordinazione è la capacità di:","options":{"A":"Mantenere o riacquistare con il corpo una posizione stabile in differenti situazioni statiche o dinamiche","B":"Compiere atti motori utilizzando la massima escursione articolare","C":"Regolare e dosare il complesso degli impegni muscolari onde ottenere l’azione con rapidità, precisione e armonia","D":"Ottimizzare il rapporto peso/potenza"},"answer":"A"},{"id":687,"question":"La differenziazione cinestesica è:","options":{"A":"Un particolare analizzatore","B":"Una capacità condizionale non sempre allenabile","C":"Una capacità coordinativa speciale","D":"Una capacità coordinativa generale"},"answer":"C"},{"id":688,"question":"La diminuzione della frequenza cardiaca a riposo è sinonimo di:","options":{"A":"Uno stato di affaticamento","B":"Un incombente collasso cardiocircolatorio","C":"Una migliore efficienza funzionale","D":"Una aumentata diffusione periferica del plasma"},"answer":"C"},{"id":689,"question":"La fase della coordinazione fine:","options":{"A":"Consente un movimento più fluido, armonico e compiuto","B":"Non conosce momenti di stasi","C":"Non è influenzata da fattori di disturbo","D":"È l’ultimo stadio del processo di apprendimento"},"answer":"A"},{"id":690,"question":"La fase della coordinazione grezza:","options":{"A":"È caratterizzata dall’attività di comprensione del compito motorio","B":"Non è subordinata alla dimostrazione pratica","C":"Migliora se non si effettuano ripetizioni riuscite e corrette","D":"È secondo una capacità coordinativa speciale"},"answer":"A"},{"id":691,"question":"La fase della disponibilità variabile è:","options":{"A":"La fase in cui la rappresentazione del movimento diventa più completa","B":"L’ultimo stadio del processo di apprendimento","C":"Lo stadio intermedio in cui è importante variare la disponibilità delle proprie abilità","D":"La fase in cui viene, erroneamente, automatizzato l’errore"},"answer":"B"},{"id":692,"question":"La formazione di abilità motorie contribuisce a sviluppare le capacità coordinative?","options":{"A":"Solo nell’apprendimento delle tecniche","B":"Sì, in base alle fasi sensibili","C":"Sempre, in ogni caso","D":"No, le capacità coordinative si sviluppano in modo autonomo"},"answer":"C"},{"id":693,"question":"La forza è:","options":{"A":"Una capacità condizionale","B":"Una capacità coordinativa","C":"Una caratteristica genetica","D":"Una capacità mista"},"answer":"A"},{"id":694,"question":"La forza può essere:","options":{"A":"Coordinata, psicologica, breve","B":"Intensa, lieve, media","C":"Condizionale, motoria, tenue","D":"Massimale, resistente, veloce"},"answer":"D"},{"id":695,"question":"La frequenza cardiaca:","options":{"A":"Va controllata perché aiuta a valutare il diverso grado di affaticamento degli allievi","B":"Deve rimanere ai livelli elevati durante tutta la lezione","C":"Deve rimanere a livelli simili a quelli che di hanno durante il riposo","D":"È uguale per tutti i soggetti che effettuano gli stessi esercizi"},"answer":"A"},{"id":696,"question":"La lentezza della nuotata a rana è prevalentemente dovuta a:","options":{"A":"Extrarotazione dei piedi durante il colpo di gambe","B":"Mancanza della fase di spinta degli arti inferiori","C":"Recupero subacqueo degli arti inferiori","D":"Alternanza delle azioni propulsive su un assetto di galleggiamento non ideale"},"answer":"D"},{"id":697,"question":"La mobilità articolare è:","options":{"A":"L’esecuzione veloce di movimenti ampi","B":"La capacità di eseguire movimenti con la massima ampiezza","C":"La capacità di eseguire movimenti con la massima velocità","D":"Una circostanza che aumenta l’economia del gesto e facilita l’affaticamento"},"answer":"B"},{"id":698,"question":"La mobilità articolare è:","options":{"A":"La capacità di compiere azioni rapidamente","B":"La capacità di compiere gesti con la massima escursione","C":"La capacità di muovere gli arti singolarmente","D":"La capacità d vincere una resistenza in un tempo breve"},"answer":"B"},{"id":699,"question":"La motivazione:","options":{"A":"È alla base dell’apprendimento","B":"È legata all’età dell’individuo","C":"Non conosce fattori inibenti","D":"Può essere trascurata relativamente all’apprendimento tecnico"},"answer":"A"},{"id":700,"question":"La motricità si basa:","options":{"A":"Sulle funzioni del SNC e degli organi di senso","B":"Sull’attività della muscolatura","C":"Sull’intelligenza speculativa","D":"Sulle funzioni organiche e muscolari"},"answer":"A"},{"id":701,"question":"La multilateralità può essere di tipo:","options":{"A":"Simbolico","B":"Motorio e propedeutico","C":"Proteico","D":"Generale e mirato"},"answer":"D"},{"id":702,"question":"La multilateralità può essere salvaguardata, durante l’allenamento:","options":{"A":"Attraverso esercizi che prevedano il nuoto in tutti gli stili","B":"Attraverso la sintesi di due principi : ricchezza di mezzi e alternanza di esercizi","C":"Facendo nuotare ai giovani tutte le distanze a stile libero","D":"Attraverso l’utilizzo di serie di allenamento molto frazionate"},"answer":"B"},{"id":703,"question":"La percezione è:","options":{"A":"La funzione che ci permette di raccogliere informazioni relative a ciò che succede dentro il nostro corpo e a quello che succede all’esterno","B":"La stimolazione sensoriale che non raggiunge i livelli della coscienza","C":"La funzione che indica il livello di tensione di un muscolo scheletrico","D":"Una capacità coordinativa speciale"},"answer":"A"},{"id":704,"question":"La prestazione motoria dipende da:","options":{"A":"Costituzione, condizione, coordinazione e valutazione","B":"Costituzione, condizione, sperequazione e controllo","C":"Costituzione, valutazione, sperequazione e coordinazione","D":"Costituzione, condizione, coordinazione e controllo"},"answer":"D"},{"id":705,"question":"La programmazione consente di:","options":{"A":"Definire procedure e mezzi per favorire l’apprendimento","B":"Definire la crescita della personalità dell’allievo","C":"Abbreviare la progressione didattica","D":"Programmare un ruolo più attivo dell’allievo più dotato"},"answer":"A"},{"id":706,"question":"La resistenza d’onda è dovuta:","options":{"A":"Alla particolare resistenza della superficie dell’acqua.","B":"Ai movimenti circolari dell’acqua che risucchiano il corpo.","C":"Ai movimenti superficiali dell’acqua che condizionano l’avanzata. del corpo","D":"Alla percentuale di massa grassa del nuotatore"},"answer":"C"},{"id":707,"question":"La resistenza di attrito è dovuta:","options":{"A":"Alla superficie del piano perpendicolare all’asse di avanzamento","B":"Allo sfregamento del corpo con le molecole d’acqua","C":"Ai movimenti superficiali dell’acqua che condizionano l’avanzata. del corpo","D":"Alla percentuale di massa grassa del nuotatore"},"answer":"B"},{"id":708,"question":"La resistenza di superficie o tensione superficiale è dovuta:","options":{"A":"Alla particolare resistenza della superficie dell’acqua","B":"Ai movimenti circolari dell’acqua che risucchiano il corpo","C":"Allo sfregamento del corpo con le molecole d’acqua","D":"Alla percentuale di massa grassa del nuotatore"},"answer":"A"},{"id":709,"question":"La resistenza di vortice, o turbolenza, è dovuta:","options":{"A":"Alla superficie del piano perpendicolare all’asse di avanzamento","B":"Ai movimenti circolari dell’acqua che risucchiano il corpo","C":"Ai movimenti superficiali dell’acqua che condizionano l’avanzata del corpo","D":"Alla percentuale di massa grassa del nuotatore"},"answer":"B"},{"id":710,"question":"La resistenza è:","options":{"A":"Una capacità coordinativa","B":"Una capacità condizionale","C":"Una condizione psicomotoria","D":"Una tecnica psicologica"},"answer":"B"},{"id":711,"question":"La resistenza frontale all’avanzamento in acqua è dovuta","options":{"A":"Alla superficie del piano perpendicolare all’asse di avanzamento","B":"Alla particolare resistenza della superficie dell’acqua","C":"Ai movimenti circolari dell’acqua che risucchiano il corpo","D":"Alla tipologia di prodotti usati per la clorazione"},"answer":"A"},{"id":712,"question":"La resistenza frontale, raddoppiando la velocità di avanzamento, aumenta di:","options":{"A":"2 volte","B":"3 volte","C":"4 volte","D":"8volte"},"answer":"C"},{"id":713,"question":"La sensazione è:","options":{"A":"La è la funzione che ci permette di raccogliere informazioni relative a ciò che succede dentro il nostro corpo e a quello che succede all’esterno","B":"Una componente della prestazione","C":"La stimolazione sensoriale che non raggiunge i livelli della coscienza","D":"La premonizione di eventi futuri"},"answer":"C"},{"id":714,"question":"La sensopercezione è:","options":{"A":"Un’attività conoscitiva che permette di percepire gli stimoli provenienti dagli analizzatori","B":"Un esercizio per migliorare la sensibilità degli allievi","C":"Una capacità condizionale","D":"Un insieme di stimoli atti a migliorare la prestazione"},"answer":"A"},{"id":715,"question":"La spinta di galleggiamento è:","options":{"A":"La forza applicata al baricentro","B":"La forza applicata al centro di galleggiamento","C":"La combinazione tra forza di gravità e peso corporeo","D":"La forza espressa dalla gambata"},"answer":"B"},{"id":716,"question":"La supercompensazione è:","options":{"A":"Un processo mediante il quale il disagio provoca una situazione di fatica , cui segue una reazione ricostruttiva che supera la fatica precedente","B":"Un processo in relazione al quale tutte le fatiche vengono superate attraverso stimolazioni muscolari","C":"Un processo di ricostruzione dello stimolo a seguito di carichi di lavoro di tipo C2","D":"Il processo mediante il quale lo stimolo provoca una condizione di disagio (la fatica), cui segue una reazione ricostruttiva che supera il livello precedente alla stimolazione"},"answer":"D"},{"id":717,"question":"La tecnica della nuotata a dorso prevede che:","options":{"A":"Le braccia siano perfettamente opposte","B":"Un braccio entri in acqua prima dell’inizio della parte finale di spinta dell’altro","C":"La velocità condizioni le fasi della bracciata","D":"Siano deliberamente escluse esercitazioni sulla respirazione (il capo è emerso)"},"answer":"B"},{"id":718,"question":"La tecnica di partenza denominata track start permette:","options":{"A":"Di aggrappare entrambi i piedi al blocco","B":"Un movimento più spettacolare","C":"Di avere più equilibrio sul blocco","D":"Di applicare la spinta per un tempo più lungo"},"answer":"C"},{"id":719,"question":"La tecnica natatoria ottimale è:","options":{"A":"Stabile nella struttura e variabile nei dettagli","B":"Stabile nei dettagli e variabile nella struttura","C":"Stabile nella struttura e nei dettagli","D":"Variabile nella struttura e nei dettagli"},"answer":"A"},{"id":720,"question":"La track start è","options":{"A":"Un movimento che nella pallanuoto serve a smarcarsi","B":"Il passaggio di posizione da gambe allungate a gambe fuori nel nuoto sincronizzato","C":"La partenza dal blocco dove i piedi non sono allineati","D":"Una presa per il trasporto del manichino nel salvamento sportivo"},"answer":"C"},{"id":721,"question":"La variazione di un esercizio in una progressione didattica stimola maggiormente le capacità:","options":{"A":"Vestibolari","B":"Coordinative","C":"Visive","D":"Condizionali"},"answer":"B"},{"id":722,"question":"La velocità di una bracciata a crawl è:","options":{"A":"Non misurabile","B":"La stessa in ogni fase","C":"Progressivamente accelerata","D":"Progressivamente decelerata"},"answer":"C"},{"id":723,"question":"La velocità è:","options":{"A":"La capacità di eseguire un gesto nel minor tempo possibile","B":"La capacità che ci permette di essere rapidi","C":"La capacità che ci permette di coordinare i movimenti","D":"Una capacità coordinativi"},"answer":"A"},{"id":724,"question":"Le capacità condizionali dipendono principalmente:","options":{"A":"Da aspetti di tipo fisiologico, energetico, biochimico","B":"Da aspetti neuronali dettati dal sistema nervoso centrale","C":"Da aspetti socio-educativi","D":"Da aspetti energetici, biologici, fisiologici e coordinativi"},"answer":"D"},{"id":725,"question":"Le capacità condizionali si sviluppano:","options":{"A":"Da appena nati","B":"Dai 10 anni","C":"Dai 4 ai 10 anni","D":"Esclusivamente in età adulta"},"answer":"B"},{"id":726,"question":"Le capacità condizionali sono capacità fisiche determinate da:","options":{"A":"Fattori energetici","B":"Fattori psicologici","C":"Fattori antropologici","D":"Fattori neurologici"},"answer":"A"},{"id":727,"question":"Le capacità coordinative devono essere esercitate a partire da:","options":{"A":"8 anni","B":"5/6 anni","C":"12 anni","D":"10 anni"},"answer":"B"},{"id":728,"question":"Le capacità coordinative dipendono:","options":{"A":"Dalla sensibilità muscolare","B":"Dalla funzionalità del sistema nervoso","C":"Dall’apparato cardiocorcolatorio","D":"Dall’età biologica"},"answer":"B"},{"id":729,"question":"Le capacità coordinative generali riguardano:","options":{"A":"Forza, resistenza, velocità","B":"Orientamento, ritmo, mobilità articolare","C":"Destrezza, equilibrio, elasticità dei movimenti","D":"Apprendimento, controllo, trasformazione dei movimenti"},"answer":"D"},{"id":730,"question":"Le capacità coordinative:","options":{"A":"Controllano, regolano ed organizzano il movimento","B":"Sono legate ad aspetti antropometrici ed energetici","C":"Sono legate al sistema nervoso centrale ma non periferico","D":"Controllano primariamente il movimento di arti inferiori e superiori"},"answer":"A"},{"id":731,"question":"Le capacità motorie sono classificate in:","options":{"A":"Coordinative, compensative, condizionali","B":"Coordinative e condizionali","C":"Coordinative, condizionali ed intermedie","D":"Capacità di compiere o inibire movimenti"},"answer":"C"},{"id":732,"question":"Le capacità motorie sono:","options":{"A":"Apprendimento motorio","B":"Mobilità articolare, coordinazione, condizione","C":"Forza, resistenza, velocità","D":"Costituzione, condizione, coordinazione, controllo"},"answer":"B"},{"id":733,"question":"Le capacità sensopercettive dipendono da:","options":{"A":"L’istruttore","B":"L’ambiente","C":"L’individuo","D":"Le capacità coordinative"},"answer":"C"},{"id":734,"question":"Le capacità sensopercettive sono la base per la costruzione della:","options":{"A":"Abilità","B":"Tecnica","C":"Tattica","D":"Affettività"},"answer":"B"},{"id":735,"question":"Le esercitazioni sulla multilateralità incrementano:","options":{"A":"Lo sviluppo condizionale","B":"Lo sviluppo coordinativo","C":"I fattori allenanti","D":"La mobilità articolare dei distretti coinvolti"},"answer":"B"},{"id":736,"question":"Le fasi dello sviluppo della coordinazione sono:","options":{"A":"Controllo, adattamento e trasformazione","B":"Coordinazione grezza, coordinazione fine e disponibilità variabile","C":"Iniziale, intermedia e finale","D":"Intensità, densità, volume"},"answer":"B"},{"id":737,"question":"Le fasi sensibili:","options":{"A":"Sono legate all’attività degli analizzatori","B":"Servono per migliorare la sensibilità all’acqua","C":"Sono solo ipotizzate","D":"Sono periodi dello sviluppo in cui alcuni stimoli provocano miglioramenti significativi"},"answer":"D"},{"id":738,"question":"Le resistenze all’avanzamento, nel nuoto, sono in numero di:","options":{"A":"2","B":"3","C":"4","D":"5"},"answer":"B"},{"id":739,"question":"Le strutture incaricate alla selezione di stimoli si chiamano:","options":{"A":"Selezionatori","B":"Analizzatori","C":"Elaboratori","D":"Commutatori"},"answer":"B"},{"id":740,"question":"Lo schema corporeo è:","options":{"A":"Lo schema del sistema osteo- articolare","B":"Lo schema logico per organizzare la proposta di esercizi in acqua o in palestra","C":"L’immagine che ognuno ha del proprio corpo in relazione con il mondo esterno","D":"L’immagine esterna del nostro corpo che non può essere percepita"},"answer":"C"},{"id":741,"question":"Lo sviluppo delle capacità coordinative è importante nel nuoto:","options":{"A":"Perché aiuta ad elaborare meglio la sensopercezione acquatica","B":"Perché incrementa le capacità di adattamento all’acqua","C":"Perché favorisce l’incremento della resistenza","D":"Perché favorisce l’accrescimento staturo-ponderale (legge di Stratz)"},"answer":"A"},{"id":742,"question":"Nel crawl dopo il recupero aereo la mano che entra in acqua rispetto alla linea mediana del corpo è:","options":{"A":"Inclinata con il palmo rivolto verso l’esterno","B":"Piatta e scivola verso avanti con il palmo rivolto verso il basso","C":"Inclinata con il palmo rivolto verso l’interno","D":"Tesa e piatta"},"answer":"A"},{"id":743,"question":"Nel crawl la fase finale di spinta subacquea degli arti superiori avviene:","options":{"A":"Verso il basso per maggiore stabilità","B":"In modo costante per senso ritmico","C":"In accelerazione","D":"Dal basso verso l’alto"},"answer":"C"},{"id":744,"question":"Nel dorso, il rollio si esegue per ottenere:","options":{"A":"Rispetto dei regolamenti tecnici","B":"Bracciata più potente in quanto i muscoli lavorano in condizioni biomeccaniche più vantaggiose","C":"Coordinazione 2/6","D":"Facilitazione nel posizionamento della testa, in questo modo si riesce a tenerla più bassa appoggiata all’acqua"},"answer":"B"},{"id":745,"question":"Nel nuoto la tecnica ha come obiettivo:","options":{"A":"Efficacia ed economicità del gesto","B":"Rapidità del gesto","C":"Massima forza massimale applicabile","D":"La distribuzione razionale dei carichi"},"answer":"A"},{"id":746,"question":"Nel nuoto quali sono le articolazioni più stimolate?","options":{"A":"Polso, gomito, ginocchio e tibio- tarsica","B":"Falangi, gomito, coxo-femorale","C":"SNC","D":"Scapolo-omerale, colonna vertebrale, coxo-femorale e tibio-tarsica"},"answer":"D"},{"id":747,"question":"Nel rapporto tra capacità e abilità motorie:","options":{"A":"L’apprendimento delle abilità motorie precede quello delle capacità coordinative","B":"Le abilità motorie si basano esclusivamente sulle capacità condizionali","C":"Le abilità motorie si costruiscono sulle capacità motorie ma il loro esercizio aiuta lo sviluppo di queste ultime","D":"Non esistono rapporti strutturali tra capacità ed abilità motorie"},"answer":"C"},{"id":748,"question":"Nell’allenamento giovanile quale tipo di forza è corretto sviluppare?","options":{"A":"Forza massimale","B":"Forza rapida e veloce","C":"Resistenza alla forza","D":"Forza multilaterale"},"answer":"B"},{"id":749,"question":"Nell’esercizio di lunga durata:","options":{"A":"L’energia è fornita dal meccanismo aerobico","B":"Si accumula acido lattico che impedisce di proseguire il lavoro","C":"Si utilizzano acidi grassi e proteine","D":"Si utilizza prevalentemente la fosfocreatina disponibile a livello muscolare"},"answer":"A"},{"id":750,"question":"Nella battuta di gambe prona e supina, la propulsione è:","options":{"A":"Nulla, la gambata ha solo funzione di equilibrio","B":"Fornita dalla pianta del piede che schiaccia l’acqua","C":"Massimale","D":"Fornita dal dorso del piede"},"answer":"D"},{"id":751,"question":"Nella correzione di un errore nella bracciata a stile libero, bisogna concedere priorità a:","options":{"A":"Continuità - ritmo","B":"Angoli - traiettorie","C":"Presa - appoggio","D":"Fase aerea (recupero)"},"answer":"A"},{"id":752,"question":"Nella farfalla la gambata propulsiva avviene:","options":{"A":"All’inizio della fase inspiratoria","B":"All’entrata in acqua delle mani","C":"Nella fase finale della trazione","D":"Durante la fase di trazione"},"answer":"B"},{"id":753,"question":"Nella farfalla le mani appena entrano in acqua:","options":{"A":"Spingono verso il basso (downsweep)","B":"Tirano verso fuori (outsweep)","C":"Tirano fino alle spalle","D":"Affondano repentinamente"},"answer":"B"},{"id":754,"question":"Nella fase di coordinazione grezza cosa è bene correggere?:","options":{"A":"I dettagli","B":"Gli errori grossolani e i dettagli","C":"Tutto il possibile","D":"Gli errori grossolani"},"answer":"D"},{"id":755,"question":"Nella fase di spinta nel dorso, il palmo della mano è rivolto","options":{"A":"Verso i piedi","B":"Verso il fianco","C":"Verso l’alto","D":"Verso il basso"},"answer":"A"},{"id":756,"question":"Nella fase subacquea a rana dopo la virata la corretta sequenza dei movimenti è:","options":{"A":"Presa, trazione, spinta, recupero","B":"Spinta dal bordo, azione di braccia gambata rana recupero delle braccia","C":"Spinta dal bordo, gambata a delfino, azione delle braccia, recupero, gambata rana","D":"Spinta dal bordo, bracciata, colpo di gambe a delfino recupero delle braccia, gambata rana"},"answer":"D"},{"id":757,"question":"Nella nuotata a crawl cosa è importante?","options":{"A":"Consentire alla mano, durante il recupero, di sfiorare l’acqua per non perdere il contatto con la stessa","B":"Effettuare l’ultima parte della passata subacquea con un azione accelerata","C":"Consentire al braccio di guidare il recupero","D":"Consentire alla mano, durante il recupero, di sfiorare l’acqua per prepararsi alla fase di presa"},"answer":"B"},{"id":758,"question":"Nella nuotata a crawl quando deve iniziare la rotazione del capo?","options":{"A":"Prima che l’arto opposto sia entrato in acqua","B":"Quando l’arto opposto inizia la fase di spinta","C":"Quando l’arto opposto è in fase di recupero","D":"Dopo che l’arto opposto è entrato in acqua"},"answer":"D"},{"id":759,"question":"Nella nuotata a dorso l’esercizio definito opposizione di fase è un:","options":{"A":"Esercizio di esclusione","B":"Esercizio di perfezionamento","C":"Esercizio di specializzazione","D":"Esercizio inutile"},"answer":"B"},{"id":760,"question":"Nella nuotata a rana il recupero degli arti inferiori avviene:","options":{"A":"Quando le braccia sono in fase di trazione","B":"Quando le braccia sono nella fase del recupero","C":"Quando le braccia sono in fase di spinta","D":"Quando le braccia sono in fase di presa/appoggio"},"answer":"B"},{"id":761,"question":"Nella nuotata a rana si può considerare errore:","options":{"A":"Inserire una pausa dopo il recupero di ogni bracciata","B":"Sovrapporre l’azione propulsiva delle braccia a quella delle gambe","C":"Effettuare uno scivolamento dopo ogni gambata","D":"Respirare frontalmente"},"answer":"B"},{"id":762,"question":"Nella nuotata a stile libero, un concorrente può rimanere in completa immersione:","options":{"A":"Per tutta la distanza che deve coprire","B":"Mai","C":"Per i primi 12,5 metri (mezza vasca)","D":"Alla partenza ed alle virate, per un massimo di 15 metri"},"answer":"D"},{"id":763,"question":"Nella preparazione infantile e giovanile, la formazione condizionale deve mirare allo sviluppo di:","options":{"A":"Forza veloce, resistenza anaerobica e resistenza alla forza","B":"Forza rapida, resistenza aerobica e resistenza alla forza","C":"Forza rapida, resistenza anaerobica e resistenza alla forza","D":"Forza rapida, resistenza aerobica e resistenza alla fatica"},"answer":"B"},{"id":764,"question":"Nella rana effettuare un forte sollevamento del busto consente al nuotatore:","options":{"A":"Il recupero degli avambracci fuori dall’acqua","B":"Il recupero delle braccia fuori dall’acqua","C":"Di facilitare la fase di inspirazione durante il ciclo di bracciata","D":"Di controllare meglio gli avversari"},"answer":"A"},{"id":765,"question":"Nella realizzazione del progetto d’azione, all’interno della programmazione dello schema motorio, possiamo affermare che:","options":{"A":"La riformulazione del progetto d’azione si verifica spontaneamente","B":"Una volta formato lo schema motorio esso è immodificabile per tutta la vita del soggetto.","C":"È possibile una riformulazione del progetto d’azione e quindi dello schema motorio attraverso un confronto tra risultato atteso e risultato reale dell’azione","D":"È possibile una riformulazione del progetto d’azione senza alcuna verifica del risultato"},"answer":"C"},{"id":766,"question":"Nella resistenza aerobica l’intensità dell’andatura è:","options":{"A":"Molto blanda","B":"Intorno al massimo consumo di ossigeno","C":"Tolleranza al lattato","D":"Velocità submassimale"},"answer":"A"},{"id":767,"question":"Nella scuola nuoto è corretto far eseguire esercizi di:","options":{"A":"Forza rapida","B":"Resistenza alla forza","C":"Resistenza rapida","D":"Resistenza alla velocità"},"answer":"A"},{"id":768,"question":"Nella tecnica del dorso la fase di spinta della bracciata termina:","options":{"A":"Verso il basso","B":"Verso l’alto","C":"Verso l’esterno","D":"Contro il corpo"},"answer":"A"},{"id":769,"question":"Nelle esercitazioni definite di potenza aerobica la frequenza cardiaca è:","options":{"A":"130-150 Battiti per minuto","B":"170-190 Battiti per minuto","C":"150-170 Battiti per minuto","D":"Oltre 190 battiti per minuto"},"answer":"B"},{"id":770,"question":"Nello stile libero la fase di spinta dell’arto superiore avviene","options":{"A":"Dopo la fase aerea","B":"Dopo l’appoggio-presa","C":"Prima della trazione","D":"Dopo la trazione"},"answer":"D"},{"id":771,"question":"Nuotare con gli occhi chiusi è un esercizio coordinativo di che tipo?","options":{"A":"Di esclusione","B":"Di accoppiamento","C":"Di differenziazione","D":"Di pronazione"},"answer":"A"},{"id":772,"question":"Nuotare per brevi tratti molto veloci alternati a tratti lenti è un’attività di tipo:","options":{"A":"Aerobico","B":"Anaerobico alattacido","C":"Anaerobico lattacido","D":"Tecnico-coordinativo"},"answer":"B"},{"id":773,"question":"Parametri fisiologici delle esercitazioni A1-A2","options":{"A":"Frequenza cardiaca 150-180 bpm – lattacidemia 2,5-3 mmol/l","B":"Frequenza cardiaca < 150 bpm - lattacidemia < 2,5 mmol/l","C":"Frequenza cardiaca massimale – lattacidemia massimale","D":"Frequenza cardiaca > 180 bpm – lattacidemia > 2,5 mmol/l"},"answer":"A"},{"id":774,"question":"Per allenare la forza rapida gli sforzi devono essere:","options":{"A":"Brevissimi (3-9 secondi)","B":"Brevi (10-15 secondi)","C":"Medi (18-30 secondi)","D":"Lunghi (oltre il minuto)"},"answer":"A"},{"id":775,"question":"Per allenare la resistenza bisogna:","options":{"A":"Nuotare velocemente per lunghi tratti","B":"Nuotare velocemente per brevi tratti","C":"Nuotare lentamente per brevi tratti","D":"Nuotare lentamente per lunghi tratti"},"answer":"D"},{"id":776,"question":"Per carico fisico esterno, intendiamo","options":{"A":"La frequenza cardiaca mantenuta in allenamento","B":"La quantità di lavoro che si svolge all’aperto","C":"La massima sopportazione allo sforzo dell’organismo","D":"La quantità degli esercizi di allenamento"},"answer":"D"},{"id":777,"question":"Per fattori di prestazione s’intendono:","options":{"A":"L’insieme delle capacità generali dell’individuo","B":"Le risorse interne dell’individuo","C":"I principi dell’allenamento","D":"La costituzione, la condizione, la coordinazione e la mobilità articolare"},"answer":"A"},{"id":778,"question":"Per formare la struttura di base del nuotatore bisogna curare:","options":{"A":"L’affinamento del gesto","B":"Le esercitazioni analitiche","C":"Il benessere e il buonumore del gruppo","D":"Il ritmo e l’ampiezza del gesto"},"answer":"D"},{"id":779,"question":"Per incrementare il carico si varia prima:","options":{"A":"Il volume e l’intensità","B":"La durata ed il volume","C":"L’intensità e la densità","D":"La durata e la densità"},"answer":"B"},{"id":780,"question":"Per lo sviluppo della sensopercezione è utile:","options":{"A":"Amplificare o inibire le informazioni provenienti dagli analizzatori","B":"Esercitarsi sulle singole azioni delle nuotate","C":"Stimolare i differenti meccanismi energetici","D":"Curare al massimo la comunicazione non verbale"},"answer":"A"},{"id":781,"question":"Per lo sviluppo della sensopercezione è utile:","options":{"A":"Amplificare o inibire le informazioni provenienti dagli analizzatori","B":"Esercitarsi sulle singole azioni delle nuotate","C":"Aumentare le ripetute","D":"Utilizzare un’ampia gamma di esercizi"},"answer":"A"},{"id":782,"question":"Per provocare nuovi adattamenti a livello più elevato, un carico di lavoro deve:","options":{"A":"Sviluppare sempre il suo massimale","B":"Stabilizzarsi nel tempo","C":"Progressivamente crescere","D":"Decrescere progressivamente"},"answer":"C"},{"id":783,"question":"Per unità di base del movimento intendiamo:","options":{"A":"Le capacità condizionali","B":"Gli schemi motori di base","C":"Le fasi delle bracciate nei diversi stili","D":"Le capacità coordinative"},"answer":"D"},{"id":784,"question":"Perché lo stile libero è la nuotata più veloce?","options":{"A":"Perché si possono fare la virate a capovolta senza toccare con le mani","B":"Perché è la nuotata in cui il nuotatore può applicare la massima potenza angolare con un azione propulsiva continua","C":"Perché l’azione propulsiva delle gambe è particolarmente efficace","D":"Perché a differenza che negli altri stili, si nuota sempre in superficie"},"answer":"B"},{"id":785,"question":"Qual è il momento di maggiore difficoltà nella virata a dorso ?","options":{"A":"Uscita dalla fase subacquea","B":"Rotazione al muro","C":"Avvicinamento al muro e calcolo della giusta distanza","D":"Nessuna difficoltà particolare perché è una virata molto facile da eseguire"},"answer":"C"},{"id":786,"question":"Qual è il presupposto biologico fondamentale per lo sviluppo della coordinazione?","options":{"A":"La maturazione sessuale","B":"Lo sviluppo delle masse muscolari","C":"L’incremento della funzionalità cardiocircolatoria","D":"La funz ti","D":"Fasi olistiche"},"answer":"B"},{"id":266,"question":"A dorso le braccia si muovono:","options":{"A":"In sequenza, prima uno e poi l’altro","B":"Liberamente","C":"Quando un braccio entra l’altro è a metà recupero","D":"In opposizione, un braccio entra in acqua e l’altro esce"},"answer":"D"},{"id":267,"question":"A stile libero, dopo la partenza e dopo ogni virata, per quanto è consentito rimanere in completa immersione?","options":{"A":"Non c’è nessun limite","B":"10 metri","C":"15 metri","D":"25 metri"},"answer":"C"},{"id":268,"question":"Affinché un bambino acquisisca un buon galleggiamento bisogna:","options":{"A":"Che sappia nuotare almeno il crawl e il dorso","B":"Che abbia acquisito una buona educazione respiratoria","C":"Che trascorrano almeno sei mesi di ambientamento","D":"Che sia ben rilassato"},"answer":"D"},{"id":269,"question":"Ambientamento e acquaticità:","options":{"A":"Sono la stessa cosa","B":"L’ambientamento è legato a caratteristiche psicologiche, l’acquaticità a caratteristiche tecniche","C":"Sono caratteristiche indipendenti tra di loro, da sviluppare con esercizi differenti","D":"Una buona acquaticità è un presupposto per ottenere un buon\nambientamento"},"answer":"B"},{"id":270,"question":"Ambientamento significa:","options":{"A":"Rimanere molto tempo in acqua","B":"Acquisire un rapporto naturale con l’acqua e stare bene in acqua","C":"Nuotare veloci","D":"Entusiasmo e amicizia"},"answer":"B"},{"id":271,"question":"Anelli della catena della sopravvivenza nel giusto ordine:","options":{"A":"RCP – attivazione del 118 – defibrillazione – trattamenti avanzati","B":"Trattamenti avanzati – defibrillazione – RCP – attivazione del 118","C":"Attivazione del 118 – RCP – trattamenti avanzati – defibrillazione","D":"Attivazione del 118 – RCP – defibrillazione – trattamenti avanzati"},"answer":"D"},{"id":272,"question":"BLS (Basic Life Support) è:","options":{"A":"L’insieme delle manovre da effettuare solamente nei casi di ostruzione delle vie aeree","B":"L’acronimo di Biological Lifelearning Swimming","C":"L’insieme delle tecniche da usare nella rianimazione","D":"il complesso delle differenti nuotate di base da usare nell’avvicinamento e\nnel trasporto del pericolante"},"answer":"C"},{"id":273,"question":"Caratteristiche della respirazione in acqua:","options":{"A":"Si espira e si inspira dal naso","B":"Si inspira e si espira dalla bocca","C":"Si inspira dal naso e si espira dalla bocca","D":"Si inspira dalla bocca si espira dalla\nbocca o dal naso"},"answer":"D"},{"id":274,"question":"Ciambelle, braccioli, tavolette, tubi, ecc., sono:","options":{"A":"Sussidi didattici","B":"Oggetti di plastica galleggianti","C":"Oggetti per giocare in piscina","D":"Oggetti rituali"},"answer":"A"},{"id":275,"question":"Come ci si comporta in caso di emergenza che renda necessario evacuare la piscina?","options":{"A":"Mettersi in salvo","B":"Far uscire gli allievi in ordine e indirizzarli verso l’uscita di emergenza","C":"Allertare il servizio di emergenza e mettersi in salvo","D":"Far uscire gli allievi mettendoli in fila,\ncontandoli e accompagnandoli verso l’uscita d’emergenza"},"answer":"D"},{"id":276,"question":"Come comportarsi nel caso di una forte emorragia esterna?","options":{"A":"Non fare nulla","B":"Mettere a sedere l’infortunato con del ghiaccio sulla testa","C":"Perdere conoscenza","D":"Tamponare la ferita e avvisare il pronto soccorso"},"answer":"D"},{"id":277,"question":"Come si allertano i soccorsi del 118?","options":{"A":"Si telefona fornendo i propri dati anagrafici, località e caratteristiche dell’incidente","B":"Si telefona fornendo le caratteristiche dell’incidente e la località","C":"Si telefona fornendo i propri dati anagrafici","D":"Si telefona fornendo informazioni\nconfuse"},"answer":"A"},{"id":278,"question":"Come si costruisce un progetto didattico?","options":{"A":"Affidandosi al buon senso e fare quello che si è sempre fatto","B":"Utilizzando percorsi sperimentati e progressioni didattiche","C":"Applicando i codici di comunicazione federali","D":"Definendo degli obiettivi appropriati e\nscegliendo esercizi orientati per raggiungerli"},"answer":"D"},{"id":279,"question":"Come si costruisce una lezione?","options":{"A":"Stabilendo una scaletta usando degli indicatori e immaginando esercizi adeguati agli obiettivi","B":"Proponendo progressioni didattiche dal semplice al difficile","C":"Cogliendo al momento l’ispirazione","D":"Chiedendo consiglio a un collega più\nesperto"},"answer":"A"},{"id":280,"question":"Come si effettua la selezione dei talenti:","options":{"A":"Attraverso considerazioni del genitore","B":"Attraverso gare sociali, istruttori e allenatori","C":"Attraverso desideri personali","D":"Attraverso il consiglio dei compagni"},"answer":"B"},{"id":281,"question":"Come si può alzare il livello di sicurezza in piscina?","options":{"A":"Stendendo un protocollo della sicurezza a cui tutti devono attenersi","B":"Incaricando istruttori molto attenti e severi","C":"Creando un clima coercitivo","D":"Esercitandosi con la procedura BLS"},"answer":"A"},{"id":282,"question":"Con che frequenza si deve inspirare nuotando a dorso?","options":{"A":"Ogni 4 bracciate","B":"Ogni 3 bracciate","C":"Ogni 2 bracciate","D":"Ogni bracciata"},"answer":"C"},{"id":283,"question":"Contenuti della ginnastica prenatatoria per la fascia di età della scuola primaria, sono:","options":{"A":"Ginnastica analitica","B":"Ginnastica con piccoli attrezzi","C":"Forza massimale","D":"Circuiti e giochi"},"answer":"D"},{"id":284,"question":"Cos’è il GUG?","options":{"A":"Un organo tecnico della F.I.N.","B":"L’organizzazione sindacale dei giudici di gara","C":"Il gruppo che si occupa di formare i tecnici","D":"Un comando dello starter"},"answer":"A"},{"id":285,"question":"Cos’è il SIT?","options":{"A":"Settore istruzione tecnica","B":"Settore interno telematico","C":"Swimming international team","D":"Squadra italiana tuffi"},"answer":"A"},{"id":286,"question":"Cos’è il SIT?","options":{"A":"Il gruppo che si occupa di formare i giudici di gara","B":"L’organizzazione sindacale dei tecnici","C":"Un ente di promozione sportiva","D":"Un organo tecnico della FIN"},"answer":"D"},{"id":287,"question":"Cos’è importante nella nuotata a crawl, dorso e farfalla?","options":{"A":"Le pause nelle azioni","B":"La continuità delle azioni, evitando pause a fine ed inizio bracciata","C":"Delle forti decelerazioni nella fase di spinta","D":"La respirazione ogni due bracciate"},"answer":"B"},{"id":288,"question":"Cos’è la programmazione didattica?","options":{"A":"Un vincolo che i gestori utilizzano per standardizzare il lavoro dell’istruttore","B":"Una suddivisione degli apprendimenti nel tempo","C":"Una successione razionale di progressioni","D":"Un sistema per immaginare e seguire\nun percorso formativo"},"answer":"D"},{"id":289,"question":"Cos’è un protocollo della sicurezza?","options":{"A":"La procedura BLS","B":"Un insieme di norme e comportamenti standard a cui attenersi","C":"Il regolamento di iscrizione ai corsi di nuoto","D":"Un opuscolo contenente informazioni\ngenerali sul funzionamento della struttura"},"answer":"B"},{"id":290,"question":"Cosa deve contenere il protocollo della sicurezza?","options":{"A":"L’elenco degli allievi dei corsi","B":"La sequenza della procedura BLS","C":"Un atlante anatomico","D":"Poche norme ma chiare ed efficaci"},"answer":"D"},{"id":291,"question":"Cosa non va fatto in una situazione di emergenza?","options":{"A":"Spostare il paziente","B":"Somministrare alcolici o comunque da bere","C":"Caricare il paziente su una macchina di passaggio per trasportarlo in ospedale","D":"Tutte le risposte precedenti"},"answer":"D"},{"id":292,"question":"Cosa rappresentano queste sigle: FINA, LEN, COMEN, COLAN, ILS, ILSE?","options":{"A":"Società sportive affiliate alla FIN","B":"Procedure internazionali di sicurezza","C":"Standard costruttivi degli impianti\nnatatori","D":"Federazioni e istituzioni sportive alle quali la FIN è affiliata"},"answer":"D"},{"id":293,"question":"Cosa si fa quando un allievo dice di stare male?","options":{"A":"Gli si dice che non è nulla","B":"Si valuta la situazione","C":"Si grida aiuto","D":"Si allerta immediatamente il STE"},"answer":"B"},{"id":294,"question":"Cosa si prevede che un bambino sappia fare nella prima fase di ambientamento?","options":{"A":"Si sappia tuffare dal bordo autonomamente e riemerge da solo","B":"Abbia un buon rilassamento corporeo","C":"Sappia spostarsi lungo il bordo\nautonomamente","D":"Nuoti per 25m con tecnica a piacere senza interruzioni"},"answer":"B"},{"id":295,"question":"Da che cosa può essere determinata la squalifica per una virata a rana?","options":{"A":"Mani che toccano il muro in modo non contemporaneo","B":"Recupero delle braccia con le mani fuori dall’acqua","C":"Riemergere dopo i 15 metri","D":"Mani che toccano il muro non alla stessa altezza"},"answer":"A"},{"id":296,"question":"Definizione di ambientamento.","options":{"A":"Il periodo in cui un allievo prende confidenza con l’ambiente acquatico","B":"Il momento dell’iscrizione a un corso","C":"La lunga esperienza motoria che\nporta un allievo a padroneggiare i suoi movimenti in acqua, vivendo desideri, superando paure, incontrando relazioni positive e scoprendo nuove cognizioni di sé","D":"L’esperienza di apprendimento del nuoto attraverso attività ludiche"},"answer":"C"},{"id":297,"question":"Definizione di trauma:","options":{"A":"Effetto lesivo provocato su un organismo vivente da parte di un’azione meccanica esterna","B":"Lesione che determina un’interruzione della continuità della cute","C":"Perdita di sangue dal sistema circolatorio","D":"Allontanamento temporaneo di due capi articolari delle estremità delle\nossa di un’articolazione"},"answer":"A"},{"id":298,"question":"Dopo ogni partenza ed ogni virata, tranne in uno stile, a quanti metri deve emergere dall’acqua il nuotatore e con quale parte del corpo?","options":{"A":"Entro 15 metri con il capo","B":"Entro 15 metri con il baricentro del corpo","C":"Entro 10 metri con la parte più avanzata del corpo","D":"Entro 10 metri con il capo"},"answer":"A"},{"id":299,"question":"Dopo una lunga esposizione ai raggi solari a capo scoperto, potrebbe verificarsi:","options":{"A":"Colpo di calore","B":"Idrocuzione","C":"Ustione","D":"Colpo di sole"},"answer":"D"},{"id":300,"question":"Durante il recupero delle gambe a rana, quale parte del corpo provoca il maggior attrito frontale?","options":{"A":"La testa","B":"Il petto","C":"La coscia","D":"I gomiti"},"answer":"B"},{"id":301,"question":"Durante l’ambientamento è importante:","options":{"A":"Far superare fastidi fobie e paure","B":"Spiegare subito le prime forme\npropulsive","C":"Far sistemare i bambini vicino la scaletta per far superare loro la paura","D":"Non congratularsi con i bambini anche se hanno raggiunto un piccolo\ntraguardo"},"answer":"A"},{"id":302,"question":"Durante l’apprendimento dei fondamentali di pallanuoto gli errori sono da imputare più frequentemente a:","options":{"A":"Un’errata presentazione del modello visivo","B":"Un’errata percezione di tutti i feed- back da parte dell’allievo","C":"Un uso improprio dell’analizzatore visivo","D":"All’approfondimento del gesto"},"answer":"B"},{"id":303,"question":"Durante la fase di ambientamento l’allievo:","options":{"A":"Impara a nuotare","B":"Sfrutta inizialmente gli schemi motori terrestri nell’ambiente acquatico","C":"Sfrutta da subito gli schemi motori acquatici","D":"Deve fare esercizi di coordinazione"},"answer":"B"},{"id":304,"question":"Durante la nuotata è normale inspirare attraverso:","options":{"A":"La bocca","B":"La bocca ed il naso","C":"La cute","D":"Solo con il naso"},"answer":"A"},{"id":305,"question":"Durante la prima lezione, in fase di ambientamento, l’istruttore come prima cosa:","options":{"A":"Deve insegnare subito il galleggiamento","B":"Deve far ambientare i propri allievi in acqua alta","C":"Deve provvedere a far conoscere il nuovo ambiente (spogliatoi, piscina, istruttore ecc.) ai nuovi arrivati.","D":"Deve insegnare la respirazione nella forma più ludica possibile"},"answer":"C"},{"id":306,"question":"Durante le sedute di ginnastica educativa e prenatatoria, per un gruppo di bambini in età della scuola primaria, è fondamentale sviluppare e affinare:","options":{"A":"Forza e resistenza.","B":"Capacità di: controllo motorio, apprendimento, capacità di adattamento e trasformazione del movimento.","C":"Schemi motori di base","D":"Orientamento"},"answer":"B"},{"id":307,"question":"Durante una lezione la dimostrazione dell’insegnante deve avvenire:","options":{"A":"Di spalle agli allievi fuori dall’acqua","B":"A specchio fuori dall’acqua","C":"Di spalle gli allievi su un rialzo","D":"Solamente a voce"},"answer":"B"},{"id":308,"question":"È importante che l’istruttore entri in acqua durante l’impostazione dello scivolamento sul dorso in vasca piccola?","options":{"A":"Sì, ma solo se l’esercizio è impostato in acqua alta","B":"No, perché l’allievo non si abituerebbe mai a farlo da solo","C":"No, perché l’istruttore non deve mai perdere di vista gli altri allievi","D":"Sì, perché trasmette sicurezza all’allievo"},"answer":"D"},{"id":309,"question":"È un errore più grave nella nuotata a farfalla:","options":{"A":"Fermare le braccia davanti alla testa per effettuare il secondo colpo di gambe","B":"Non effettuare il secondo colpo di gambe","C":"Non far entrare le braccia in linea con le spalle","D":"Non effettuare la respirazione laterale"},"answer":"A"},{"id":310,"question":"Fasi della bracciata a stile libero:","options":{"A":"Presa, trazione, recupero","B":"Presa, trazione, recupero aereo","C":"Presa, spinta, recupero","D":"Presa, trazione, spinta, recupero"},"answer":"D"},{"id":311,"question":"Figure necessariamente presenti in una Scuola nuoto federale:","options":{"A":"Direttore sportivo- coordinatore – istruttori","B":"Capo istruttori – assistente bagnanti - allenatori","C":"Istruttori - assistente bagnanti – coordinatori","D":"Maestro di salvamento – allenatore –\nistruttori"},"answer":"A"},{"id":312,"question":"Funzioni della gambata nel crawl:","options":{"A":"Propulsivo e di riequilibrio","B":"Propulsivo, di galleggiamento e stabilizzante","C":"Recupero, presa, trazione e spinta","D":"Ristoro muscolare"},"answer":"B"},{"id":313,"question":"Gli ausili didattici vanno utilizzati in modo maggiore e continuativo per:","options":{"A":"La didattica delle nuotate","B":"I galleggiamenti statici","C":"Il potenziamento a secco","D":"Il lavoro di tipo multilaterale"},"answer":"D"},{"id":314,"question":"Gli esercizi nella fase del consolidamento devono essere:","options":{"A":"Brevi e poco differenziati","B":"Brevi e molto differenziati","C":"Lunghi e ripetitivi","D":"Lunghi e molto differenziati"},"answer":"C"},{"id":315,"question":"Gli esercizi nella fase della conoscenza devono essere:","options":{"A":"Brevi e poco differenziati","B":"Brevi e molto differenziati","C":"Lunghi e ripetitivi","D":"Lunghi e molto differenziati"},"answer":"B"},{"id":316,"question":"Gli esercizi nella fase della scoperta devono essere:","options":{"A":"Brevi e poco differenziati","B":"Brevi e molto differenziati","C":"Lunghi e ripetitivi","D":"Lunghi e molto differenziati"},"answer":"A"},{"id":317,"question":"Gli obiettivi affettivi indicano:","options":{"A":"Ciò che l’allievo deve sapere","B":"Ciò che l’allievo deve provare davanti ad una situazione","C":"Come l’allievo si deve comportare","D":"I brevetti tecnici"},"answer":"B"},{"id":318,"question":"Gli obiettivi cognitivi indicano:","options":{"A":"Ciò che l’allievo deve sapere","B":"Ciò che l’allievo deve saper fare","C":"Ciò che l’allievo deve provare davanti ad una situazione","D":"I brevetti tecnici"},"answer":"A"},{"id":319,"question":"Gli obiettivi dell’educazione respiratoria sono:","options":{"A":"Ossigenare il sangue","B":"Controllo delle apnee, delle inspirazioni/espirazioni in acqua","C":"Immergersi e rimanere sott’acqua per molto tempo","D":"Costituzione, coordinazione, controllo"},"answer":"B"},{"id":320,"question":"Gli obiettivi finali sono:","options":{"A":"Obiettivi esposti in termini generali che si possono raggiungere in tempi lunghi","B":"Obiettivi espressi con una certa specificità che si possono ottenere in periodi valutabili in mesi","C":"I brevetti tecnici","D":"Obiettivi espressi in operazioni\nconcrete raggiungibili nei tempi di una unità didattica"},"answer":"A"},{"id":321,"question":"Gli obiettivi intermedi sono:","options":{"A":"Obiettivi esposti in termini generali che si possono raggiungere in tempi lunghi","B":"Obiettivi espressi con una certa specificità che si possono ottenere in periodi valutabili in mesi","C":"Obiettivi espressi in operazioni concrete raggiungibili nei tempi di una unità didattica","D":"I brevetti tecnici"},"answer":"B"},{"id":322,"question":"Gli obiettivi motori indicano:","options":{"A":"Ciò che l’allievo deve sapere","B":"Ciò che l’allievo deve saper fare","C":"Come l’allievo si deve comportare","D":"I brevetti tecnici"},"answer":"B"},{"id":323,"question":"Gli obiettivi operativi sono:","options":{"A":"Obiettivi esposti in termini generali che si possono raggiungere in tempi lunghi","B":"Progressioni didattiche","C":"Obiettivi espressi con una certa specificità che si possono ottenere in periodi valutabili in mesi","D":"Obiettivi espressi in operazioni concrete raggiungibili nei tempi di\nuna unità didattica"},"answer":"D"},{"id":324,"question":"Gli organi della FIN sono:","options":{"A":"Gli organi periferici e centrali","B":"Gli organi centrali ed internazionali","C":"Gli organi ministeriali","D":"Gli organi centrali, periferici e di\ngiustizia"},"answer":"D"},{"id":325,"question":"Grazie a quale principio fisico il corpo umano galleggia in acqua?","options":{"A":"Principio di gravità","B":"Principio di azione e reazione","C":"Principio di Archimede","D":"Principio di Bernoulli"},"answer":"C"},{"id":326,"question":"I livelli tecnici minimi previsti dalla scuol nmuscolo"},"answer":"D"},{"id":609,"question":"Cos’è la resistenza aerobica?","options":{"A":"La capacità condizionale che garantisce di effettuare sforzi di lunga durata nella massima economia delle funzioni","B":"La capacità coordinativa grazie alla quale possiamo aumentare la frequenza dei nostri movimenti","C":"La capacità motoria che assicura di tollerare a lungo la fatica resistendo all’accumulo dell’acido lattico prodotto","D":"La capacità tipica del velocista"},"answer":"A"},{"id":610,"question":"Cos’è la supercompensazione?","options":{"A":"Un sistema gratificante per gli allievi","B":"Una limitazione all’adattamento dei\ncarichi positivi","C":"Un principio che regola l’adattamento coordinativo","D":"Un processo di adattamento\ndell’organismo ad uno stimolo allenante"},"answer":"D"},{"id":611,"question":"Cos’è un movimento di transizione?","options":{"A":"Un movimento accessorio inserito dopo l’insegnamento di un gesto delle gambe","B":"Un movimento per predisporsi a quello successivo","C":"Un movimento concluso, inserito in una sequenza programmata","D":"Un movimento irrilevante ai fini della propulsione"},"answer":"A"},{"id":612,"question":"Cos’è una fase sensibile?","options":{"A":"Un periodo di malessere generalizzato","B":"Un periodo particolarmente adatto\nper lo sviluppo di determinate capacità","C":"Un momento di stasi della crescita","D":"Un periodo poco favorevole per lo\nsviluppo di determinate capacità"},"answer":"B"},{"id":613,"question":"Cosa s’intende per capacità di reazione?","options":{"A":"La capacità ad eseguire rapidamente azioni motorie adeguate in risposta ad un segnale","B":"La capacità di variare i movimenti del corpo nello spazio e nel tempo in risposta ad un segnale","C":"La capacità di regolare la propria concentrazione","D":"La capacità di coordinare tra loro i\nmovimenti parziali del corpo reagendo ad un segnale"},"answer":"A"},{"id":614,"question":"Cosa s’intende per densità?","options":{"A":"La quantità di materia presente in un volume","B":"la forza esercitata da un fluido in quiete su ogni superficie a contatto con esso","C":"La viscosità dell’acqua","D":"È quella forza che si oppone al movimento di un corpo in un fluido"},"answer":"A"},{"id":615,"question":"Cosa s’intende per equilibrio?","options":{"A":"La funzione che consente di stare in una posizione","B":"I movimenti che consentono la stabilità","C":"La postura che si assume","D":"La stabilità emotiva"},"answer":"A"},{"id":616,"question":"Cosa s’intende per età funzionale?","options":{"A":"L’espressione dell’interazione tra età biologica e quella psicologica","B":"La capacità di adattamento individuale","C":"La mera età dettata dal calendario","D":"L’età di acquisizione degli schemi\nmotori di base"},"answer":"A"},{"id":617,"question":"Cosa s’intende per forza rapida?","options":{"A":"Capacità di resistere alla fatica con la maggior rapidità possibile","B":"Capacità di resistere alla rapidità con la maggior forza possibile","C":"Capacità di produrre una forza da elevata a massima nel più breve tempo possibile","D":"Si sviluppa nei bambini di massimo 6 anni"},"answer":"C"},{"id":618,"question":"Cosa s’intende per indipendenza segmentarla?","options":{"A":"La capacità di eseguire movimenti inconsci","B":"La capacità di percepire e controllare i segmenti corporei impegnati nel movimento in maniera indipendente","C":"La capacità dell’allievo di percepire il proprio movimento in maniera globale ed indifferenziata","D":"La capacità di frazionare l’esercizio nelle sue componenti fondamentali"},"answer":"B"},{"id":619,"question":"Cosa s’intende per pressione idrostatica?","options":{"A":"La quantità di materia presente in un volume","B":"La forza esercitata da un fluido in quiete su ogni superficie a contatto con esso","C":"La viscosità dell’acqua","D":"È quella forza che si oppone al movimento di un corpo in un fluido"},"answer":"B"},{"id":620,"question":"Cosa s’intende per resistenza in acqua?","options":{"A":"La quantità di materia presente in un volume","B":"La forza esercitata da un fluido in quiete su ogni superficie a contatto con esso","C":"La viscosità dell’acqua","D":"È quella forza che si oppone al movimento di un corpo in un fluido"},"answer":"D"},{"id":621,"question":"Cosa si intende per resistenza alla forza?","options":{"A":"La forza più elevata che il sistema\nneuromuscolare può esprimere","B":"La forza quanto più vicina possibile alla più elevata che il sistema neuromuscolare può esprimere","C":"La capacità dell’organismo di opporsi alla fatica durante prestazioni di forza","D":"La capacità dell’organismo di opporsi\nalla resistenza durante prestazioni di forza rimanendo in regime aerobico"},"answer":"C"},{"id":622,"question":"Cosa sono i fondamentali tecnici?","options":{"A":"Tecniche di nuoto formatesi con numerose ripetizioni automatiche","B":"Fattori che determinano la capacità di apprendimento","C":"Azioni motorie automatizzate mediante ripetizioni consapevoli","D":"Tecniche natatorie di atleti evoluti"},"answer":"C"},{"id":623,"question":"Cosa sono le abilità motorie?","options":{"A":"Competenze relative a gesti motori specifici (azioni), si costruiscono sulle capacità coordinative e sono tante quante se ne possono apprendere","B":"Il presupposto per l’organizzazione e la regolazione del movimento: si dividono in generali e speciali e sono tante quante se ne possono apprendere","C":"Le competenze raggiunte in una specifica sequenza di movimenti (azioni), si costruiscono sulle capacità condizionali e sono tante quante se ne possono apprendere","D":"Movimenti mediamente finalizzati"},"answer":"A"},{"id":624,"question":"Cosa sono le capacità motorie?","options":{"A":"Abilità specifiche del singolo sport","B":"Abilità trasferibili a diverse discipline sportive","C":"Presupposti motori fondamentali dell’essere umano","D":"Indici ottimali riferiti alla costituzione somatica dell’individuo"},"answer":"C"},{"id":625,"question":"Da cosa è composto un analizzatore?","options":{"A":"Da Una scarsa capacità di adattamento","B":"Nessuna capacità di adattamento","C":"Buone capacità di adattamento","D":"Buone capacità di adattamento ma solo nei maschi"},"answer":"C"},{"id":646,"question":"Il beccheggio è:","options":{"A":"Il movimento attorno all’asse sagittale","B":"Il movimento attorno all’asse trasversale","C":"Il movimento attorno all’asse longitudinale","D":"L’ondulazione del corpo"},"answer":"B"},{"id":647,"question":"Il carico esterno è misurabile con:","options":{"A":"Metri percorsi","B":"Frequenza cardiaca","C":"Intensità dello sforzo","D":"Intertempi di percorrenza"},"answer":"A"},{"id":648,"question":"Il carico fisico è:","options":{"A":"L’insieme degli stimoli di allenamento che non provocano la risposta adattativa dell’organismo","B":"L’insieme degli stimoli di allenamento","C":"stimoli di allenamento che non fanno\nriferimento all’intervallo di recupero","D":"L’insieme degli stimoli di allenamento\nche non fanno riferimento alla frequenza settimanale"},"answer":"B"},{"id":649,"question":"Il galleggiamento del corpo avviene quando:","options":{"A":"Il suo peso specifico è minore del peso specifico dell’acqua","B":"Il suo peso specifico è maggiore del peso specifico dell’acqua","C":"Si esercita una pressione verso il basso utilizzando movimenti di remata","D":"Vengono applicati sostegni al baricentro"},"answer":"A"},{"id":650,"question":"Il massimo livello di coordinazione è:","options":{"A":"Quello che ci permette di nuotare lunghe distanze","B":"Quello stabilito dal regolamento tecnico","C":"Quello che consente nuovi e più fini movimenti","D":"Quello che si riscontra nella fase della coordinazione grezza"},"answer":"C"},{"id":651,"question":"Il meccanismo anaerobico alattacido:","options":{"A":"Interessa i substrati ATP+CP","B":"Ha durata di 20 secondi","C":"Riguarda la minima potenza energetica","D":"Se interessa la scissione del glicogeno dura circa 20-30 minuti"},"answer":"A"},{"id":652,"question":"Il meccanismo energetico aerobico interviene prevalentemente:","options":{"A":"Nei lavori di lunga durata e intensità moderata","B":"Nei lavori di breve durata e intensità elevata","C":"Nei tuffi","D":"Nelle apnee"},"answer":"A"},{"id":653,"question":"Il metabolismo aerobico:","options":{"A":"Utilizza la fosfocreatina","B":"Necessita della presenza di ossigeno","C":"Produce acido lattico","D":"È tipico degli sport di brevissima e breve durata"},"answer":"B"},{"id":654,"question":"Il movimento volontario in acqua:","options":{"A":"Non è soggetto alla forza di gravità, è generato da agonisti e antagonisti, è frenato dalla resistenza in acqua","B":"È soggetto alla forza di gravità, è generato dai muscoli agonisti, non è frenato dalla resistenza in acqua","C":"Ha le stesse caratteristiche di quello sulla terraferma","D":"È soggetto alla forza di gravità, è controllato dal muscolo controgravitario, la contrazione è\nmaggiore all’inizio del movimento"},"answer":"A"},{"id":655,"question":"Il perfezionamento della tecnica si propone di:","options":{"A":"Rendere più armonico il gesto natatorio","B":"Aumentare l’efficacia della propulsione","C":"Rendere lo stile più adeguato al regolamento federale","D":"Rendere la nuotata esteticamente\ngradevole"},"answer":"B"},{"id":656,"question":"Il principio di Archimede dice che:","options":{"A":"Ad ogni azione corrisponde una reazione uguale e contraria","B":"E=mc^2","C":"Quando avviene un aumento nella pressione in un punto di un fluido confinato, tale aumento viene trasmesso anche ad ogni punto del contenitore","D":"Un corpo immerso in un fluido riceve una spinta verticale, dal basso verso l’alto, pari al peso del fluido da esso\nspostato"},"answer":"D"},{"id":657,"question":"Il progressivo incremento del carico, in generale, come deve avvenire?","options":{"A":"Prima aumenta l’intensità, poi il volume","B":"Prima aumenta il volume, poi l’intensità","C":"Prima aumenta la densità, poi il volume","D":"Intensità e volume aumentano contemporaneamente e in uguale\nmisura"}, ndizione, coordinazione e controllo"},"answer":"D"},{"id":705,"question":"La programmazione consente di:","options":{"A":"Definire procedure e mezzi per favorire l’apprendimento","B":"Definire la crescita della personalità dell’allievo","C":"Abbreviare la progressione didattica","D":"Programmare un ruolo più attivo\ndell’allievo più dotato"},"answer":"A"},{"id":706,"question":"La resistenza d’onda è dovuta:","options":{"A":"Alla particolare resistenza della superficie dell’acqua.","B":"Ai movimenti circolari dell’acqua che risucchiano il corpo.","C":"Ai movimenti superficiali dell’acqua che condizionano l’avanzata. del corpo","D":"Alla percentuale di massa grassa del nuotatore"},"answer":"C"},{"id":707,"question":"La resistenza di attrito è dovuta:","options":{"A":"Alla superficie del piano perpendicolare all’asse di avanzamento","B":"Allo sfregamento del corpo con le molecole d’acqua","C":"Ai movimenti superficiali dell’acqua che condizionano l’avanzata. del corpo","D":"Alla percentuale di massa grassa del nuotatore"},"answer":"B"},{"id":708,"question":"La resistenza di superficie o tensione superficiale è dovuta:","options":{"A":"Alla particolare resistenza della superficie dell’acqua","B":"Ai movimenti circolari dell’acqua che risucchiano il corpo","C":"Allo sfregamento del corpo con le molecole d’acqua","D":"Alla percentuale di massa grassa del nuotatore"},"answer":"A"},{"id":709,"question":"La resistenza di vortice, o turbolenza, è dovuta:","options":{"A":"Alla superficie del piano perpendicolare all’asse di avanzamento","B":"Ai movimenti circolari dell’acqua che risucchiano il corpo","C":"Ai movimenti superficiali dell’acqua che condizionano l’avanzata del corpo","D":"Alla percentuale di massa grassa del nuotatore"},"answer":"B"},{"id":710,"question":"La resistenza è:","options":{"A":"Una capacità coordinativa","B":"Una capacità condizionale","C":"Una condizione psicomotoria","D":"Una tecnica psicologica"},"answer":"B"},{"id":711,"question":"La resistenza fron ,"D":"Capacità di compiere o inibire\nmovimenti"},"answer":"C"},{"id":732,"question":"Le capacità motorie sono:","options":{"A":"Apprendimento motorio","B":"Mobilità articolare, coordinazione, condizione","C":"Forza, resistenza, velocità","D":"Costituzione, condizione,\ncoordinazione, controllo"},"answer":"B"},{"id":733,"question":"Le capacità sensopercettive dipendono da:","options":{"A":"L’istruttore","B":"L’ambiente","C":"L’individuo","D":"Le capacità coordinative"},"answer":"C"},{"id":734,"question":"Le capacità sensopercettive sono la base per la costruzione della:","options":{"A":"Abilità","B":"Tecnica","C":"Tattica","D":"Affettività"},"answer":"B"},{"id":735,"question":"Le esercitazioni sulla multilateralità incrementano:","options":{"A":"Lo sviluppo condizionale","B":"Lo sviluppo coordinativo","C":"I fattori allenanti","D":"La mobilità articolare dei distretti coinvolti"},"answer":"B"},{"id":736,"question":"Le fasi dello sviluppo della coordinazione sono:","options":{"A":"Controllo, adattamento e trasformazione","B":"Coordinazione grezza, coordinazione fine e disponibilità variabile","C":"Iniziale, intermedia e finale","D":"Intensità, densità, volume"},"answer":"B"},{"id":737,"question":"Le fasi sensibili:","options":{"A":"Sono legate all’attività degli analizzatori","B":"Servono per migliorare la sensibilità all’acqua","C":"Sono solo ipotizzate","D":"Sono periodi dello sviluppo in cui alcuni stimoli provocano\nmiglioramenti significativi"},"answer":"D"},{"id":738,"question":"Le resistenze all’avanzamento, nel nuoto, sono in numero di:","options":{"A":"2","B":"3","C":"4","D":"5"},"answer":"B"},{"id":739,"question":"Le strutture incaricate alla selezione di stimoli si chiamano:","options":{"A":"Selezionatori","B":"Analizzatori","C":"Elaboratori","D":"Commutatori"},"answer":"B"},{"id":740,"question":"Lo schema corporeo è:","options":{"A":"Lo schema del sistema osteo- articolare","B":"Lo schema logico per organizzare la proposta di esercizi in acqua o in palestra","C":"L’immagine che ognuno ha del proprio corpo in relazione con il mondo esterno","D":"L’immagine esterna del nostro corpo che non può essere percepita"},"answer":"C"},{"id":741,"question":"Lo sviluppo delle capacità coordinative è importante nel nuoto:","options":{"A":"Perché aiuta ad elaborare meglio la sensopercezione acquatica","B":"Perché incrementa le capacità di adattamento all’acqua","C":"Perché favorisce l’incremento della resistenza","D":"Perché favorisce l’accrescimento staturo-ponderale (legge di Stratz)"},"answer":"A"},{"id":742,"question":"Nel crawl dopo il recupero aereo la mano che entra in acqua rispetto alla linea mediana del corpo è:","options":{"A":"Inclinata con il palmo rivolto verso l’esterno","B":"Piatta e scivola verso avanti con il palmo rivolto verso il basso","C":"Inclinata con il palmo rivolto verso l’interno","D":"Tesa e piatta"},"answer":"A"},{"id":743,"question":"Nel crawl la fase finale di spinta subacquea degli arti superiori avviene:","options":{"A":"Verso il basso per maggiore stabilità","B":"In modo costante per senso ritmico","C":"In accelerazione","D":"Dal basso verso l’alto"},"answer":"C"},{"id":744,"question":"Nel dorso, il rollio si esegue per ottenere:","options":{"A":"Rispetto dei regolamenti tecnici","B":"Bracciata più potente in quanto i\nmuscoli lavorano in condizioni biomeccaniche più vantaggiose","C":"Coordinazione 2/6","D":"Facilitazione nel posizionamento della testa, in questo modo si riesce a tenerla più bassa appoggiata all’acqua"},"answer":"B"},{"id":745,"question":"Nel nuoto la tecnica ha come obiettivo:","options":{"A":"Efficacia ed economicità del gesto","B":"Rapidità del gesto","C":"Massima forza massimale applicabile","D":"La distribuzione razionale dei carichi"},"answer":"A"},{"id":746,"question":"Nel nuoto quali sono le articolazioni più stimolate?","options":{"A":"Polso, gomito, ginocchio e tibio- tarsica","B":"Falangi, gomito, coxo-femorale","C":"SNC","D":"Scapolo-omerale, colonna vertebrale,\ncoxo-femorale e tibio-tarsica"},"answer":"D"},{"id":747,"question":"Nel rapporto tra capacità e abilità motorie:","options":{"A":"L’apprendimento delle abilità motorie precede quello delle capacità coordinative","B":"Le abilità motorie si basano esclusivamente sulle capacità condizionali","C":"Le abilità motorie si costruiscono sulle capacità motorie ma il loro esercizio aiuta lo sviluppo di queste ultime","D":"Non esistono rapporti strutturali tra capacità ed abilità motorie"},"answer":"C"},{"id":748,"question":"Nell’allenamento giovanile quale tipo di forza è corretto sviluppare?","options":{"A":"Forza massimale","B":"Forza rapida e veloce","C":"Resistenza alla forza","D":"Forza multilaterale"},"answer":"B"},{"id":749,"question":"Nell’esercizio di lunga durata:","options":{"A":"L’energia è fornita dal meccanismo aerobico","B":"Si accumula acido lattico che impedisce di proseguire il lavoro","C":"Si utilizzano acidi grassi e proteine","D":"Si utilizza prevalentemente la\nfosfocreatina disponibile a livello\nmuscolare"},"answer":"A"},{"id":750,"question":"Nella battuta di gambe prona e supina, la propulsione è:","options":{"A":"Nulla, la gambata ha solo funzione di equilibrio","B":"Fornita dalla pianta del piede che schiaccia l’acqua","C":"Massimale","D":"Fornita dal dorso del piede"},"answer":"D"},{"id":751,"question":"Nella correzione di un errore nella bracciata a stile libero, bisogna concedere priorità a:","options":{"A":"Continuità - ritmo","B":"Angoli - traiettorie","C":"Presa - appoggio","D":"Fase aerea (recupero)"},"answer":"A"},{"id":752,"question":"Nella farfalla la gambata propulsiva avviene:","options":{"A":"All’inizio della fase inspiratoria","B":"All’entrata in acqua delle mani","C":"Nella fase finale della trazione","D":"Durante la fase di trazione"},"answer":"B"},{"id":753,"question":"Nella farfalla le mani appena entrano in acqua:","options":{"A":"Spingono verso il basso (downsweep)","B":"Tirano verso fuori (outsweep)","C":"Tirano fino alle spalle","D":"Affondano repentinamente"},"answer":"B"},{"id":754,"question":"Nella fase di coordinazione grezza cosa è bene correggere?:","options":{"A":"I dettagli","B":"Gli errori grossolani e i dettagli","C":"Tutto il possibile","D":"Gli errori grossolani"},"answer":"D"},{"id":755,"question":"Nella fase di spinta nel dorso, il palmo della mano è rivolto","options":{"A":"Verso i piedi","B":"Verso il fianco","C":"Verso l’alto","D":"Verso il basso"},"answer":"A"},{"id":756,"question":"Nella fase subacquea a rana dopo la virata la corretta sequenza dei movimenti è:","options":{"A":"Presa, trazione, spinta, recupero","B":"Spinta dal bordo, azione di braccia gambata rana recupero delle braccia","C":"Spinta dal bordo, gambata a delfino, azione delle braccia, recupero, gambata rana","D":"Spinta dal bordo, bracciata, colpo di\ngambe a delfino recupero delle braccia, gambata rana"},"answer":"D"},{"id":757,"question":"Nella nuotata a crawl cosa è importante?","options":{"A":"Consentire alla mano, durante il recupero, di sfiorare l’acqua per non perdere il contatto con la stessa","B":"Effettuare l’ultima parte della passata subacquea con un azione accelerata","C":"Consentire al braccio di guidare il recupero","D":"Consentire alla mano, durante il recupero, di sfiorare l’acqua per\nprepararsi alla fase di presa"},"answer":"B"},{"id":758,"question":"Nella nuotata a crawl quando deve iniziare la rotazione del capo?","options":{"A":"Prima che l’arto opposto sia entrato in acqua","B":"Quando l’arto opposto inizia la fase di spinta","C":"Quando l’arto opposto è in fase di recupero","D":"Dopo che l’arto opposto è entrato in acqua"},"answer":"D"},{"id":759,"question":"Nella nuotata a dorso l’esercizio definito opposizione di fase è un:","options":{"A":"Esercizio di esclusione","B":"Esercizio di perfezionamento","C":"Esercizio di specializzazione","D":"Esercizio inutile"},"answer":"B"},{"id":760,"question":"Nella nuotata a rana il recupero degli arti inferiori avviene:","options":{"A":"Quando le
