    content: `
    <div class="key-concept">
      <strong>Il Crawl</strong> è lo stile più veloce e con il minore costo energetico. Il termine deriva dal verbo inglese "to crawl" (strisciare), coniato a Londra alla fine dell'Ottocento dopo l'esibizione di due nuotatori aborigeni australiani nel Tamigi. È lo stile utilizzato universalmente nelle gare di "stile libero" perché garantisce le migliori prestazioni.
    </div>

    <h4>Posizione del Corpo</h4>
    <p>Il corpo deve essere mantenuto in posizione <strong>distesa e pressoché orizzontale</strong> per tutta la durata della nuotata. La testa rimane <strong>in posizione naturale e rilassata, in linea con il corpo</strong>, con lo sguardo rivolto in avanti e in basso. Una posizione corretta del capo è fondamentale: qualsiasi sollevamento in avanti comporterebbe un'eccessiva inclinazione verso il basso dei piedi e un conseguente aumento della resistenza all'avanzamento.</p>

    <p>L'<strong>assetto in acqua varia</strong> in base alla specialità dell'atleta: i velocisti mantengono una posizione più alta sull'acqua a causa delle elevate velocità generate dalla pressione sulla superficie, mentre i mezzofondisti nuotano più "attraverso l'acqua" con un corpo più immerso. Questa differenza è naturale e derivata dalle forze idrometriche, non da un volontario sollevano della testa.</p>

    <h4>Il Rollio delle Spalle e dei Fianchi</h4>
    <p>Uno dei fondamentali più importanti della tecnica crawl moderna è il <strong>rollio articolato delle spalle e dei fianchi</strong> sull'asse longitudinale del corpo. Il rollio segue naturalmente il movimento alternato degli arti superiori ed è essenziale per numerose ragioni:</p>

    <div class="definition">

        <li><strong>Riduce la resistenza:</strong> Dimezza la resistenza offerta dall'acqua all'avanzamento, in quanto soltanto una metà del corpo rimane immersa</li>
        <li><strong>Attiva i grandi muscoli:</strong> Permette l'intervento dei grandi muscoli del tronco, in particolare il gran dorsale (allungato in fase di presa) e il pettorale (contratto nella trazione)</li>
        <li><strong>Facilita la respirazione:</strong> Permette una respirazione più naturale, limitando la torsione del collo ed evitando inutili tensioni muscolari</li>
        <li><strong>Amplia la bracciata:</strong> Permette bracciate più ampie con un recupero più alto e rilassato sulla superficie dell'acqua</li>
      </ul>
    </div>

    <p>Per un corretto controllo del rollio, è essenziale <strong>iniziare la rotazione del capo per la respirazione solo dopo l'entrata in acqua dell'arto opposto</strong>. Questo accorgimento consente di: continuare l'avanzamento durante la presa sia con la spalla sia con il braccio di appoggio; mantenere l'allineamento con l'asse del corpo; effettuare la spinta del braccio opposto verso dietro in linea senza eccessivi scostamenti laterali.</p>

    <h4>La Fase Subacquea della Bracciata</h4>
    <p>La passata subacquea è la fase propulsiva più importante della bracciata nel crawl. La <strong>prima parte della passata deve essere effettuata a gomito alto</strong>, una tecnica che offre vantaggi biomeccanici significativi:</p>

    <div class="definition">
      <ul>
        <li>La mano raggiunge immediatamente il punto più profondo, effettuando una presa stabile per la successiva trazione</li>
        <li>Le spalle continuano ad avanzare anche durante la fase di presa-appoggio</li>
        <li>Le spalle e il tronco rimangono sollevati sull'acqua, sfruttando la superficie alare generata dalla corretta geometria della passata</li>
      </ul>
    </div>

    <h4>Fasi della Bracciata Crawl</h4>
    <p><strong>Entrata in acqua:</strong> La mano entra in acqua <strong>morbidamente all'altezza della spalla</strong>, il braccio si estende in avanti più possibile e inizia subito la fase di presa con il gomito flesso e posizionato in avanti.</p>

    <p><strong>Presa e trazione:</strong> Durante la trazione, il gomito deve essere portato <strong>in avanti per avere una pressione ottimale</strong> sull'acqua. Questo permette l'appoggio della mano e dell'avambraccio, necessario per permettere al corpo di avanzare. La mano segue una traiettoria leggermente curva verso l'interno.</p>

    <p><strong>Spinta:</strong> La spinta è eseguita <strong>rapidamente fino all'uscita della mano dall'acqua</strong>, accelerando verso dietro e verso l'esterno (upsweep).</p>

    <p><strong>Recupero:</strong> Deve essere effettuato <strong>senza sforzo, con il braccio disteso o flesso ma rilassato e guidato dalla spalla</strong>. Durante il recupero i muscoli che erano in trazione (grande dorsale, petto) devono rilassarsi, mentre il trapezio e il deltoide laterale guidano il movimento in una posizione alta e rilassata.</p>

    <h4>Coordinamento Braccia-Gambe</h4>
    <p>Nel crawl classico, il coordinamento tra le braccia e le gambe segue precisi pattern biomeccanici. Una <strong>battuta di gambe viene effettuata per ogni cambio di direzione degli arti superiori</strong>, creando un coordinamento naturale.</p>

    <div class="definition">
      <strong>Il rapporto di coordinazione 6-2 (sei gambate ogni due bracciate):</strong>
      <p>Nella fase di presa (outsweep), il corpo tenderebbe a spostarsi sul lato opposto se non intervenisse un calcio verso il basso e l'esterno della gamba opposta. Durante la trazione, il braccio provoca uno scostamento verso il lato dell'azione, bilanciato da un colpo verso l'esterno-basso della gamba omologa. Nella fase finale di spinta (upsweep), un calcio verso l'esterno-basso della gamba opposta riequilibra nuovamente il corpo.</p>
    </div>

    <p>Tuttavia, <strong>gli atleti evoluti adottano anche altri rapporti</strong>: il 4-2 (ridurre due colpi laterali in uno più potente), il 2-2 (generalmente usato dai fondisti che percorrono distanze maggiori), il broken-tempo (3+1, con pause durante la respirazione).</p>

    <h4>Il Movimento delle Gambe</h4>
    <p>Il movimento è <strong>alternato come quello degli arti superiori</strong>, partendo dall'anca con una "frustata" che si trasmette tramite il ginocchio alle caviglie e ai piedi. <strong>Si deve evitare la battuta che parte dal ginocchio</strong> (scalciata), che risulterebbe inefficace e affaticante.</p>

    <p>Nella fase discendente, il piede è leggermente rivolto verso l'interno; la pressione dell'acqua sotto la gamba spinge il piede e la caviglia in una posizione estesa. La battuta prosegue con una leggera flessione all'anca e al ginocchio nella fase di ascesa.</p>

    <h4>Respirazione e Coordinamento</h4>
    <p>Per inspirare, <strong>la testa deve essere ruotata sull'asse del corpo, senza sollevarla</strong>. Si espira sott'acqua regolarmente con naso o bocca; alcuni atleti preferiscono espellere rapidamente l'aria immediatamente prima dell'emersione del capo (respirazione esplosiva).</p>

    <p>La <strong>respirazione segue un ritmo coordinato con quello della bracciata</strong>: si inspira sulla distensione di un braccio e si espira sulla trazione dello stesso. L'inspirazione coincide con il momento in cui si termina la spinta di un braccio, la testa è completamente ruotata sul suo asse e l'appoggio viene trasferito al braccio opposto.</p>

    <h4>Differenze tra Velocisti e Mezzofondisti</h4>
    <p>L'adattamento agli stimoli allenanti crea differenze significative nello stile:</p>

    <div class="definition">
      <strong>Velocisti (50-100 m):</strong>
      <ul>
        <li>Posizione più alta sull'acqua a causa delle elevate velocità</li>
        <li>Respirazione ritardata (durante il recupero del braccio, con sguardo leggermente in avanti)</li>
        <li>Frequenze di bracciata molto elevate</li>
        <li>Battuta di gambe continua e potente (necessaria per mantenere la posizione alta)</li>
        <li>Sovrapposizione delle azioni degli arti superiori per cavalcare l'onda</li>
        <li>Alcuni velocisti puri saltano le fasi meno propulsive (presa-appoggio) con coordinazione 2-2</li>
      </ul>
    </div>

    <div class="definition">
      <strong>Mezzofondisti e Fondisti (200+ m):</strong>
      <ul>
        <li>Posizione più attraverso l'acqua, nuotano con corpo più immerso</li>
        <li>Respirazione anticipata (ruotano la testa prima che il braccio finisca la spinta)</li>
        <li>Frequenze di bracciata più basse ma potenti</li>
        <li>Battuta di gambe superficiale, utilizzata per recuperare energia dall'onda di prua e frammentare la massa d'acqua</li>
        <li>Entrata in acqua quando l'altro braccio è a metà trazione (posizione più orizzontale)</li>
        <li>Traiettorie di bracciata quasi rettilinee con coordinazioni 2-2 o fino al 6-2</li>
      </ul>
    </div>

    <h4>Principi Biomeccanici Fondamentali</h4>
    <p>Nel nuoto, il rendimento meccanico è circa il 10-12%, con variabilità individuale determinata dalla tecnica. L'<strong>efficienza propulsiva</strong> è legata allo slittamento della mano (hand slip): i nuotatori più efficienti hanno uno slittamento minore, percorrono distanze maggiori per ogni ciclo (ampiezza di bracciata elevata) e hanno un costo energetico inferiore.</p>

    <p>Una buona efficienza propulsiva è indispensabile per sviluppare buone velocità di nuotata e ridurre il costo energetico. Nella scuola nuoto, il rapporto di coordinazione 6-2 con una buona battuta di gambe assicura equilibrio e continuità d'azione, fondamentale nella fase di apprendimento.</p>

    <h4>Variazioni Tecniche Evolute</h4>
    <p>Alcuni nuotatori evoluti adottano traiettorie quasi rettilinee della bracciata, saltando le fasi di presa-appoggio laterale e cercando immediatamente la trazione. Questa tecnica richiede una frequenza di bracciata molto elevata e una battuta di gambe profonda e potente per mantenere l'equilibrio.</p>

    <p>Fonte: Cap. 5.2.1.3.1 "Crawl" e Cap. 4.12.2.2 "Crawl" - DISPENSE ISTRUTTORI</p>

    <p>Il recupero deve essere effettuato in modo rilassato, permettendo ai muscoli utilizzati nella trazione di riposare mentre il trapezio e il deltoide laterale guidano il movimento.</p>

    <p>Il volto rimane in posizione naturale, con lo sguardo rivolto verso l'alto e leggermente indietro. Non è necessaria una rotazione laterale della testa come nel crawl.</p>

    <h4>Differenze Individuali e Stili Variati</h4>
    <p>Sebbene il coordinamento sia generalmente il 6-2 per tutti i dorsisti, esistono differenze significative nello stile adottato da atleti diversi, principalmente dovute a:</p>

    <p>La <strong>gambata si effettua quando le braccia sono distese in avanti</strong> e tutto il corpo è in una posizione affusolata. Mantenere il corpo affusolato durante l'azione di spinta delle gambe garantisce il massimo sfruttamento di questa azione propulsiva. I piedi devono essere rivolti all'esterno, con le piante dei piedi che spingono l'acqua verso dietro e verso l'esterno.</p>

    <h4>Lo Scivolamento nella Rana</h4>
    <p>Uno dei principi fondamentali della rana moderna è <strong>effettuare una fase di scivolamento più o meno lunga dopo la gambata</strong>. Un buon colpo di gambe permette al nuotatore di sfruttarne lo scivolamento conseguente fino al raggiungimento della velocità generata dalla bracciata.</p>

    <p>Sarebbe infatti controproducente iniziare la bracciata quando il corpo si muove a una velocità superiore a quella generata dalla azione di bracciata stessa, oppure scivolare fin quasi ad arrestarsi per riprendere velocità (inerzia). Lo scivolamento rappresenta l'equilibrio tra sfruttare la spinta delle gambe e iniziare una nuova bracciata al momento ottimale.</p>

    <h4>Variazioni Tecniche secondo le Specialità</h4>
    <p><strong>Differenti stili di rana sono tanti, quanti gli atleti che la nuotano.</strong> Ogni nuotatore sfrutta i propri punti di forza, ottimizzando lo stile secondo le proprie caratteristiche.</p>

    <div class="definition">
      <strong>Atleti con gambata più forte:</strong>
      <ul>
        <li>Seguono una linea retta durante la spinta delle gambe</li>
        <li>Sfruttano maggiormente l'azione delle gambe per la propulsione</li>
        <li>Mantengono uno scivolamento lungo e controllato</li>
      </ul>
    </div>

    <div class="definition">
      <strong>Atleti con bracciata più forte:</strong>
      <ul>
        <li>Sfruttano maggiormente l'azione delle braccia</li>
        <li>Utilizzano un'azione di presa simile al delfino, per garantire l'intervento del gran dorsale</li>
        <li>Ottengono continuità di azione sovrapponendo parzialmente le azioni degli arti</li>
      </ul>
    </div>

    <div class="definition">
      <strong>Velocisti (50m-100m):</strong>
      <ul>
        <li>Nuotano con frequenze molto elevate</li>
        <li>Effettuano le fasi di recupero e scivolamento in modo parzialmente incompleto</li>
        <li>L'azione delle braccia riparte immediatamente quando le gambe non si sono ancora chiuse</li>
      </ul>
    </div>

    <div class="definition">
      <strong>Specialisti dei 200m:</strong>
      <ul>
        <li>Effettuano una buona fase di scivolamento</li>
        <li>Privilegiano un'efficienza maggiore per assicurarsi un recupero di energie fra un ciclo e l'altro</li>
        <li>Minimizzano il costo energetico complessivo</li>
      </ul>
    </div>

    <h4>Coordinamento dei Movimenti</h4>
    <p>Nel ciclo completo della rana, il coordinamento deve essere perfetto:</p>

    <div class="definition">
      <ol>
        <li><strong>Posizione affusolata con braccia estese in avanti</strong> - Inizio della gambata</li>
        <li><strong>Gambata con corpo orizzontale</strong> - Massima propulsione</li>
        <li><strong>Recupero delle gambe durante il recupero delle braccia</strong> - Corpo mantiene orizzontalità</li>
        <li><strong>Presa e trazione delle braccia</strong> - Corpo si solleva per respirazione</li>

        <li><strong>Ritorno a posizione affusolata</strong> - Pronti per il ciclo successivo</li>
      </ol>
    </div>

    <h4>Principi Biomeccanici Fondamentali</h4>
    <p>Nel nuoto, come nella rana, il principio di efficienza propulsiva rimane centrale. Un buon "catch" (presa) della mano all'inizio della bracciata, combinato con una gambata potente e coordinata, determina la velocità e l'economicità della nuotata.</p>

    <p>La rana rappresenta uno stile dove il <strong>timing perfetto</strong> è più importante che in altri stili: un millimetro di ritardo o di anticipo nel coordinamento può significare differenze significative nella velocità complessiva.</p>

    <div class="key-concept">
      <strong>La Farfalla</strong>, comunemente chiamata "Delfino" per il movimento ondulatorio del corpo, è lo stile più recente nella storia del nuoto competitivo. Fu separato dalla rana negli anni Cinquanta quando alcuni nuotatori iniziarono a effettuare il recupero delle braccia in aria. È caratterizzato da movimenti simultanei e ondulatori di corpo, braccia e gambe.

    <h4>Storia e Regolamento</h4>
    <p>Negli anni Cinquanta la nuotata farfalla fu separata da quella a rana perché molti nuotatori effettuavano il recupero delle braccia al di fuori dell'acqua. Nacquero così due stili distinti: la farfalla (con recupero aereo) e la rana (con recupero subacqueo).</p>

    <p>Dopo qualche anno, gli australiani adottarono la gambata a delfino nelle gare farfalla. Il corpo si muoveva ondulando e le gambe battevano unite dall'alto verso il basso. Questa tecnica si dimostrò rapidamente più efficace della farfalla tradizionale e venne adottata dalla maggior parte degli atleti.</p>

    <p>In tempi recenti (2003), la battuta a rana è stata vietata nelle gare farfalla per tutte le categorie tranne i master.</p>

    <h4>Regolamento Tecnico</h4>

    <div class="definition">

      </ul>
    </div>

    <h4>La Posizione del Corpo e il Movimento Ondulatorio</h4>
    <p><strong>Tutto il corpo si muove con un movimento ondulatorio, ma un punto (il baricentro) si muove in linea retta.</strong> Non è difficile capire il significato di questa regola dalla geometria elementare: la distanza più breve tra due punti è la linea retta.</p>

    <p>Il corpo non sale e scende caoticamente, ma ondula in modo armonico e fluido. Le onde partono dal tronco e si trasmettono fluidamente alle anche, alle cosce, alle gambe e ai piedi, generando un movimento simile a quello di un delfino marino.</p>

    <p>L'<strong>ondulazione deve essere efficace</strong>: il movimento non deve essere eccessivo (che aumenterebbe la resistenza) ma nemmeno insufficiente (che ridurrebbe la propulsione). La giusta ampiezza di ondulazione varia in base alle caratteristiche individuali e alla specialità nuotata.</p>

    <h4>I Fondamentali della Bracciata Farfalla</h4>
    <p><strong>La prima parte della bracciata deve essere effettuata a gomito alto:</strong> Questo permette alla mano di raggiungere immediatamente il punto più profondo, effettuando una presa stabile per la successiva trazione; alle spalle di continuare ad avanzare anche durante la fase di presa-appoggio; alle spalle e al tronco di rimanere sollevati sull'acqua, sfruttando la superficie alare generata.</p>

    <p><strong>Il sollevamento del capo per la respirazione deve iniziare dopo che le mani hanno raggiunto la massima profondità:</strong> Tenere la testa in acqua durante la fase di presa/appoggio garantisce l'avanzamento del corpo anche durante la respirazione. L'inspirazione viene effettuata per avanti-alto, mantenendo l'angolo delle spalle rispetto all'acqua prossimo all'orizzontale.</p>

    <p><strong>Le mani entrano in acqua all'altezza delle spalle.</strong> Le spalle vengono portate subito in avanti, senza immergerle troppo; una volta raggiunta la profondità di circa 20-30 centimetri, le mani effettuano la presa sull'acqua.</p>

    <p><strong>Durante la trazione:</strong> Le mani tirano rapidamente verso dietro, i gomiti sono tenuti in avanti e fissati per mantenere l'appoggio della mano e dell'avambraccio. Le braccia vengono portate verso il corpo e poi verso le gambe e verso dietro, con un movimento potente di accelerazione. Le braccia accelerano velocemente verso dietro fino all'uscita dall'acqua, dopodiché vengono riportate in avanti, contemporaneamente, senza sforzo.</p>

    <h4>Il Movimento Sincronizzato delle Gambe</h4>
    <p><strong>Le gambe si muovono con un movimento continuo, simultaneo e ondulatorio simile alla coda di un delfino.</strong> La battuta di gambe parte dal tronco e si trasmette con un movimento fluido ondulatorio dalle anche alle cosce alle gambe e ai piedi.</p>

    <p><strong>Anca e ginocchio sono angolati moderatamente,</strong> in modo da effettuare un colpo continuo ed elastico simile a una frustata. È fondamentale evitare un'eccessiva flessione al ginocchio, che aumenterebbe la resistenza senza aggiungere propulsione.</p>

    <p>Durante l'immersione la testa mantiene la posizione naturale con lo sguardo rivolto in avanti e in basso; il bacino e le cosce devono essere mantenuti il più alti possibile nell'acqua.</p>

    <h4>Il Coordinamento delle Gambate</h4>
    <p><strong>Durante ogni bracciata vengono eseguiti due colpi di gambe:</strong></p>

    <h4>La Respirazione nella Farfalla</h4>
    <p>Nel ciclo della farfalla, l'inspirazione è intimamente collegata al movimento delle braccia e del corpo. <strong>L'inspirazione coincide con la distensione delle braccia dietro</strong>, la testa viene sollevata leggermente, ma non il corpo.</p>

    <p>Alcuni nuotatori preferiscono respirare lateralmente. Questo accorgimento permette di limitare il sollevamento delle spalle, riducendo l'utilizzo della gambata per il sostentamento e il costo energetico della nuotata, senza una significativa riduzione dell'ampiezza della bracciata.</p>

    <h4>Variazioni Tecniche secondo le Specialità</h4>
    <p><strong>Come avviene nel crawl, i nuotatori che si cimentano nelle gare veloci di farfalla (50 e 100 metri) cercano di ridurre la resistenza all'avanzamento.</strong></p>

      <strong>Specialisti dei 200m:</strong>
      <ul>

        <li>Riduce la tensione muscolare complessiva</li>
      </ul>
    </div>

    <h4>Il Principio dell'Inerzia nella Farfalla</h4>
    <p><strong>La prima battuta di gambe coincide con l'entrata in acqua delle braccia:</strong> Quando questo avviene, l'azione dell'atleta è caratterizzata da un avanzamento continuo con minimo sforzo, minimizzando l'inerzia.</p>

    <p>L'inerzia è la resistenza che un corpo oppone al cambiamento del suo stato di moto o di quiete (primo principio della dinamica). Pertanto il primo colpo di gambe ha la funzione di mantenere il corpo in movimento, evitando al nuotatore di ripartire da fermo ad ogni ciclo, con un enorme costo energetico.</p>

    <h4>Caratteristiche Tecniche di Base</h4>
    <p>Secondo le dispense ufficiali, la tecnica di base della farfalla comprende:</p>

    <div class="definition">
      <ul>

    <h4>Principi Biomeccanici Fondamentali</h4>

<div class="key-concept">
  <strong>Lo stile libero o crawl</strong> è lo stile che assicura la massima velocità di spostamento in acqua e la maggior continuità d'azione. È caratterizzato dall'avanzamento in posizione orizzontale prona, dalla propulsione principalmente bracciata (molto più importante delle gambe), e da una respirazione laterale efficiente.
</div>

<h4>Fondamentali della Tecnica</h4>
<p>L'avanzamento avviene in posizione orizzontale prona, garantendo la minima resistenza dell'acqua. La bracciata è lo strumento principale di propulsione e comprende quattro momenti fondamentali:</p>
<ul>
  <li><strong>Presa:</strong> la mano entra in acqua all'altezza delle spalle, il più lontano possibile. Con la rotazione del corpo (rollio), il braccio scivola ulteriormente in avanti fino a tendersi quasi completamente</li>
  <li><strong>Trazione:</strong> con gomito in alto, avviene una trazione verso il basso e all'indietro. La mano passa sotto al tronco, superando il gomito</li>
  <li><strong>Spinta:</strong> trazione energica che passa a lato della coscia verso l'alto e all'indietro, proseguendo senza interruzione nella fase aerea</li>
  <li><strong>Recupero:</strong> fase esterna all'acqua, il braccio viene portato in avanti in modo sciolto e rilassato</li>
</ul>

<p>La gambata è alternata e continua: il movimento parte dalle anche, interessando successivamente coscia, ginocchio, gamba fino al piede. La coscia viene sollevata verso la superficie, il piede deve essere in estensione e leggermente intra-ruotato. L'ampiezza del movimento è limitata ma la frequenza è elevata (sei battute per bracciata).</p>

<p>La respirazione avviene alla fine della fase di spinta mediante leggera rotazione laterale del capo (non sollevamento). L'espirazione avviene attraverso bocca e naso in maniera più lenta rispetto all'inspirazione. Dovrebbe avvenire da entrambi i lati.</p>

<h4>Prerequisiti e Metodologia</h4>
<p>Gli allievi devono saper galleggiare almeno 4-5 metri dopo la spinta dal bordo senza utilizzo delle gambe, e devono aver appreso un corretto ritmo respiratorio. È fondamentale nelle prime lezioni la presenza rassicurante dell'istruttore in acqua, con attenzione particolare all'espirazione subacquea durante le esercitazioni.</p>

<p>Gli esercizi si devono sviluppare prevedendo momenti di apprendimento globale (eseguendo l'intera tecnica), procedere dal semplice al complesso, e presentare varietà di esercizi per uno stesso obiettivo.</p>

<h4>Esercizi per l'Insegnamento della Gambata</h4>
<p>La battuta di gambe deve essere inserita solo quando l'allievo presenta un buon scivolamento (almeno 4-5 metri). È fondamentale condurre gli allievi alla percezione della corretta posizione del piede: in estensione e intra-ruotato (piede a ballerina), caviglia rilassata e punta delle dita verso l'interno.</p>

<p>L'obiettivo è ottenere una posizione di scivolamento naturale con propulsione costante delle gambe:</p>
<ul>
  <li><strong>Gambata con supporto:</strong> utilizzare il bordo della vasca o corsia per il supporto iniziale</li>
  <li><strong>Gambata con tavoletta:</strong> tenere la tavoletta con le mani estese davanti per mantenere la stabilità</li>
  <li><strong>Gambata con tubo galleggiante:</strong> il tubo sotto le ascelle supporta verticalmente l'allievo</li>
  <li><strong>Gambata in coppia:</strong> un allievo sostiene l'altro per mano durante i primi esercizi</li>
  <li><strong>Gambata nel profondo:</strong> eseguire la gambata al centro della vasca senza supporti</li>
</ul>

<h4>Esercizi per l'Insegnamento della Bracciata</h4>
<p>La bracciata deve essere inserita quando la battuta di gambe è fluida e propulsiva. Durante l'insegnamento della bracciata è preferibile evitare di inserire la respirazione; invece di inspirare è consigliabile interrompere l'esercizio e ricominciare.</p>

<p>Far provare agli allievi il movimento della bracciata in acqua stando in piedi: in questo modo avranno la possibilità di percepire la resistenza dell'acqua. Le braccia sono tese e compiono un movimento ampio.</p>

<ul>
  <li><strong>Presa e trazione a piedi:</strong> in piedi nella vasca, eseguire il movimento della presa e trazione per percepire la resistenza dell'acqua</li>
  <li><strong>Un braccio al corpo:</strong> eseguire la bracciata con un braccio tenendo l'altro lungo il corpo</li>
  <li><strong>Braccia distese dietro:</strong> iniziare la nuotata con le braccia distese dietro, inserire la bracciata gradualmente</li>
  <li><strong>Bracciata con cambio:</strong> alternare un braccio alla volta, poi entrambi sincronicamente</li>
  <li><strong>Bracciata con traction/catch:</strong> focalizzarsi sulla corretta entrata della mano e sulla presa d'acqua</li>
</ul>

<h4>Esercizi di Coordinazione Braccia-Gambe</h4>
<p>Una volta acquisiti i movimenti singoli, è necessario coordinare braccia e gambe con la respirazione:</p>

<ul>
  <li><strong>Battuta laterale con rotazione del capo:</strong> questo esercizio può essere eseguito sia respirando da entrambi i lati sia simulando l'inizio del recupero del braccio dal lato della respirazione</li>
  <li><strong>Più bracciate senza respirare, poi girarsi sul dorso:</strong> stimola la coordinazione naturale dei movimenti, successivamente permette di coordinare l'inspirazione con la rotazione</li>
  <li><strong>Respirazione laterale con i piedi sul fondo:</strong> inizialmente con appoggio delle mani sulla corsia, successivamente senza corsia, curando l'ingresso della mano</li>
  <li><strong>Respirazione con differenti sostegni:</strong> utilizzare il supporto dell'insegnante (spalle o mani), la tavoletta, o cinture galleggianti</li>
</ul>

<h4>Esercizi di Variazione per il Crawl</h4>
<p>Gli esercizi di variazione modificano le modalità di esecuzione della tecnica per sviluppare diversi aspetti:</p>

<ul>
  <li><strong>Nuotare a pugni chiusi:</strong> classico esercizio di esclusione che esalta la funzione della mano e dell'avambraccio</li>
  <li><strong>Un solo braccio, l'altro in alto:</strong> pone l'attenzione sul rollio dei fianchi alla fine della bracciata, solleva i fianchi al passaggio del braccio</li>
  <li><strong>Un solo braccio, l'altro in basso:</strong> enfatizza la presa profonda e il rollio delle spalle</li>
  <li><strong>Metà vasca braccia lente-gambe veloci, metà braccia veloci-gambe lente:</strong> sperimenta diverse soluzioni motorie</li>
  <li><strong>Mulino:</strong> rotazione rapida delle braccia come un mulino, saltando alcune respirazioni per stimolare la continuità della bracciata</li>
  <li><strong>Respirazione bilaterale ogni 3 o 5 bracciate:</strong> stimola la continuità della bracciata</li>
</ul>

<h4>Esercizi di Esclusione per il Crawl</h4>
<p>Gli esercizi di esclusione eliminano o limitano l'uso di una componente motoria per enfatizzarne un'altra:</p>

<ul>
  <li><strong>Nuotare con le gambe ferme:</strong> affida tutta la propulsione alle braccia, stimolando il movimento continuo</li>
  <li><strong>Nuotare con le braccia ferme:</strong> sottolinea il contributo della gambata</li>
  <li><strong>Nuotare a pugni chiusi:</strong> escludendo la mano, se ne esalta la funzione e si utilizza meglio l'avambraccio</li>
  <li><strong>Nuotare toccandosi il sedere:</strong> esercizio che sottolinea il movimento completo della bracciata e la corretta posizione del gomito</li>
</ul>

<h4>Esercizi di Combinazione per il Crawl</h4>
<p>Gli esercizi di combinazione abbinano elementi di due o più nuotate per mettere in crisi la coordinazione o esaltare aspetti particolari:</p>

<ul>
  <li><strong>Braccia crawl con gambe delfino:</strong> combina la bracciata continua del crawl con la gambata simultanea del delfino</li>
  <li><strong>Braccia delfino con gambe crawl:</strong> la combinazione inversa per sviluppare aspetti diversi</li>
  <li><strong>Arti diametralmente opposti:</strong> esercizio per il cambio di appoggio e il rollio</li>
  <li><strong>Successivo:</strong> per coordinare la bracciata con la respirazione e controllare la corretta passata subacquea</li>
</ul>

<h4>Errori Comuni e Correzioni</h4>
<p>La maggior difficoltà per l'apprendimento del crawl è costituita dalla respirazione. L'inspirazione deve coincidere con il momento in cui si termina la spinta di un braccio, la testa è completamente ruotata sul suo asse e l'appoggio viene trasferito al braccio opposto.</p>

<p>Se l'atto respiratorio viene eseguito troppo rigidamente, l'allievo continuerà ad espirare quando la testa emerge e sarà costretto ad effettuare una pausa durante la rotazione del collo. Spesso, quando questo errore è radicato, l'allievo solleva il capo in avanti dopo averlo ruotato.</p>

<p>Per correggere questo errore è inutile intervenire sulla rotazione del capo (effetto). Si deve intervenire sulla causa: la respirazione stessa. Solo dopo un ambientamento ben condotto si può passare alla fase didattica del crawl.</p>

<h4>Progressione dall'Apprendimento al Perfezionamento</h4>
<p>La progressione didattica segue questi step fondamentali:</p>

<ol>
  <li><strong>Fase 1 - Ambientamento:</strong> acquisizione della posizione orizzontale prona, galleggiamento e scivolamento (4-5 metri senza braccia)</li>
  <li><strong>Fase 2 - Insegnamento della gambata:</strong> battuta alternata continua con percezione della corretta posizione del piede</li>
  <li><strong>Fase 3 - Insegnamento della bracciata:</strong> movimento singolo dei bracci con ripetizione senza respirazione</li>
  <li><strong>Fase 4 - Coordinazione braccia-gambe:</strong> inserimento della respirazione gradualmente</li>
  <li><strong>Fase 5 - Automatizzazione:</strong> esercizi di variazione e perfezionamento tecnico</li>
  <li><strong>Fase 6 - Alta specializzazione:</strong> esercizi con elevata difficoltà coordinativa</li>
</ol>

<p><em>Fonte: Capitoli 4.10.1 e 4.12.2.1 - DISPENSE ISTRUTTORI</em></p>
    `

    title: 'Esercizi per il Dorso',
    category: 'Esercizi per stile',
    content: `
<div class="key-concept">
  <strong>Il dorso</strong> è uno stile simmetrico eseguito in posizione supina. È caratterizzato dalla continuità di applicazione di forza, dal rollio corporeo efficace, da una corretta posizione del gomito alto durante la passata subacquea, e da una coordinazione 6-2 (una battuta di gambe per ogni cambio di direzione degli arti superiori).
</div>

<h4>Fondamentali della Tecnica</h4>
<p>Nel dorso, i concorrenti devono sempre rimanere sul dorso (rotazione sull'asse del corpo entro i 90°). La continuità di applicazione di forza sembra essere il tratto comune ai dorsisti di successo: la sovrapposizione dell'azione degli arti superiori, senza avere punti morti nell'azione della bracciata.</p>

<p>Si deve entrare in acqua con un arto prima che l'altro termini la sua azione di spinta: in questo modo, mentre un arto termina la sua spinta, l'altro si posiziona alla giusta profondità per iniziare la trazione.</p>

<h4>Il Rollio del Corpo</h4>
<p>Nel dorso il rollio del corpo è ancora più efficace che nel crawl e presenta vantaggi maggiori. Infatti, oltre a ridurre la resistenza all'avanzamento, permette ai dorsisti di utilizzare la leva pettorale (più vantaggiosa): se non effettuassero il rollio, la bracciata sarebbe laterale, in superficie, senza alcuna efficacia.</p>

<p>Il recupero è guidato dal fianco e dalla spalla: il sollevamento del fianco anticipa il recupero del braccio, permettendo la continuità dell'azione nel passaggio dalla spinta al recupero e agevolando il rollio. Nell'eseguire questa azione si deve fare attenzione a rimanere con le spalle bene aperte e il petto alto.</p>

<h4>Posizione del Gomito Alto</h4>
<p>La prima parte della passata subacquea deve essere effettuata a gomito alto: questo permette alla mano di raggiungere immediatamente il punto più profondo, effettuando una presa stabile per la successiva trazione; alle spalle di continuare ad avanzare anche durante la fase di presa-appoggio; di mantenere le spalle e il tronco sollevati sull'acqua, sfruttando la superficie alare generata.</p>

<h4>Coordinazione della Gambata</h4>
<p>Una battuta di gambe per ogni cambio di direzione degli arti superiori: nel dorso non ci sono coordinazioni diverse come nel crawl. Praticamente tutti i dorsisti adottano una coordinazione 6-2 (sei battute per due bracciate, o equivalentemente una battuta per cambio di direzione).</p>

<h4>Esercizi di Perfezionamento</h4>
<p>Gli esercizi di perfezionamento sono adatti ad allievi alle prime armi nell'apprendimento della tecnica:</p>

<ul>
  <li><strong>Un solo braccio, l'altro in alto:</strong> pone l'accento sul rollio corrispondente con la fine della spinta e sull'appoggio della mano in alto. Si deve sollevare il fianco al passaggio del braccio, ruotare verso il basso il palmo della mano in alto creando un appoggio per le spalle, mantenere le spalle bene aperte e il petto alto</li>
  <li><strong>Un solo braccio, l'altro in basso:</strong> permette di mantenere una posizione comoda durante l'esercizio, sviluppando il rollio e la continuità dell'azione</li>
  <li><strong>Battuta di gambe laterale:</strong> eseguire solo la gambata mantenendo i bracci in diverse posizioni</li>
  <li><strong>Esercitazioni con la tavoletta:</strong> tenere la tavoletta per mantenere la stabilità durante gli esercizi di bracciata</li>
  <li><strong>Recupero simultaneo e alternato:</strong> eseguire la bracciata con diversi ritmi e coordinazioni</li>
</ul>

<h4>Esercizi di Alta Specializzazione</h4>
<p>Gli esercizi di alta specializzazione hanno elevata difficoltà coordinativa, adatti ad allievi con un buon livello di conoscenza del nuoto:</p>

<ul>
  <li><strong>Un solo braccio, l'altro in alto, senza aiuto:</strong> sviluppa forza e coordinazione nel rollio</li>
  <li><strong>Mezzo recupero:</strong> esercizio per l'equilibrio che consiste nell'effettuare la battuta di gambe laterale simulando l'inizio del recupero</li>
  <li><strong>5 gambate + 1:</strong> esercizio per il cambio di appoggio, consiste nel effettuare 5 battute su di un lato e cambiare appoggio alla 6</li>
  <li><strong>Braccia delfino in posizione supina:</strong> combina la gambata delfino con il dorso per sviluppare il movimento ondulatorio</li>
  <li><strong>Cambio rapido di ritmo:</strong> alternare bracciate lente e veloci per sviluppare la potenza</li>
</ul>

<h4>Esercizi di Variazione per il Dorso</h4>
<p>Gli esercizi di variazione modificano le modalità di esecuzione per sviluppare diversi aspetti della tecnica:</p>

<ul>
  <li><strong>Un solo braccio con rotazione ampia:</strong> enfatizza il rollio corporeo</li>
  <li><strong>Bracciata con gambe crawl:</strong> combina la bracciata del dorso con la gambata alternata del crawl</li>
  <li><strong>Recupero veloce, spinta lenta:</strong> modifica il ritmo della bracciata</li>
  <li><strong>Battuta di gambe in orizzontale e verticale:</strong> sviluppa forza e mobilità della caviglia</li>
  <li><strong>Dorso con gli occhi chiusi:</strong> sviluppa la propriocezione e l'orientamento</li>
</ul>

<h4>Esercizi di Esclusione per il Dorso</h4>
<p>Gli esercizi di esclusione eliminano o limitano l'uso di una componente per enfatizzarne un'altra:</p>

<ul>
  <li><strong>Nuotare con le gambe ferme:</strong> affida tutta la propulsione alle braccia</li>
  <li><strong>Nuotare con un solo braccio, l'altro immobile:</strong> sviluppa la propulsione di un arto</li>
  <li><strong>Nuotare con i pugni chiusi:</strong> enfatizza il ruolo dell'avambraccio e della mano</li>
  <li><strong>Nuotare da seduti sul fondo:</strong> sviluppa solo la gambata</li>
  <li><strong>Dorso sul fianco con un braccio disteso:</strong> sviluppa il rollio e l'equilibrio</li>
</ul>

<h4>Esercizi di Combinazione per il Dorso</h4>
<p>Gli esercizi di combinazione abbinano elementi di diversi stili:</p>

<ul>
  <li><strong>Dorso con braccia crawl:</strong> combina la posizione supina con il movimento della bracciata del crawl</li>
  <li><strong>Dorso alternato (1 braccio dorso, 1 braccio crawl):</strong> sviluppa la consapevolezza della differenza tra i movimenti</li>
  <li><strong>Dorso-Crawl in transizione:</strong> alternare tratti di dorso e crawl senza fermarsi</li>
  <li><strong>Braccia delfino in posizione supina con gambata crawl:</strong> combina la bracciata delfino simultanea con la gambata del crawl</li>
</ul>

<h4>Errori Comuni e Correzioni</h4>
<p>Gli errori più comuni nel dorso includono:</p>

<ul>
  <li><strong>Spalle basse e petto non sollevato:</strong> Correzione: enfatizzare il sollevamento del fianco durante il rollio, mantenere le spalle aperte</li>
  <li><strong>Gomito basso durante la passata subacquea:</strong> Correzione: esercizi con un solo braccio, enfatizzare la posizione del gomito alto durante la presa</li>
  <li><strong>Bracciata discontinua con punti morti:</strong> Correzione: esercizi di sovrapposizione degli arti, input temporale per la continuità</li>
  <li><strong>Rotazione del corpo insufficiente:</strong> Correzione: esercizi di rollio, un solo braccio con accentuazione del fianco</li>
  <li><strong>Gambe troppo larghe o movimento irregolare:</strong> Correzione: gambata laterale con percezione della corretta ampiezza</li>
</ul>

<h4>Progressione dall'Apprendimento al Perfezionamento</h4>
<p>La progressione didattica segue questi step fondamentali:</p>

<ol>
  <li><strong>Fase 1 - Ambientamento in posizione supina:</strong> acquisizione della galleggiamento e scivolamento in posizione supina</li>
  <li><strong>Fase 2 - Insegnamento della gambata:</strong> battuta alternata continua in posizione supina</li>
  <li><strong>Fase 3 - Insegnamento della bracciata:</strong> movimento singolo dei bracci in posizione supina</li>
  <li><strong>Fase 4 - Coordinazione braccia-gambe:</strong> integrazione della bracciata con la gambata</li>
  <li><strong>Fase 5 - Enfasi sul rollio:</strong> sviluppo della rotazione corporea e del movimento del fianco</li>
  <li><strong>Fase 6 - Continuità e potenza:</strong> esercizi per eliminare i punti morti e sviluppare la propulsione continua</li>
  <li><strong>Fase 7 - Alta specializzazione:</strong> esercizi con elevata difficoltà coordinativa</li>
</ol>

<p><em>Fonte: Capitoli 4.10.2, 4.12.2.2 e 5.2.1.3.2 - DISPENSE ISTRUTTORI</em></p>

    id: 'esercizi-rana',
    title: 'Esercizi per la Rana',
    category: 'Esercizi per stile',
    content: `
<div class="key-concept">
  <strong>La rana</strong> è uno degli stili più impegnativi dal punto di vista della coordinazione. È caratterizzata da movimenti circolari e simultanei di braccia e gambe, da un'elevata resistenza nel recupero subacqueo, e dalla necessità di un corretto timing tra la respirazione e l'azione dei bracci. Negli ultimi anni, l'evoluzione del regolamento ha permesso interpretazioni diverse della tecnica.
</div>

<h4>Caratteristiche Tecniche Fondamentali</h4>
<p>La rana è uno degli stili più impegnativi dal punto di vista della coordinazione. Tra le quattro nuotate agonistiche è quella che presenta il più alto costo energetico, a causa della resistenza nel recupero subacqueo degli arti superiori.</p>

<p>La fase di presa viene effettuata con una sorta di remata verso l'esterno e il basso. I gomiti vengono mantenuti in avanti e fissati per garantire l'appoggio della mano e dell'avambraccio, in un'azione molto simile a quella della farfalla. Durante tutta questa fase il corpo è orizzontale, con la testa immersa e lo sguardo in avanti basso.</p>

<p>Subito dopo le braccia si avvicinano sotto le spalle per permettere il sollevamento della testa e l'inspirazione. L'inspirazione avviene quando le braccia si congiungono sotto le spalle; normalmente l'espirazione viene effettuata alla fine della bracciata con una respirazione definita esplosiva.</p>

<p>Per regolamento la testa deve essere sollevata ad ogni bracciata, pertanto non si può mantenere la posizione orizzontale e il corpo si muove ondulando. Si deve però fare attenzione a sollevare il corpo meno possibile, respirando per avanti-alto, in modo da riportarlo in posizione idrodinamica distendendo immediatamente le braccia.</p>

<h4>Tecnica della Gambata nella Rana</h4>
<p>La battuta di gambe viene effettuata al momento della distensione delle braccia in avanti, con un movimento semicircolare ad elica: dapprima verso l'esterno-basso, poi verso l'interno-basso, e termina con la distensione degli arti inferiori dietro.</p>

<p>Gli arti inferiori vengono recuperati portandoli verso i glutei con la caviglia in estensione; durante tutta la fase del calcio, il piede viene tenuto in flessione dorsale (piede a martello); nella spinta la caviglia viene di nuovo estesa.</p>

<p>Durante la potente azione di spinta delle gambe il corpo viene mantenuto in una posizione affusolata idrodinamica di scivolamento. La percezione corretta del movimento del piede è fondamentale: deve passare dalla posizione di caviglia estesa a quella di flessione dorsale.</p>

<h4>Prerequisiti e Difficoltà Coordinative</h4>
<p>La rana presenta notevoli difficoltà coordinative dovute principalmente alla geometria circolare delle sue azioni. Siamo infatti molto più abituati ai movimenti sul piano longitudinale del crawl e del dorso che non ai movimenti circolari.</p>

<p>A volte tuttavia si incontrano degli allievi, definiti "ranisti naturali", che effettuano in tutti gli stili questi movimenti circolari, con il piede a martello, e che non hanno alcuna difficoltà ad apprendere la coordinazione della rana. Tutti gli altri devono fare esperienza già dall'ambientamento dei movimenti circolari delle braccia e delle gambe.</p>

<p>Esercizi-gioco prerequisiti nell'ambientamento:</p>
<ul>
  <li><strong>L'aquila:</strong> muovere le braccia verso l'alto e verso il basso sott'acqua, aiutandosi con il movimento del corpo, nel tentativo di imitare un uccello che vola</li>
  <li><strong>Il polpo o la medusa:</strong> spostarsi in acqua aprendo e chiudendo ritmicamente le braccia verso il corpo</li>
  <li><strong>La ranocchia:</strong> in acqua bassa, saltare dal fondo con il piede in appoggio sulla parte interna e le ginocchia strette</li>
  <li><strong>La bicicletta:</strong> tenendo l'allievo a cavallo di un tubo galleggiante, eseguire il movimento circolare delle gambe. Insegna il sostentamento in posizione verticale</li>
</ul>

<h4>Esercizi per l'Insegnamento della Gambata</h4>
<p>Poiché nella rana la gambata riveste un'importanza fondamentale per l'avanzamento, l'insegnante deve porre molta attenzione agli esercizi per il suo apprendimento. L'istruttore deve evitare di bruciare le tappe, perché soluzioni provvisorie nella fase di apprendimento non compromettano il risultato finale.</p>

<p>Per questa ragione, tranne che per i ranisti naturali, il metodo globale è poco efficace e specialmente per l'apprendimento del colpo di gambe:</p>

<ul>
  <li><strong>Da piedi a martello a punte in estensione:</strong> è utile far sì che l'allievo possa vedersi i piedi, facendo sì che l'abbinamento tra la percezione e la visione rinforzi l'apprendimento. Un metodo molto semplice è eseguire l'esercizio a secco, in posizione supina su di un materassino, con i gomiti in appoggio e spalle e testa sollevate</li>
  <li><strong>Seduti sul bordo, piedi in acqua:</strong> questo esercizio permette di effettuare lo stesso movimento guardandosi e percependo la resistenza dell'acqua, sia nella flessione della caviglia sia sulla parte interna del piede</li>
  <li><strong>Rana sul dorso:</strong> eseguire la gambata rana sul dorso evita l'eccessiva chiusura dell'angolo coscia-tronco. Inizialmente si può invitare l'allievo a spingere contro la mano dell'istruttore, per enfatizzare la spinta di gambe. Fare attenzione a che le mani vengono poste nella parte interna del piede, devono solo contrastare la spinta</li>
  <li><strong>Spinte contro la parete sul dorso:</strong> eseguire delle spinte contro la parete e delle vasche di gambe sul dorso, facendo tenere all'allievo una tavola sulle gambe, allo scopo di evitare la fuoriuscita delle ginocchia</li>
  <li><strong>Nuotare gambe rana sul dorso:</strong> con le mani lungo i fianchi, chiedendo all'allievo di toccare le mani con i talloni durante il recupero</li>
  <li><strong>Gambe rana sul dorso, braccia distese in alto:</strong> in posizione di scivolamento completo</li>
  <li><strong>Gambe rana sul petto, con sostegno:</strong> tubo galleggiante sotto le ascelle o tavoletta</li>
  <li><strong>Gambe rana sul petto, senza sostegno:</strong> sempre chiedere di effettuare una buona fase di scivolo dopo ciascuna gambata</li>
</ul>

<h4>Esercizi per l'Insegnamento della Bracciata</h4>
<p>A causa della complessità coordinativa della rana, nella fase di apprendimento iniziale è consigliabile separare l'insegnamento dell'azione delle braccia da quello delle gambe. Quando esegue la gambata con il tubo sotto le ascelle o senza alcun appoggio l'allievo esegue istintivamente un appoggio con le braccia.</p>

<p>Molto spesso, non è conveniente inserire la bracciata in questa fase, in quanto si potrebbe incorrere nell'errore di anticipare eccessivamente la respirazione. Anticipare la respirazione provoca un eccessivo sollevamento delle spalle, con l'affondamento del bacino e l'anticipo del colpo di gambe per compensazione.</p>

<p>Per insegnare la bracciata si deve quindi isolarne il movimento e farla eseguire con le gambe ferme o con le gambe crawl, chiedendo all'allievo di effettuare tutta la prima parte di presa con la testa in immersione. Il capo deve essere sollevato solo quando le mani raggiungono la massima profondità della loro azione o dopo, durante la loro chiusura e l'inizio del recupero.</p>

<ul>
  <li><strong>Bracciata da piedi:</strong> in piedi nella vasca, eseguire la bracciata rana per percepire il movimento circolare e l'azione verso l'interno e il basso</li>
  <li><strong>Bracciata con gambe ferme:</strong> isolando completamente il movimento delle braccia</li>
  <li><strong>Bracciata con gambe crawl:</strong> mantenendo la propulsione della gambata crawl per facilitare il movimento</li>
  <li><strong>Bracciata con tubo sotto le ascelle:</strong> per fornire galleggiamento durante l'apprendimento</li>
  <li><strong>Bracciata con tavoletta:</strong> per mantenere la stabilità orizzontale</li>
</ul>

<h4>Esercizi di Coordinazione Braccia-Gambe</h4>
<p>Per apprendere correttamente la coordinazione nella rana è consigliabile effettuare la bracciata con le gambe ferme e la gambata con le braccia distese avanti, enfatizzando la fase di scivolamento con la testa mantenuta nell'acqua fino al termine della fase di presa delle braccia e sollevare il capo per la respirazione solo dopo che le mani hanno raggiunto il punto più profondo.</p>

<p>Solo successivamente, quando il gesto corretto è stato automatizzato, si potrà sviluppare una maggior continuità d'azione:</p>

<ul>
  <li><strong>Bracciata con gambe ferme:</strong> sviluppa il movimento circolare delle braccia</li>
  <li><strong>Gambata con braccia distese avanti:</strong> sviluppa il timing del movimento delle gambe</li>
  <li><strong>Rana completa a velocità lenta:</strong> per percepire la coordinazione globale</li>
  <li><strong>Rana con pausa di scivolo evidente:</strong> enfatizzando la fase di scivolamento dopo ogni bracciata</li>
  <li><strong>Rana con respirazione temporizzata:</strong> usando segnali auditivi dell'istruttore</li>
</ul>

<h4>Esercizi di Variazione per la Rana</h4>
<p>Gli esercizi di variazione modificano le modalità di esecuzione della tecnica:</p>

<ul>
  <li><strong>Rana lenta con pausa di scivolo pronunciata:</strong> enfatizza la posizione idrodinamica</li>
  <li><strong>Rana veloce con scivolo breve:</strong> sviluppa la potenza propulsiva</li>
  <li><strong>Rana con respirazione ogni due bracciate:</strong> sviluppa la resistenza e l'efficienza respiratoria</li>
  <li><strong>Rana con accentuazione della fase di presa:</strong> con gomiti alti e remata laterale marcata</li>
  <li><strong>Rana con accentuazione della fase di chiusura:</strong> con avvicinamento rapido dei gomiti sotto le spalle</li>
</ul>

<h4>Esercizi di Esclusione per la Rana</h4>
<p>Gli esercizi di esclusione eliminano o limitano l'uso di una componente:</p>

<ul>
  <li><strong>Rana con le gambe ferme:</strong> affida tutta la propulsione alle braccia (esercizio specialistico)</li>
  <li><strong>Rana con braccia ferme/distese avanti:</strong> sviluppa solo la gambe</li>
  <li><strong>Rana a pugni chiusi:</strong> enfatizza il ruolo dell'avambraccio</li>
  <li><strong>Rana con movimento circolare marcato delle gambe:</strong> sottolinea il movimento "a martello" dei piedi</li>
</ul>

<h4>Esercizi di Combinazione per la Rana</h4>
<p>Gli esercizi di combinazione abbinano elementi di diversi stili:</p>

<ul>
  <li><strong>Braccia rana con gambe delfino:</strong> combina la bracciata circolare della rana con la gambata simultanea del delfino (rana delfinata)</li>
  <li><strong>Braccia crawl con gambe rana:</strong> combina la bracciata alternata del crawl con la gambata simultanea della rana</li>
  <li><strong>Rana-Crawl alternato:</strong> nuotare in alternanza tratti di rana e crawl</li>
</ul>

<h4>Errori Comuni e Correzioni</h4>
<p>Gli errori più comuni nella rana includono:</p>

<ul>
  <li><strong>Battuta di gambe in sforbiciata (alternata):</strong> Correzione: esercizi di rana sul dorso, percezione visiva dei piedi</li>
  <li><strong>Eccessiva flessione delle ginocchia:</strong> Correzione: esercizi seduti sul bordo, rana sul dorso con caviglia estesa</li>
  <li><strong>Caviglia non in flessione dorsale (piede non a martello):</strong> Correzione: esercizio a secco su materassino, seduti sul bordo</li>
  <li><strong>Eccessiva chiusura dell'angolo coscia-tronco:</strong> Correzione: rana sul dorso per éviter la flessione eccessiva</li>
  <li><strong>Respirazione anticipata (troppo sollevamento):</strong> Correzione: mantenimento della posizione orizzontale durante la presa, respirazione solo alla chiusura delle braccia</li>
  <li><strong>Mancanza di scivolo dopo la bracciata:</strong> Correzione: esercizi con pausa di scivolo evidente, enfatizzare la distensione delle braccia in avanti</li>
  <li><strong>Movimento circolare delle braccia non pronunciato:</strong> Correzione: esercizi da piedi, enfatizzare la remata verso l'esterno nella fase di presa</li>
</ul>

<h4>Progressione dall'Apprendimento al Perfezionamento</h4>
<p>La progressione didattica segue questi step fondamentali:</p>

<div class="key-concept">
  <strong>La farfalla</strong> (o delfino) è uno stile simultaneo con movimenti ondulatori del corpo. È caratterizzato da una bracciata simultanea delle braccia sopra l'acqua, da una gambata a delfino (doppia), e da un movimento corporeo fluido e continuo. È un'azione in gran parte subacquea che richiede una coordinazione e un impegno muscolare elevati.
</div>

<h4>Evoluzione e Tecnica Attuale</h4>
<p>Negli anni Cinquanta la nuotata farfalla fu separata da quella a rana perché molti nuotatori effettuavano il recupero delle braccia al di fuori dell'acqua. In seguito a questa separazione nacquero due stili distinti: la farfalla, in cui il recupero degli arti superiori è obbligatoriamente aereo, e la rana, in cui il recupero deve essere obbligatoriamente subacqueo.</p>

<p>Dopo qualche anno gli australiani adottarono la gambata a delfino nelle gare farfalla. Il corpo si muoveva ondulando e le gambe battevano unite dall'alto verso il basso, come in una doppia gambata crawl. Questa tecnica si dimostrò ben presto più efficace della farfalla tradizionale, per cui venne adottata dalla maggior parte degli atleti. In tempi recenti (2003) la battuta a rana è stata vietata nelle gare a farfalla, per tutte le categorie tranne che per i master.</p>

<h4>Fondamentali della Tecnica del Delfino</h4>
<p>Le gambe si muovono con un movimento continuo, simultaneo e ondulatorio simile alla coda di un delfino. L'inspirazione coincide con la distensione delle braccia dietro, la testa viene sollevata leggermente, ma non il corpo. La testa viene riportata in acqua quando le braccia nel recupero superano la linea delle spalle.</p>

<p>Il movimento del corpo avviene su di una linea ondulata, ma più piatta possibile. In immersione la testa mantiene la posizione naturale con lo sguardo rivolto in avanti e in basso; il bacino e le cosce devono essere mantenuti più alti possibile nell'acqua.</p>

<p>La battuta di gambe parte dal tronco e si trasmette con un movimento fluido ondulatorio dalle anche alle cosce alle gambe e ai piedi. Anca e ginocchio sono angolati moderatamente, in modo da effettuare un colpo continuo ed elastico simile ad una frustata (evitare un'eccessiva flessione al ginocchio).</p>

<h4>Movimento della Bracciata</h4>
<p>Le mani entrano in acqua all'altezza delle spalle. Le spalle vengono portate subito in avanti, senza immergerle troppo; una volta raggiunta la profondità di circa 20-30 centimetri le mani effettuano la presa sull'acqua.</p>

<p>Durante la trazione le mani tirano rapidamente verso dietro, i gomiti sono tenuti in avanti e fissati, per mantenere l'appoggio delle mani e dell'avambraccio. Le braccia vengono portate verso il corpo e poi verso le gambe e verso dietro, con un movimento potente di accelerazione. Le braccia accelerano velocemente verso dietro, fino ad uscire dall'acqua, dopodiché, senza soluzione di continuità, vengono riportate in avanti, contemporaneamente, senza sforzo.</p>

<h4>Coordinazione Braccia-Gambe (Double Kick)</h4>
<p>Una battuta di gambe ben coordinata garantisce il sollevamento del corpo e la continuità nell'azione di avanzamento. Durante ogni bracciata vengono eseguiti due colpi di gambe:</p>

<ul>
  <li><strong>Il primo, detto di propulsione:</strong> coincide con l'entrata delle mani in acqua e serve per ridurre la perdita di velocità, conseguente all'immersione delle spalle</li>
  <li><strong>Il secondo, detto di sostentamento:</strong> coincide con la fuoriuscita delle mani e serve per evitare che i fianchi affondino in questa fase</li>
</ul>

<p>L'azione si svolge per la maggior parte del tempo sott'acqua, tanto che alcuni autori affermano che il delfino è una nuotata subacquea.</p>

<h4>Prerequisiti Fondamentali</h4>
<p>Eseguire nella fase di ambientamento esercizi che insegnano la propulsione del corpo:</p>

<ul>
  <li><strong>Il delfino:</strong> gli allievi imitano il movimento del delfino, con le braccia lungo i fianchi o in avanti</li>
  <li><strong>Lo squalo:</strong> si chiede agli allievi di avanzare muovendo lateralmente a destra e sinistra le gambe</li>
  <li><strong>Il polpo o la medusa:</strong> si chiede agli allievi di avanzare aprendo e chiudendo le braccia</li>
  <li><strong>Il coccodrillo:</strong> consiste nell'avanzare con le gambe ferme e la testa immersa, muovendo le braccia avanti e indietro come nel cagnolino; è di fondamentale importanza per apprendere l'aiuto che il movimento del tronco può apportare alla propulsione</li>
</ul>

<p>È necessario, inoltre, che l'allievo sappia:</p>
<ul>
  <li>Eseguire brevi tratti in apnea, saltando dal fondo alla superficie e ritornando sul fondo</li>
  <li>Raccogliere degli oggetti sul fondo, immergendosi dalla superficie</li>
  <li>Rimanere a mezz'acqua, espellendo o trattenendo l'aria nei polmoni</li>
</ul>

<h4>Esercizi per l'Insegnamento della Tecnica</h4>
<p>Una volta appresa la delfinizzazione e la propulsione del tronco, la didattica della farfalla è abbastanza semplice. Inizialmente, subito dopo l'insegnamento del crawl, si può chiedere all'allievo di percorrere dei brevi tratti senza respirare e di riportare le braccia in avanti fuori dall'acqua e indietro sott'acqua simultaneamente, con un movimento simile a quello del crawl. Le gambe vengono mantenute rilassate e distese indietro.</p>

<ul>
  <li><strong>Farfalla con braccia crawl e corpo alternato:</strong> iniziare con la bracciata tipo crawl, inserendo gradualmente il movimento ondulatorio del corpo</li>
  <li><strong>Delf-crawl:</strong> esercizio per l'apprendimento della coordinazione. Si chiede agli allievi di effettuare la bracciata come nel crawl ma, quando il braccio arriva all'altezza delle spalle, la testa ed il tronco vengono immersi, spingendo le anche in alto. Le spalle e la testa vengono risollevate con un movimento continuo di avanzamento. Il colpo di gambe deve essere effettuato con una lieve flessione e una frustata verso dietro</li>
  <li><strong>Successione: braccio destro, braccio sinistro, bracciata simultanea:</strong> sviluppare gradualmente la simultaneità delle braccia</li>
</ul>

<h4>Esercizi per la Continuità della Propulsione</h4>
<p>La continuità della propulsione della bracciata si ottiene con esercizi progressivi:</p>

<ul>
  <li><strong>Bracciata farfalla con gambe crawl:</strong> questo esercizio sfrutta la continuità della battuta di gambe crawl per ottenere un movimento continuo della bracciata</li>
  <li><strong>Farfalla con gambe ferme:</strong> tenendo le gambe ferme si è infatti costretti ad affidare la propulsione alle braccia, stimolandone il movimento continuo</li>
  <li><strong>Bracciata delfino con pugni chiusi:</strong> esercizio che stimola la continuità ponendo l'attenzione sulla funzione della mano e dell'avambraccio</li>
  <li><strong>Farfalla con enfasi sulla presa d'acqua:</strong> focalizzarsi su un'entrata profonda e una presa solida</li>
  <li><strong>Farfalla con enfasi sulla trazione:</strong> accelerazione verso il basso e all'indietro</li>
  <li><strong>Farfalla con enfasi sulla spinta:</strong> movimento potente verso dietro e in alto</li>
</ul>

<h4>Esercizi di Variazione per la Farfalla</h4>
<p>Gli esercizi di variazione modificano le modalità di esecuzione della tecnica:</p>

<ul>
  <li><strong>Farfalla lenta senza respirare:</strong> per percepire il movimento ondulatorio e la coordinazione delle gambe</li>
  <li><strong>Farfalla veloce:</strong> per sviluppare la potenza propulsiva</li>
  <li><strong>Farfalla con respirazione ogni 2-3 bracciate:</strong> sviluppa la resistenza</li>
  <li><strong>Farfalla con respirazione laterale:</strong> variante più difficile e specialistica</li>
  <li><strong>Farfalla con movimento ondulatorio ampio:</strong> sottolinea il movimento del corpo</li>
  <li><strong>Farfalla con movimento ondulatorio contenuto:</strong> sviluppa l'efficienza</li>
</ul>

<h4>Esercizi di Esclusione per la Farfalla</h4>
<p>Gli esercizi di esclusione eliminano o limitano l'uso di una componente:</p>

<ul>
  <li><strong>Farfalla con le gambe ferme:</strong> affida tutta la propulsione alle braccia</li>
  <li><strong>Gambata delfino con braccia ferme lungo i fianchi:</strong> sviluppa solo il movimento delle gambe</li>
  <li><strong>Gambata delfino con braccia ferme davanti:</strong> esercizio specialistico di gambata pura</li>
  <li><strong>Farfalla a pugni chiusi:</strong> enfatizza il ruolo dell'avambraccio</li>
  <li><strong>Farfalla con un solo braccio:</strong> sviluppa la propulsione monoaurale</li>
</ul>

<h4>Esercizi di Combinazione per la Farfalla</h4>
<p>Gli esercizi di combinazione abbinano elementi di diversi stili:</p>

<ul>
  <li><strong>Braccia farfalla con gambe crawl:</strong> combina il movimento simultaneo delle braccia con la gambata alternata</li>
  <li><strong>Braccia crawl con gambata delfino:</strong> combina la bracciata alternata con la gambata simultanea</li>
  <li><strong>Farfalla-Crawl alternato:</strong> nuotare in alternanza tratti di farfalla e crawl</li>
  <li><strong>Braccia rana con gambata delfino:</strong> combina il movimento circolare della rana con la gambata simultanea del delfino</li>
</ul>

<h4>Esercizi di Coordinazione Braccia-Gambe Avanzati</h4>
<p>Per gli allievi con buon livello di conoscenza:</p>

<ul>
  <li><strong>Braccia crawl con gambe delfino, con testa bassa:</strong> la gambata delfino all'entrata della mano aiuta il nuotatore alla ricerca immediata della presa profonda</li>
  <li><strong>Braccia crawl con gambe delfino, con testa alta:</strong> stimola la posizione alta delle spalle per i velocisti</li>
  <li><strong>Mezzo recupero:</strong> esercizio per l'equilibrio, consiste nell'effettuare la battuta di gambe laterale, simulando l'inizio del recupero</li>
  <li><strong>5 gambate + 1:</strong> esercizio per il cambio di appoggio, consiste nel effettuare 5 battute su di un lato e cambiare appoggio alla 6</li>
</ul>

<h4>Errori Comuni e Correzioni</h4>
<p>Gli errori più comuni nella farfalla includono:</p>

<ul>
  <li><strong>Movimento ondulatorio insufficiente o assente:</strong> Correzione: esercizi di delfino puro con braccia lungo i fianchi, enfatizzare il movimento dalla testa ai piedi</li>
  <li><strong>Gambata alternata (tipo crawl) invece di simultanea:</strong> Correzione: esercizi di double kick puro, focus sulla simultaneità</li>
  <li><strong>Eccessiva flessione del ginocchio:</strong> Correzione: enfatizzare la "frustata" elastica, movimento fluido dall'anca</li>
  <li><strong>Respirazione anticipata o eccessiva:</strong> Correzione: mantenimento della posizione bassa della testa durante la trazione, respirazione solo alla fine della spinta</li>
  <li><strong>Mancanza di continuità della bracciata:</strong> Correzione: esercizi di farfalla con gambe crawl, focus sulla sovrapposizione dell'azione</li>
  <li><strong>Entrata delle mani troppo laterale:</strong> Correzione: enfatizzare l'entrata all'altezza delle spalle, con le mani davanti</li>
  <li><strong>Gomito basso durante la trazione:</strong> Correzione: esercizi con enfasi sulla presa profonda e gomito alto</li>
</ul>

<h4>Progressione dall'Apprendimento al Perfezionamento</h4>
<p>La progressione didattica segue questi step fondamentali:</p>

<ol>
  <li><strong>Fase 1 - Ambientamento con propulsione onduloria:</strong> acquisizione della familiarità con il movimento del corpo (delfino, squalo, polpo, coccodrillo)</li>
  <li><strong>Fase 2 - Insegnamento della gambata:</strong> double kick puro, movimento simultaneo e ondulatorio</li>
  <li><strong>Fase 3 - Insegnamento della bracciata:</strong> movimento simultaneo sopra l'acqua e simultaneo sott'acqua</li>
  <li><strong>Fase 4 - Delf-crawl:</strong> transizione graduale verso la bracciata simultanea</li>
  <li><strong>Fase 5 - Coordinazione braccia-gambe:</strong> integrazione con focus sul timing dei due kick</li>
  <li><strong>Fase 6 - Respirazione:</strong> inserimento della respirazione coordinata con il movimento corporeo</li>
  <li><strong>Fase 7 - Fluidità e continuità:</strong> sviluppo di una farfalla fluida e continua</li>
  <li><strong>Fase 8 - Potenza e specializzazione:</strong> esercizi per sviluppare la propulsione, la velocità e l'efficienza energetica</li>
</ol>

<h4>Considerazioni Importanti</h4>
<p>La farfalla è uno stile molto impegnativo che richiede:</p>
<ul>
  <li>Una forza muscolare superiore rispetto agli altri stili</li>
  <li>Una buona coordinazione tra il movimento delle gambe e delle braccia</li>
  <li>Un'eccellente percezione del movimento corporeo ondulatorio</li>
  <li>Una resistenza aerobica significativa</li>
  <li>Una corretta tecnica di base per evitare lesioni</li>
</ul>

<p>L'insegnamento deve procedere gradualmente, assicurandosi che ogni fase sia ben consolidata prima di passare a quella successiva.</p>

var _didatticaCats = [];
var _didatticaCurrentCat = '';

function _getDidatticaCats() {
  if (_didatticaCats.length) return _didatticaCats;
  var dispenseNames = {
    "La cultura dell'acqua": "1",
    "Psicopedagogia": "2",
    "Biofisiologia": "3",
    "La scuola nuoto": "4",
    "Metodologia": "5",
    "Popolazioni speciali": "6",
    "Fitness in acqua": "7",
    "Mappe cognitive": "8"
  };
  didatticaTopics.forEach(function(t) {
    if (_didatticaCats.indexOf(t.category) === -1) _didatticaCats.push(t.category);
  });
  return _didatticaCats;
}

function showDidattica() {
  document.getElementById('homePage').classList.remove('visible');
  document.getElementById('quizPage').style.display = 'none';
  document.getElementById('statsPage').classList.remove('visible');
  document.getElementById('didatticaPage').classList.add('visible');
  _buildDidatticaSidebar();
  _buildDidatticaMobileNav();
  // Open first category and select first topic
  var cats = _getDidatticaCats();
  if (cats.length) _openSidebarCategory(cats[0], true);
  window.scrollTo({ top: 0 });
}

function hideDidattica() {
  document.getElementById('didatticaPage').classList.remove('visible');
  document.getElementById('homePage').classList.add('visible');
  window.scrollTo({ top: 0 });
}

function _buildDidatticaSidebar() {
  var sb = document.getElementById('didatticaSidebar');
  sb.innerHTML = '';
  var cats = _getDidatticaCats();
  var num = 1;
  cats.forEach(function(cat) {
    var section = document.createElement('div');
    section.className = 'didattica-sidebar-section';
    section.dataset.cat = cat;

    var title = document.createElement('div');
    title.className = 'didattica-sidebar-title';
    title.innerHTML = '<span>' + num + '. ' + cat + '</span><span class="arrow">&#9654;</span>';
    title.onclick = function() { _toggleSidebarCategory(cat); };
    section.appendChild(title);

    var items = document.createElement('div');
    items.className = 'didattica-sidebar-items';
    var topics = didatticaTopics.filter(function(t) { return t.category === cat; });
    topics.forEach(function(t, idx) {
      var btn = document.createElement('button');
      btn.className = 'didattica-sidebar-item';
      btn.dataset.topic = t.id;
      btn.innerHTML = '<span class="didattica-sidebar-num">' + (num) + '.' + (idx+1) + '</span> ' + t.title;
      btn.onclick = function() { renderDidatticaTopic(t.id); };
      items.appendChild(btn);
    });
    section.appendChild(items);
    sb.appendChild(section);
    num++;
  });
}

function _toggleSidebarCategory(cat) {
  var sections = document.querySelectorAll('.didattica-sidebar-section');
  sections.forEach(function(sec) {
    if (sec.dataset.cat === cat) {
      var title = sec.querySelector('.didattica-sidebar-title');
      var items = sec.querySelector('.didattica-sidebar-items');
      var isOpen = items.classList.contains('open');
      items.classList.toggle('open');
      title.classList.toggle('open');
    }
  });
}

function _openSidebarCategory(cat, selectFirst) {
  // Close all, then open the target
  document.querySelectorAll('.didattica-sidebar-items').forEach(function(el) { el.classList.remove('open'); });
  document.querySelectorAll('.didattica-sidebar-title').forEach(function(el) { el.classList.remove('open'); });
  var sections = document.querySelectorAll('.didattica-sidebar-section');
  sections.forEach(function(sec) {
    if (sec.dataset.cat === cat) {
      sec.querySelector('.didattica-sidebar-items').classList.add('open');
      sec.querySelector('.didattica-sidebar-title').classList.add('open');
    }
  });
  _didatticaCurrentCat = cat;
  if (selectFirst) {
    var first = didatticaTopics.find(function(t) { return t.category === cat; });
    if (first) renderDidatticaTopic(first.id);
  }
}

function _buildDidatticaMobileNav() {
  var mn = document.getElementById('didatticaMobileNav');
  mn.innerHTML = '';
  var cats = _getDidatticaCats();

  // Category dropdown
  var sel = document.createElement('select');
  sel.className = 'didattica-mobile-select';
  cats.forEach(function(cat, i) {
    var opt = document.createElement('option');
    opt.value = cat;
    opt.textContent = (i+1) + '. ' + cat;
    sel.appendChild(opt);
  });
  sel.onchange = function() { _renderMobileTopics(sel.value); };
  mn.appendChild(sel);

  // Topics container
  var topicsDiv = document.createElement('div');
  topicsDiv.className = 'didattica-mobile-topics';
  topicsDiv.id = 'didatticaMobileTopics';
  mn.appendChild(topicsDiv);

  // Render first category topics
  if (cats.length) _renderMobileTopics(cats[0]);
}

function _renderMobileTopics(cat) {
  var container = document.getElementById('didatticaMobileTopics');
  container.innerHTML = '';
  var topics = didatticaTopics.filter(function(t) { return t.category === cat; });
  topics.forEach(function(t) {
    var btn = document.createElement('button');
    btn.className = 'didattica-mobile-topic-btn';
    btn.dataset.topic = t.id;
    btn.textContent = t.title;
    btn.onclick = function() { renderDidatticaTopic(t.id); };
    container.appendChild(btn);
  });
}

function renderDidatticaTopic(topicId) {
  var topic = didatticaTopics.find(function(t) { return t.id === topicId; });
  if (!topic) return;

  // Update sidebar active state
  document.querySelectorAll('.didattica-sidebar-item').forEach(function(btn) {
    btn.classList.toggle('active', btn.dataset.topic === topicId);
  });
  // Update mobile active state
  document.querySelectorAll('.didattica-mobile-topic-btn').forEach(function(btn) {
    btn.classList.toggle('active', btn.dataset.topic === topicId);
  });

  // Make sure the right category is open in sidebar
  if (topic.category !== _didatticaCurrentCat) {
    _openSidebarCategory(topic.category, false);
  }

  // Render content
  var contentEl = document.getElementById('didatticaContent');
  contentEl.innerHTML = '<div class="topic-card"><h3>' + topic.title + '</h3><div class="topic-content">' + topic.content + '</div></div>';

  // Scroll content to top
  contentEl.scrollTop = 0;
  // On mobile, scroll the topic into view
  if (window.innerWidth <= 600) {
    contentEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

// Enter key per login
document.getElementById('authPassword').addEventListener('keydown', function(e) { if (e.key === 'Enter') handleAuth(); });

// Avvia
checkSession();
